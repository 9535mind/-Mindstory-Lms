    /** 유아부 설정 화면: 사전 명단 = INSTITUTION_DATABASE */
    const PRESET_FOREST_DAYCARE_NAMES = INSTITUTION_DATABASE;

    const HANGUL_SYLLABLE_START = 0xac00;
    const HANGUL_SYLLABLE_END = 0xd7a3;
    /** ㄱ ㄲ ㄴ ㄷ ㄸ ㄹ ㅁ ㅂ ㅃ ㅅ ㅆ ㅇ ㅈ ㅉ ㅊ ㅋ ㅌ ㅍ ㅎ */
    const CHOSEONG_JAMO = ['ㄱ', 'ㄲ', 'ㄴ', 'ㄷ', 'ㄸ', 'ㄹ', 'ㅁ', 'ㅂ', 'ㅃ', 'ㅅ', 'ㅆ', 'ㅇ', 'ㅈ', 'ㅉ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ'];

    function isHangulConsonantJamoChar(ch) {
        const c = ch.charCodeAt(0);
        /** 호환 자모 ㄱ…ㅎ (U+3131–U+314E) + 조합용 초성 자모 U+1100–U+1112 (IME에 따라 ㅅ이 여기로 들어옴) */
        return (c >= 0x3131 && c <= 0x314e) || (c >= 0x1100 && c <= 0x1112);
    }

    /** 조합용 초성(U+1100…) → extractChoseongSequenceFromName 과 동일한 호환 자모 문자열로 통일 */
    function normalizeChoseongQueryToCompatibilityJamo(str) {
        let out = '';
        const s = String(str || '');
        for (let i = 0; i < s.length; i++) {
            const c = s.charCodeAt(i);
            if (c >= 0x1100 && c <= 0x1112) {
                out += CHOSEONG_JAMO[c - 0x1100] || '';
            } else {
                out += s[i];
            }
        }
        return out;
    }

    /** 검색어가 호환 자음(ㄱ~ㅎ)만으로 이루어졌는지 — 초성 검색 모드 */
    function isChoseongOnlyQueryStr(str) {
        const s = String(str || '').trim();
        if (!s) return false;
        for (let i = 0; i < s.length; i++) {
            if (!isHangulConsonantJamoChar(s[i])) return false;
        }
        return true;
    }

    function initialChoseongFromHangulSyllable(ch) {
        const c = ch.charCodeAt(0);
        if (c >= HANGUL_SYLLABLE_START && c <= HANGUL_SYLLABLE_END) {
            const idx = Math.floor((c - HANGUL_SYLLABLE_START) / 588);
            return CHOSEONG_JAMO[idx] || '';
        }
        return '';

    function extractChoseongSequenceFromName(name) {
        const s = String(name || '');
        let out = '';
        for (let i = 0; i < s.length; i++) {
            const ch = s[i];
            const cc = ch.charCodeAt(0);
            if (cc >= HANGUL_SYLLABLE_START && cc <= HANGUL_SYLLABLE_END) {
                out += initialChoseongFromHangulSyllable(ch);
            }
        }
        return out;
    }

    function normalizePresetInstitutionNames(arr) {
        const seen = new Set();
        const out = [];
        for (const raw of arr || []) {
            const n = String(raw || '').trim();
            if (!n) continue;
            const k = n.toLocaleLowerCase('ko-KR');
            if (seen.has(k)) continue;
            seen.add(k);
            out.push(n);
        }
        return out;
    }

        return (

        barStyle(cat) {
            if (cat === 'SPRT') return 'background-color:#D4A373';
            if (cat === 'SUMT') return 'background-color:#2D4A3E';
            if (cat === 'AUTT') return 'background:linear-gradient(90deg,#2D4A3E 0%,#D4A373 100%)';
            return 'background-color:#2D4A3E;opacity:0.72';
        },

        emptyCounts() {
            const o = {};
            const add = (qs) => {
                qs.forEach((q) => {
                    o[q.id] = { yes: '', no: '' };
                });
            };
            add(this.questionsPreschool);
            add(this.questionsElementary);
            for (let i = 1; i <= 8; i++) {
                const k = 'q' + i;
                if (!o[k]) o[k] = { yes: '', no: '' };
            }
            return o;
        },

        scoresFromCounts(counts, targetGroup) {
            const tg = targetGroup === 'elementary' ? 'elementary' : 'preschool';
            const qs = this.questionsForGroup(tg);
            const acc = {
                SPRT: { yes: 0, n: 0 },
                SUMT: { yes: 0, n: 0 },
                AUTT: { yes: 0, n: 0 },
                WINT: { yes: 0, n: 0 }
            };
            qs.forEach((q) => {
                const row = counts[q.id] || { yes: '', no: '' };
                const y = parseInt(row.yes, 10) || 0;
                const n = parseInt(row.no, 10) || 0;
                const t = y + n;
                if (t === 0) return;
                const aligned = q.isReverse ? n : y;
                acc[q.cat].yes += aligned;
                acc[q.cat].n += t;
            });
            const pct = {};
            Object.keys(acc).forEach((k) => {
                pct[k] = acc[k].n > 0 ? Math.round((acc[k].yes / acc[k].n) * 100) : 0;
            });
            return pct;
        },

        /**
         * 기질별 총점: 문항마다 O→q.cat, X→xTemperamentForOCat[q.cat] 에 가산 (순위·DB용).
         * JSON 키 호환을 위해 DB 필드명은 여전히 totals_o_by_temperament 에 담으며, 값은 O+X 라우팅 합이다.
         */
        rawOTotalsFromCounts(counts, targetGroup) {
            const tg = targetGroup === 'elementary' ? 'elementary' : 'preschool';
            const qs = this.questionsForGroup(tg);
            const totals = { SPRT: 0, SUMT: 0, AUTT: 0, WINT: 0 };
            const xmap = this.xTemperamentForOCat;
            qs.forEach((q) => {
                const row = counts[q.id] || { yes: '', no: '' };
                const y = parseInt(row.yes, 10) || 0;
                const x = parseInt(row.no, 10) || 0;
                const alt = xmap[q.cat];
                if (q.isReverse) {
                    totals[q.cat] += x;
                    if (alt) totals[alt] += y;
                } else {
                    totals[q.cat] += y;
                    if (alt) totals[alt] += x;
                }
            });
            return totals;
        },

        /** 모든 문항의 O+X 합 = 전체 관찰 슬롯(모수). 기질 총점 합과 일치한다. */
        totalOXSlotsFromCounts(counts, targetGroup) {
            const tg = targetGroup === 'elementary' ? 'elementary' : 'preschool';
            const qs = this.questionsForGroup(tg);
            let sum = 0;
            qs.forEach((q) => {
                const row = counts[q.id] || { yes: '', no: '' };
                sum += (parseInt(row.yes, 10) || 0) + (parseInt(row.no, 10) || 0);
            });
            return sum;
        },

        /** 각 축(SPRT·SUMT·AUTT·WINT) 총점 / 네 축 총점 합 × 100 (정수 %) */
        temperamentDensityPercent(totals) {
            const grand =
                (totals.SPRT || 0) +
                    (totals.SUMT || 0) +
                    (totals.AUTT || 0) +
                    (totals.WINT || 0) || 1;
            const out = {};
            this.categories.forEach((c) => {
                out[c] = Math.round(((totals[c] || 0) / grand) * 100);
            });
            return out;
        },

        /**
         * 누적 총점 내림차순 순위. 동점: temperamentTieOrder(W→S→A→M) 앞선 유형이 상위.
         * density_pct: 전체 슬롯(네 축 총점 합) 대비 해당 기질 축 비중.
         */
        rankTemperamentsByRawO(totals) {
            const order = this.temperamentTieOrder;
            const L = this.temperamentLetter;
            const LB = this.temperamentRankLabel;
            const grand =
                (totals.SPRT || 0) +
                    (totals.SUMT || 0) +
                    (totals.AUTT || 0) +
                    (totals.WINT || 0) || 1;
            const rows = order.map((cat) => ({
                cat,
                score: totals[cat] || 0,
                letter: L[cat],
                label: LB[cat]
            }));
            rows.sort((a, b) => {
                if (b.score !== a.score) return b.score - a.score;
                return order.indexOf(a.cat) - order.indexOf(b.cat);
            });
            return rows.map((r, i) => ({
                rank: i + 1,
                cat: r.cat,
                letter: r.letter,
                score: r.score,
                label: r.label,
                density_pct: Math.round((r.score / grand) * 100)
            }));
        },

        /**
         * 연구·재분석용 문항별 원시 O/X (DB scores.raw_answers 로 그대로 보존)
         */
        buildRawAnswersArray(counts, targetGroup) {
            const tg = targetGroup === 'elementary' ? 'elementary' : 'preschool';
            const qs = this.questionsForGroup(tg);
            return qs.map((q, idx) => {
                const row = counts[q.id] || { yes: '', no: '' };
                return {
                    question_id: idx + 1,
                    question_key: q.id,
                    o_cat: q.cat,
                    is_reverse: !!q.isReverse,
                    question_text: q.text,
                    question_sub: q.sub || '',
                    question_desc: q.desc || '',
                    o_count: parseInt(row.yes, 10) || 0,
                    x_count: parseInt(row.no, 10) || 0
                };
            });
        },

        /** ≥70% 재능·축하 · 40~70% 균형 격려 · &lt;40% 섬세한 보호·치유 (v2.0 내러티브) */
        segmentForScore(pct, cat) {
            const I = this.interpretations[cat];
            const empty = {
                tier: 'mid',
                badge: '',
                headline: cat,
                quote: '',
                narrative: '',
                psychDeep: '',
                forestPortrait: '',
                parentHeart: '',
                actionGuide: ''
            };
            if (!I || !I.tier) return empty;
            let tierKey = 'mid';
            if (pct >= 70) tierKey = 'high';
            else if (pct < 40) tierKey = 'low';
            const T = I.tier[tierKey];
            return {
                tier: tierKey,
                badge: T.badge,
                headline: I.title,
                quote: T.quote,
                narrative: T.narrative,
                psychDeep: I.psychDeep,
                forestPortrait: I.forestPortrait,
                parentHeart: I.parentHeart,
                actionGuide: I.actionGuide
            };
        },

        /** 동일 기관명(trim)으로 묶인 레코드 (집단 프로필용) */
        membersByInstitutionName(institutions, name) {
            const k = String(name).trim();
            return institutions.filter((i) => String(i.name).trim() === k);
        },

        /**
         * 집단 기질 평균: sum(개별 4축 %) / 관찰 데이터가 있는 아동 수
         * @param {function(object): boolean} hasDataFn - counts에 입력이 있는지
         */
        aggregateMeanScores(members, hasDataFn) {
            const withData = members.filter((m) => hasDataFn(m.counts));
            if (!withData.length) return null;
            const cats = this.categories;
            const sum = {};
            cats.forEach((c) => {
                sum[c] = 0;
            });
            withData.forEach((inst) => {
                const sc = this.scoresFromCounts(inst.counts, this.getTargetGroup(inst));
                cats.forEach((c) => {
                    sum[c] += sc[c] || 0;
                });
            });
            const n = withData.length;
            const mean = {};
            cats.forEach((c) => {
                mean[c] = Math.round(sum[c] / n);
            });
            return { mean, nWithData: n, nTotal: members.length };
        },

        /** 각 아동의 '우세 기질'(최고점 복수 시 SCHEMA 순서 앞선 축) 빈도 → 파이 분포 */
        dominantTypeTally(members, hasDataFn) {
            const withData = members.filter((m) => hasDataFn(m.counts));
            const cats = this.categories;
            const tally = {};
            cats.forEach((c) => {
                tally[c] = 0;
            });
            withData.forEach((inst) => {
                const sc = this.scoresFromCounts(inst.counts, this.getTargetGroup(inst));
                let best = cats[0];
                let bestV = -1;
                cats.forEach((c) => {
                    const v = sc[c] || 0;
                    if (v > bestV) {
                        bestV = v;
                        best = c;
                    }
                });
                tally[best] += 1;
            });
            return { tally, n: withData.length };
        },

        /**
         * 사전·사후: obsPhase === 'pre' | 'post' 레코드 각각 평균 → 성장 지수(Δ) = 사후 − 사전
         */
        aggregatePrePostComparison(members, hasDataFn) {
            const pre = members.filter((m) => m.obsPhase === 'pre' && hasDataFn(m.counts));
            const post = members.filter((m) => m.obsPhase === 'post' && hasDataFn(m.counts));
            if (!pre.length || !post.length) return null;
            const preAgg = this.aggregateMeanScores(pre, hasDataFn);
            const postAgg = this.aggregateMeanScores(post, hasDataFn);
            if (!preAgg || !postAgg) return null;
            const meanPre = preAgg.mean;
            const meanPost = postAgg.mean;
            const growthIndex = {};
            this.categories.forEach((c) => {
                growthIndex[c] = meanPost[c] - meanPre[c];
            });
            return {
                meanPre,
                meanPost,
                growthIndex,
                nPre: preAgg.nWithData,
                nPost: postAgg.nWithData,
                nPreRecords: pre.length,
                nPostRecords: post.length
            };
        },

        /** 유아부 기관 성격 (type) — 병설 등은 유치원으로 */
        preschoolKindNorm(inst) {
            const t = String(inst.type || '').trim();
            if (t === '유치원' || t.includes('병설')) return '유치원';
            if (t === '기타') return '기타';
            return '어린이집';
        },

        /** 초등부 기관 성격 — 레거시 「방과후학교」는 방과후교실과 동일 버킷 */
        elementaryTypeNorm(inst) {
            const t = String(inst.type || '').trim();
            if (t.includes('지역아동') || t === '지역아동센터') return '지역아동센터';
            if (t === '초등학교' || (t.includes('초등') && t.includes('학교'))) return '초등학교';
            if (t === '방과후교실' || t === '방과후학교' || t.includes('방과후')) return '방과후교실';
            return '방과후교실';
        },

        /** 표시·호환: 대상군에 따라 유아(3분류) 또는 초등(2분류) 라벨 */
        institutionTypeNorm(inst) {
            if (this.getTargetGroup(inst) === 'elementary') return this.elementaryTypeNorm(inst);
            return this.preschoolKindNorm(inst);
        },

        /**
         * localStorage 전체 기록 중 어린이집 vs 유치원 각각 평균 프로필
         * 유형별 평균 = 해당 유형 관찰(입력 완료) 점수 합 / 해당 유형 관찰 수
         */
        aggregateGlobalByInstitutionType(institutions, hasDataFn) {
            const preschool = institutions.filter((i) => this.getTargetGroup(i) === 'preschool');
            const day = preschool.filter((i) => this.preschoolKindNorm(i) === '어린이집');
            const kg = preschool.filter((i) => this.preschoolKindNorm(i) === '유치원');
            const dayAgg = this.aggregateMeanScores(day, hasDataFn);
            const kgAgg = this.aggregateMeanScores(kg, hasDataFn);
            if (!dayAgg || !kgAgg) return null;
            const absDiff = {};
            const signedDiff = {};
            this.categories.forEach((c) => {
                const d = (dayAgg.mean[c] || 0) - (kgAgg.mean[c] || 0);
                signedDiff[c] = (kgAgg.mean[c] || 0) - (dayAgg.mean[c] || 0);
                absDiff[c] = Math.abs(d);
            });
            let rsiCat = this.categories[0];
            let rsiVal = -1;
            this.categories.forEach((c) => {
                if (absDiff[c] > rsiVal) {
                    rsiVal = absDiff[c];
                    rsiCat = c;
                }
            });
            return {
                meanDay: dayAgg.mean,
                meanKg: kgAgg.mean,
                nDay: dayAgg.nWithData,
                nKg: kgAgg.nWithData,
                rsiCat,
                rsiVal,
                signedDiff,
                absDiff
            };
        },

        /** 유아부 vs 초등부 집단 간 평균 비교 (문항뱅크는 각 레코드 targetGroup 기준) */
        aggregatePreschoolVsElementary(institutions, hasDataFn) {
            const pre = institutions.filter((i) => this.getTargetGroup(i) === 'preschool');
            const el = institutions.filter((i) => this.getTargetGroup(i) === 'elementary');
            const preAgg = this.aggregateMeanScores(pre, hasDataFn);
            const elAgg = this.aggregateMeanScores(el, hasDataFn);
            if (!preAgg || !elAgg) return null;
            if (preAgg.nWithData < 1 || elAgg.nWithData < 1) return null;
            const absDiff = {};
            const signedDiff = {};
            this.categories.forEach((c) => {
                const d = (preAgg.mean[c] || 0) - (elAgg.mean[c] || 0);
                absDiff[c] = Math.abs(d);
                signedDiff[c] = (elAgg.mean[c] || 0) - (preAgg.mean[c] || 0);
            });
            let rsiCat = this.categories[0];
            let rsiVal = -1;
            this.categories.forEach((c) => {
                if (absDiff[c] > rsiVal) {
                    rsiVal = absDiff[c];
                    rsiCat = c;
                }
            });
            return {
                meanDay: preAgg.mean,
                meanKg: elAgg.mean,
                nDay: preAgg.nWithData,
                nKg: elAgg.nWithData,
                rsiCat,
                rsiVal,
                signedDiff,
                absDiff
            };
        }
    };

    const STATE = {
        step: 'dashboard',
        institutions: [],
        selectedId: null,
        /** 기관 허브·종합 보고서: 기관명 키(trim) */
        selectedGroupName: '',
        searchTerm: '',
        isPreviewSample: false,
        setupTypeOverride: null,
        /** setup 화면: 사전/사후 선택값( observationStage 와 동기 ) */
        setupObsPhase: '',
        /** 전역 기본 관찰 단계: pre | post — localStorage ms_observation_stage */
        observationStage: 'pre',
        /** 진행 장소: forest(숲) | indoor(실내) — localStorage ms_forest_obs_location */
        obsLocation: 'forest',
        /** 예전 localStorage 키에서 이행한 경우 1회 안내 */
        migrationBanner: null,
        /** 홈 이동 직후 토스트 문구 */
        toastMessage: null,
        _toastTimer: null,
        /** 대시보드: 분석 센터(관리 대시보드) 패널 펼침 */
        dashboardReportsExpanded: false,
        /** 맞춤 보고서 빌더: 기관명(trim) 또는 ''=전체 */
        dashboardBuilderInst: '',
        /** all | preschool_daycare | preschool_kg | preschool_other | elem_community | elem_afterschool | elem_school | cmp_dk | cmp_pe */
        dashboardBuilderTypeFilter: 'all',
        /** single | prepost | group */
        dashboardBuilderMode: 'single',
        /** 집단 거시: dk 어린이집↔유치원 · pe 유아↔초등 */
        macroVariant: 'dk',
        reportAggregateMembers: null,
        reportAggregateTitle: '',
        reportFromDashboard: false,
        /** 입력 화면: preschool | elementary (기록별 inst.targetGroup과 동기화) */
        targetGroup: 'preschool',
        /** 원스톱 검사 설정 모달: 반 이름 임시 보관(재렌더 시 유지, persist 대상 아님) */
        unifiedSetupGroupDraft: '',

        guessType(name) {
            const s = String(name);
            if (this.targetGroup === 'elementary') {
                if (s.includes('지역아동') || s.includes('아동센터')) return '지역아동센터';
                if (s.includes('초등학교') || (s.includes('초등') && s.includes('학교'))) return '초등학교';
                if (s.includes('방과후')) return '방과후교실';
                return '방과후교실';
            }
            if (s.includes('유치원') || s.includes('병설')) return '유치원';
            return '어린이집';
        },

        ensureCounts(inst) {
            if (!inst.counts || typeof inst.counts !== 'object') inst.counts = SCHEMA.emptyCounts();
            SCHEMA.questionsPreschool.forEach((q) => {
                if (!inst.counts[q.id]) inst.counts[q.id] = { yes: '', no: '' };
            });
            SCHEMA.questionsElementary.forEach((q) => {
                if (!inst.counts[q.id]) inst.counts[q.id] = { yes: '', no: '' };
            });
            for (let i = 1; i <= 8; i++) {
                const k = 'q' + i;
                if (!inst.counts[k]) inst.counts[k] = { yes: '', no: '' };
            }
            SCHEMA.migrateLegacyCounts(inst);
            if (inst.targetGroup !== 'preschool' && inst.targetGroup !== 'elementary') {
                inst.targetGroup = SCHEMA.getTargetGroup(inst);
            }
            if (inst.obsPhase !== 'pre' && inst.obsPhase !== 'post') inst.obsPhase = '';
            if (inst.groupName === undefined) inst.groupName = '';
            if (inst.obsLocation !== 'indoor' && inst.obsLocation !== 'forest') inst.obsLocation = 'forest';
        },

        selected() {
            return this.institutions.find((i) => i.id === this.selectedId) || null;
        },

        persist() {
            try {
                localStorage.setItem(
                    STORAGE_KEY,
                    JSON.stringify({
                        app: 'forest-observation',
                        engine: '1.5',
                        vault: 'ms_forest_v1',
                        v: SCHEMA.version,
                        targetGroup: this.targetGroup === 'elementary' ? 'elementary' : 'preschool',
                        institutions: this.institutions,
                        selectedId: this.selectedId,
                        dashboardBuilderInst: this.dashboardBuilderInst || '',
                        dashboardBuilderTypeFilter: this.dashboardBuilderTypeFilter || 'all',
                        dashboardBuilderMode: this.dashboardBuilderMode || 'single'
                    })
                );
            } catch (_) {}
        },

        hydrate() {
            this.migrationBanner = null;
            try {
                let raw = localStorage.getItem(STORAGE_KEY);
                let fromKey = STORAGE_KEY;
                if (!raw) {
                    raw = localStorage.getItem(LEGACY_MINDSTORY_VAULT_V1);
                    if (raw) {
                        fromKey = LEGACY_MINDSTORY_VAULT_V1;
                        this.migrationBanner =
                            '이전 키(MINDSTORY_VAULT_V1) 데이터를 ms_forest_v1로 옮겼어요.';
                    }
                }
                if (!raw) {
                    raw = localStorage.getItem(LEGACY_FOREST_OBS_V1);
                    if (raw) {
                        fromKey = LEGACY_FOREST_OBS_V1;
                        if (!this.migrationBanner) {
                            this.migrationBanner =
                                '이전 키(ms_forest_observation_v1) 데이터를 ms_forest_v1로 옮겼어요.';
                        }
                    }
                }
                if (!raw) {
                    raw = localStorage.getItem(LEGACY_OBSERVATION_V0);
                    if (raw) {
                        fromKey = LEGACY_OBSERVATION_V0;
                        if (!this.migrationBanner) {
                            this.migrationBanner =
                                '이전 키(ms_forest_observation) 데이터를 ms_forest_v1로 옮겼어요.';
                        }
                    }
                }
                if (!raw) {
                    raw = localStorage.getItem(LEGACY_FOREST_DATA);
                    if (raw) {
                        fromKey = LEGACY_FOREST_DATA;
                        if (!this.migrationBanner) {
                            this.migrationBanner =
                                '예전 키(ms_forest_data) 기록을 가져왔어요. 이제 ms_forest_v1에만 저장됩니다.';
                        }
                    }
                }
                if (!raw) {
                    raw = localStorage.getItem(LEGACY_V86);
                    if (raw) {
                        fromKey = LEGACY_V86;
                        if (!this.migrationBanner) {
                            this.migrationBanner =
                                '예전 앱 저장소에서 기록을 가져왔어요. 지금 키(ms_forest_v1)로 옮겼습니다.';
                        }
                    }
                }
                if (!raw) {
                    raw = localStorage.getItem(LEGACY_V2);
                    if (raw) {
                        this._migrateLegacyV2(raw);
                        if (!this.migrationBanner) {
                            this.migrationBanner =
                                '오래된 단일 기관 형식을 ms_forest_v1로 옮겼습니다.';
                        }
                        return;
                    }
                }
                if (!raw) {
                    this.institutions = [];
                    this.selectedId = null;
                    return;
                }
                const o = JSON.parse(raw);
                if (o.institutions && Array.isArray(o.institutions)) {
                    this.institutions = o.institutions;
                    this.selectedId = o.selectedId || (this.institutions[0] && this.institutions[0].id) || null;
                    if (o.targetGroup === 'elementary' || o.targetGroup === 'preschool') {
                        this.targetGroup = o.targetGroup;
                    } else if (o.targetGroup === '초등부' || o.targetGroup === '초등') {
                        this.targetGroup = 'elementary';
                    } else if (o.targetGroup === '유아·유치부' || o.targetGroup === '유아' || o.targetGroup === '유치원부') {
                        this.targetGroup = 'preschool';
                    }
                    if (typeof o.dashboardBuilderInst === 'string') this.dashboardBuilderInst = o.dashboardBuilderInst;
                    if (typeof o.dashboardBuilderTypeFilter === 'string') {
                        this.dashboardBuilderTypeFilter = o.dashboardBuilderTypeFilter;
                    }
                    if (o.dashboardBuilderMode === 'single' || o.dashboardBuilderMode === 'prepost' || o.dashboardBuilderMode === 'group') {
                        this.dashboardBuilderMode = o.dashboardBuilderMode;
                    }
                    this.institutions.forEach((i) => this.ensureCounts(i));
                    if (fromKey !== STORAGE_KEY) {
                        try { localStorage.removeItem(fromKey); } catch (_) {}
                        this.persist();
                    }
                    return;
                }
            } catch (_) {}
            this.institutions = [];
            this.selectedId = null;
        },

        _migrateLegacyV2(raw) {
            try {
                const o = JSON.parse(raw);
                if (!o.institution || !o.counts) return;
                const id = newVaultRecordId();
                const inst = {
                    id,
                    name: o.institution,
                    type: this.guessType(o.institution),
                    obsPhase: '',
                    counts: o.counts,
                    updatedAt: new Date().toISOString()
                };
                this.ensureCounts(inst);
                this.institutions = [inst];
                this.selectedId = id;
                try { localStorage.removeItem(LEGACY_V2); } catch (_) {}
                this.persist();
            } catch (_) {}
        },

        addInstitution(name) {
            const id = newVaultRecordId();
            const inst = {
                id,
                name: name.trim(),
                type: this.guessType(name),
                obsPhase: '',
                groupName: '',
                obsLocation: STATE.obsLocation === 'indoor' ? 'indoor' : 'forest',
                targetGroup: this.targetGroup === 'elementary' ? 'elementary' : 'preschool',
                counts: SCHEMA.emptyCounts(),
                updatedAt: new Date().toISOString()
            };
            this.institutions.push(inst);
            this.selectedId = id;
            this.persist();
            return inst;
        },

        touchSelected() {
            const i = this.selected();
            if (i) i.updatedAt = new Date().toISOString();
        }
    };

    /** 관찰 단계(사전/사후): 브라우저·탭을 닫아도 localStorage(ms_observation_stage)로 복원 */
    (function syncObservationStageFromStorage() {
        try {
            const v = localStorage.getItem(LS_OBSERVATION_STAGE);
            STATE.observationStage = v === 'post' ? 'post' : 'pre';
        } catch (_) {
            STATE.observationStage = 'pre';
        }
        STATE.setupObsPhase = STATE.observationStage;
    })();

    (function syncObsLocationFromStorage() {
        try {
            const v = localStorage.getItem(LS_OBS_LOCATION);
            STATE.obsLocation = v === 'indoor' ? 'indoor' : 'forest';
        } catch (_) {
            STATE.obsLocation = 'forest';
        }
    })();

    /** 공식 앱 표기명 (JTT-Kinder · 독일어 풀네임 유지) — UI·공유·가이드 공통 */
    const APP_TITLE_DE = 'JTT-Kinder (4 Jahreszeiten Temperament-Test für Kinder)';

    const UI = {
        esc(s) {
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        },

        /** 줄바꿈 문단 → 가독성용 &lt;p&gt; (이스케이프) */
        formatMultilineEsc(text) {
            const t = String(text || '').trim();
            if (!t) return '';
            return t
                .split(/\n\n+/)
                .map((p) => p.trim())
                .filter(Boolean)
                .map(
                    (p) =>
                        `<p class="text-sm text-ms-body leading-relaxed">${this.esc(p)}</p>`
                )
                .join('');
        },

        /** 검색어와 겹치는 구간만 굵게 (HTML 조각, 이미 이스케이프됨) */
        highlightInstMatch(name, query) {
            const n = String(name);
            const q = String(query).trim();
            if (!q) return this.esc(n);
            const lower = n.toLocaleLowerCase('ko-KR');
            const ql = q.toLocaleLowerCase('ko-KR');
            const idx = lower.indexOf(ql);
            if (idx < 0) return this.esc(n);
            return (
                this.esc(n.slice(0, idx)) +
                '<strong class="font-black text-[#2D4A3E]">' +
                this.esc(n.slice(idx, idx + q.length)) +
                '</strong>' +
                this.esc(n.slice(idx + q.length))
            );
        },

        hasAnyCount(counts) {
            const rowHas = (q) => {
                const row = counts[q.id] || {};
                const y = parseInt(row.yes, 10) || 0;
                const n = parseInt(row.no, 10) || 0;
                return y + n > 0;
            };
            if (SCHEMA.questionsPreschool.some(rowHas)) return true;
            if (SCHEMA.questionsElementary.some(rowHas)) return true;
            for (let i = 1; i <= 12; i++) {
                if (rowHas({ id: 'ps_' + i })) return true;
            }
            for (let i = 1; i <= 8; i++) {
                if (rowHas({ id: 'q' + i })) return true;
            }
            return false;
        },

        hasAnyCountForActiveGroup(inst) {
            const tg = SCHEMA.getTargetGroup(inst);
            return SCHEMA.questionsForGroup(tg).some((q) => {
                const row = inst.counts[q.id] || {};
                const y = parseInt(row.yes, 10) || 0;
                const n = parseInt(row.no, 10) || 0;
                return y + n > 0;
            });
        },

        /** 문항 한 줄: O·X 모두 숫자 입력됨(0 포함) */
        hasInputRowComplete(row) {
            const y = String((row && row.yes) || '').trim();
            const n = String((row && row.no) || '').trim();
            if (y === '' || n === '') return false;
            const yi = parseInt(y, 10);
            const ni = parseInt(n, 10);
            return !Number.isNaN(yi) && !Number.isNaN(ni) && yi >= 0 && ni >= 0;
        },
        /** 현재 연령 문항 세트 전체 입력 완료 */
        allInputQuestionsFilled(inst) {
            if (!inst) return false;
            STATE.ensureCounts(inst);
            const tg = SCHEMA.getTargetGroup(inst);
            const qs = SCHEMA.questionsForGroup(tg);
            return qs.every((q) => this.hasInputRowComplete(inst.counts[q.id]));
        },

        render() {
            if (typeof MS !== 'undefined' && MS.clearAdvanceTimers) MS.clearAdvanceTimers();
            const app = document.getElementById('app');
            if (app) {
                if (
                    STATE.step === 'institution-report' ||
                    STATE.step === 'institution-hub' ||
                    STATE.step === 'institution-prepost-report' ||
                    STATE.step === 'institution-type-macro-report'
                ) {
                    app.classList.remove('max-w-2xl');
                    app.classList.add('max-w-4xl', 'print-wide');
                } else {
                    app.classList.add('max-w-2xl');
                    app.classList.remove('max-w-4xl', 'print-wide');
                }
            }
            const el = document.getElementById('view-content');
            if (!el) return;
            if (STATE.step === 'dashboard') this.renderDashboard(el);
            else if (STATE.step === 'guide') this.renderGuide(el);
            else if (STATE.step === 'institution-hub') this.renderInstitutionHub(el);
            else if (STATE.step === 'institution-report') this.renderInstitutionReport(el);
            else if (STATE.step === 'institution-prepost-report') this.renderInstitutionPrePostReport(el);
            else if (STATE.step === 'institution-type-macro-report') this.renderInstitutionTypeMacroReport(el);
            else if (STATE.step === 'setup') this.renderSetup(el);
            else if (STATE.step === 'input') this.renderInput(el);
            else if (STATE.step === 'result') {
                this.renderResult(el);
                if (typeof MS !== 'undefined' && MS.scheduleForestGroupSubmit) {
                    MS.scheduleForestGroupSubmit();
                }
            }
            this.renderDataFooter();
            this.renderToast();
            this.renderHeaderAgeTabs();
            const appHdr = document.getElementById('ms-app-header');
            if (appHdr) {
                const hideHdr = STATE.step === 'input';
                appHdr.classList.toggle('hidden', hideHdr);
                appHdr.setAttribute('aria-hidden', hideHdr ? 'true' : 'false');
                appHdr.classList.remove('mb-3', 'mb-4', 'mb-8');
                if (!hideHdr) {
                    appHdr.classList.add(STATE.step === 'dashboard' ? 'mb-2' : 'mb-8');
                }
            }
        },

        /** 헤더: 연령·문항 세트 (메인 대시보드에서는 숨김 — 검사 설정 모달 등에서 선택) */
        renderHeaderAgeTabs() {
            const host = document.getElementById('ms-header-age-tabs');
            if (!host) return;
            if (STATE.step === 'input' || STATE.step === 'dashboard') {
                host.innerHTML = '';
                host.classList.add('hidden');
                return;
            }
            host.classList.remove('hidden');
            const tg = STATE.targetGroup === 'elementary' ? 'elementary' : 'preschool';
            const base =
                'ms-btn flex-1 min-h-[48px] px-4 py-3 font-bold text-xs rounded-full transition-colors duration-200 ease-out';
            const tabPs = tg === 'preschool' ? TAB_AGE_PS_ON : TAB_AGE_PS_OFF;
            const tabEl = tg === 'elementary' ? TAB_AGE_EL_ON : TAB_AGE_EL_OFF;
            host.innerHTML = `
                <div class="flex gap-2 justify-center max-w-md mx-auto">
                    <button type="button" class="${base} ${tabPs}"
                        onclick="MS.setTargetGroup('preschool')">유아·유치부</button>
                    <button type="button" class="${base} ${tabEl}"
                        onclick="MS.setTargetGroup('elementary')">초등부</button>
                </div>
            `;
        },

        /** 저장 안내 토스트 (고정 하단) */
        renderToast() {
            let host = document.getElementById('ms-toast-host');
            if (!host) {

            let grid = '';

                    .map((_, i) => {

        /** 우세 기질 빈도 파이 (순수 SVG) */
        buildGroupPieSvg(tally, n) {
            if (!n) {
                return `<p class="text-center text-sm text-ms-muted py-12">집계할 관찰 데이터가 아직 없어요. 개별 입력 후 다시 열어 주세요.</p>`;
            }
            const cats = SCHEMA.categories;
            const colors = {
                SPRT: '#D4A373',
                SUMT: '#2D4A3E',
                AUTT: '#5f7f6f',
                WINT: '#7d6b5a'
            };
            const cx = 120;
            const cy = 120;
            const r = 88;
            let a = -Math.PI / 2;
            let paths = '';
            cats.forEach((cat) => {
                const cnt = tally[cat] || 0;
                if (!cnt) return;
                const frac = cnt / n;
                const slice = frac * 2 * Math.PI;
                const x1 = cx + r * Math.cos(a);
                const y1 = cy + r * Math.sin(a);
                const x2 = cx + r * Math.cos(a + slice);
                const y2 = cy + r * Math.sin(a + slice);
                const large = slice > Math.PI ? 1 : 0;
                paths += `<path d="M ${cx} ${cy} L ${x1.toFixed(2)} ${y1.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${x2.toFixed(2)} ${y2.toFixed(2)} Z" fill="${colors[cat]}" stroke="#FDFBF7" stroke-width="2" />`;

            });
            const svg = `<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" aria-label="기질 분포">${paths}</svg>`;
            const legend = cats
                .map((cat) => {
                    const cnt = tally[cat] || 0;
                    const pct = Math.round((cnt / n) * 100);
                    return `<div class="flex items-center justify-between gap-3 text-sm py-1.5 border-b border-[rgba(45,74,62,0.06)] last:border-0">
                        <span class="flex items-center gap-2 font-semibold text-[#2D4A3E]"><span class="inline-block w-3.5 h-3.5 rounded-sm shrink-0" style="background:${colors[cat]}"></span>${this.esc(SCHEMA.temperamentRankLabel[cat] || cat)}</span>

        },

        /** 기관 컨설팅 본문 (풍성한 서술) */
        buildInstitutionConsultingNarrative(ctx) {
            const { groupName, mean, tally, nPie, nWithData, nTotal, typeLabel } = ctx;
            const cats = SCHEMA.categories;
            const meanRank = cats.map((c) => ({ c, v: mean[c] || 0 })).sort((a, b) => b.v - a.v);
            const topM = meanRank[0].c;
            const lowM = meanRank[3].c;
            const pieRank = cats.map((c) => ({ c, n: tally[c] || 0 })).sort((a, b) => b.n - a.n);
            const topP = pieRank[0].c;
            const spread = meanRank[0].v - meanRank[3].v;

            const pctLine = cats
                .map((c) => `${SCHEMA.temperamentRankLabel[c] || c} 평균 ${mean[c]}%`)
                .join(', ');

            const atmosphere =
                `「${groupName}」(${typeLabel}) 집단의 네 기질 평균은 ${pctLine}로 읽힙니다. ` +
                `숫자는 한 아이의 성격표가 아니라, 지금 이 시기에 모여 있는 **집단 에너지의 결**을 보여 주는 나침반이에요.\n\n` +
                (spread <= 15
                    ? `네 축이 고르게 펼쳐져 있어 숲 활동에서 다양한 역할이 자연스럽게 돌아갈 수 있는 토양입니다. 한 아이에게만 시선이 머물지 않도록, 오늘의 숲에서 누가 어떤 기질의 씨앗을 드러냈는지 짧은 메모로 남기면 운영이 더 부드러워져요.`
                    : `평균 에너지는 「${SCHEMA.temperamentRankLabel[topM] || topM}」 쪽으로 조금 더 기울어 있어, 이 원 전체가 품는 숲의 분위기는 ${topM === 'SUMT' ? '탐험과 움직임' : topM === 'SPRT' ? '정서적 교감과 돌봄' : topM === 'AUTT' ? '안전 확인과 예측 가능한 리듬' : '끝맺음과 다시 시도하는 힘'}에 익숙해지기 쉬운 결을 이룹니다. ` +
                      `동시에 「${SCHEMA.temperamentRankLabel[lowM] || lowM}」 축은 집단이 함께 숨 쉴 여백을 만들어 줄 때 더 단단해질 수 있어요.`) +
                `\n\n이 기관은 전반적으로 ${SCHEMA.temperamentRankLabel[topP] || topP} 기질이 우세한 아이가 많아, 놀이와 이동을 설계할 때 이 결을 존중하면 현장의 안정감이 커집니다.`;

            const traits =
                `**우리 기관의 기질적 특징**은 두 층으로 읽을 수 있어요. 첫째, **평균 프로필**(레이더)은 장기적인 교육 방향과 환경 설계에 쓰입니다. 둘째, **우세형 분포**(파이)는 “지금 이 반·이 연령에서 누가 앞장서기 쉬운가”를 보여 줍니다.\n\n` +
                `현재 집단 평균에서 ${SCHEMA.temperamentRankLabel[topM] || topM}의 비율이 상대적으로 높습니다. 이는 숲에서의 선택과 반응 속도가 그 방향으로 모일 가능성이 있다는 뜻이에요. ` +
                `파이 차트에서는 ${SCHEMA.temperamentRankLabel[topP] || topP}형 아이가 ${nPie ? Math.round(((tally[topP] || 0) / nPie) * 100) : 0}%를 차지하여, 소그룹 활동을 짤 때 **페이스 메이커** 역할을 맡기기 좋은 기질이 드러납니다.\n\n` +
                (nTotal > nWithData
                    ? `참고로 같은 기관명으로 저장된 기록 ${nTotal}건 중, 아직 숫자가 비어 있는 관찰 ${nTotal - nWithData}건은 평균에서 제외되었습니다. 데이터가 쌓일수록 이 지도는 더 선명해져요.`
                    : `모든 관찰 기록에 입력값이 있어 집단 지도가 완전히 반영된 상태입니다.`);

            const strategy =
                `**교사를 위한 집단 관리 전략**으로는, 먼저 “집단의 공통 리듬”을 하루 일과에 새겨 넣는 것을 권합니다. ` +
                (topM === 'AUTT'
                    ? `AUTT(가을) 성향이 평균에서 두드러질 때는 새로운 숲 코스로 이동하기 전에 **사진·지도·짧은 동선 시범**으로 예측 가능성을 높여 주세요. “어디로 갈지, 어디서 쉴지”를 말로 먼저 나누면 아이들의 몸이 한꺼번에 움직여도 마음은 편안합니다.`
                    : topM === 'SUMT'
                      ? `SUMT(여름) 성향이 강하면 모험적인 숲 놀이에 최적화되어 있으나, **안전 신호와 우리들의 약속**을 활동 전에 짧게 고정하는 것이 중요합니다. 에너지가 크게 솟을수록 멈춤 신호를 친숙한 놀이로 연결해 두세요.`
                      : topM === 'SPRT'
                        ? `SPRT(봄) 성향이 두드러지면 정서적 교감이 활동의 중심축이 됩니다. 갈등이 생겼을 때 해결보다 **이름을 부르며 감정 이름 붙이기**를 먼저 시도해 보세요. 집단 전체가 듣는 칭찬도 효과적입니다.`
                        : `WINT(겨울) 성향이 높으면 마무리와 규칙을 지키는 흐름이 자연스럽습니다. 활동을 나눌 때 **작은 완성 단위**를 미리 알려 주면 스트레스 없이 몰입이 이어져요.`) +
                `\n\n소그룹을 나눌 때는 우세형과 다른 축의 아이를 한 조에 섞어, 서로의 고운 에너지가 번지도록 하면 좋아요.`;

            const curriculum =
                `**교육 커리큘럼 제안**: 이 분포를 바탕으로 4STT 연계 프로그램을 한 겹 더 풍성하게 쌓아 볼 수 있어요.\n\n` +
                (topP === 'SPRT'
                    ? `• 돌봄·협력 서사가 있는 역할 놀이(작은 숲 생명 돌보기, 친구 초대하기)\n• 감정 카드와 함께하는 원 모임\n• 조용한 관찰 시간(듣기·그리기)`
                    : topP === 'SUMT'
                      ? `• 지형이 조금씩 바뀌는 탐험 코스(단계적 난이도)\n• 도구를 바꿔 가며 같은 숲을 새로 보기\n• 짧은 목표 깃발 놀이(도착점 시각화)`
                      : topP === 'AUTT'
                        ? `• 동선을 미리 밟아 보는 “리허설 산책”\n• 안전한 기지 캠프를 두고 확장하는 놀이\n• 예고가 있는 자유 탐색`
                        : `• 한 과제를 작은 덩어리로 나눈 완성 놀이\n• 정리·마무리를 노래·의식으로 연결\n• 다시 시도하기 루틴(호흡-물-한 블록)`) +
                `\n\n평균 편차가 ${spread <= 15 ? '크지 않아' : '어느 정도 있어'} 같은 주차 안에 **빠른 코스**와 **느린 코스**를 번갈아 배치하면 집단 전체가 숲의 속도를 체험하게 됩니다.`;

            const admin =
                `**원장님용 · 4STT 교육 제언**\n\n` +
                (topP === 'SPRT' || topM === 'SPRT'
                    ? `본 기관은 SPRT(봄) 기질의 비중이 높아 **정서적 교감**이 운영의 중심축이 됩니다. 교사 연수 시 ‘공감 대화법’·‘감정 이름 붙이기’ 비중을 높이고, 평가보다 **관찰 언어를 통일**하는 시간을 마련해 보시길 권합니다.`
                    : topP === 'SUMT' || topM === 'SUMT'
                      ? `본 기관은 SUMT(여름) 기질의 에너지가 활기를 이끌기 쉬워 **안전 리더십**과 **활동 설계** 역량을 연수에서 함께 다루면 좋습니다. 모험을 허용하는 만큼 멈춤 신호와 회복 루틴을 매뉴얼로 남겨 두세요.`
                      : topP === 'AUTT' || topM === 'AUTT'
                        ? `본 기관은 AUTT(가을) 기질이 집단 리듬을 잡는 데 기여합니다. 새 프로그램 도입 시 **사전 안내 자료**와 **반복 가능한 동선**을 강조하는 연수 구성을 권장합니다.`
                        : `본 기관은 WINT(겨울) 기질을 통해 **끝맺음과 책임** 문화를 쌓기 좋습니다. 연수에서는 목표 세분화·긍정적 마무리 의식을 팀 단위로 연습해 보세요.`) +
                `\n\n인력 배치 시 한 반에 **서로 다른 우세형**을 가진 교사가 짝을 이루면, 집단의 결을 균형 있게 받쳐 줄 수 있습니다. 숲은 아이의 속도를 기다리듯, 기관의 결도 천천히 읽어 가시길 바랍니다.`;

            return { atmosphere, traits, strategy, curriculum, admin };
        },

        /** 사전·사후 비교 서술 (종합·축별·숲의 선물) */
        buildPrePostNarrative(ctx) {
            const { groupName, typeLabel, meanPre, meanPost, growthIndex, nPre, nPost } = ctx;
            const cats = SCHEMA.categories;
            const catLabel = (c) => SCHEMA.temperamentRankLabel[c] || c;

            const rises = cats.filter((c) => (growthIndex[c] || 0) >= 3);
            const dips = cats.filter((c) => (growthIndex[c] || 0) <= -3);
            const stable = cats.filter((c) => (growthIndex[c] || 0) > -3 && (growthIndex[c] || 0) < 3);
            const sumDelta = cats.reduce((s, c) => s + (growthIndex[c] || 0), 0);
            const leadRise = rises.length ? rises.sort((a, b) => (growthIndex[b] || 0) - (growthIndex[a] || 0))[0] : null;

            const synthesis =
                `본 **마인드스토리 종합 분석**은 「${groupName}」(${typeLabel})에 저장된 관찰 중, **사전 검사**로 표시된 기록 ${nPre}건과 **사후 검사**로 표시된 기록 ${nPost}건의 평균 프로필을 나란히 놓고 읽은 것입니다. ` +
                `숫자는 아이 한 명을 단정짓는 낙인이 아니라, 같은 기관 안에서 시간의 흐름 속에 모인 **집단 에너지의 결**이 어디로 기울어졌는지를 보여 주는 나침반입니다.\n\n` +
                `사전 시점의 평균은 숲 프로그램을 설계할 때의 출발선이었고, 사후 시점의 평균은 그 여정을 지난 뒤의 숨결에 가깝습니다. ` +
                `네 축을 합친 **성장 지수의 합**은 약 ${sumDelta > 0 ? '+' : ''}${sumDelta}포인트 방향으로 움직였으며, 이는 “모두가 같은 속도로 달려야 한다”는 뜻이 아니라 **집단 전체가 어떤 풍경을 지나왔는지**를 요약한 것입니다.\n\n` +
                (leadRise
                    ? `특히 **${catLabel(leadRise)}** 축에서 사전 대비 가장 큰 상승 폭이 관찰되었습니다. 이는 숲에서의 경험이 아이들의 ${leadRise} 에너지를 깨우고, 그 결을 드러내는 데 도움이 되었음을 긍정적으로 읽을 수 있어요. ` +
                      `놀이·이동·돌봄의 순간들이 쌓이며, 집단이 그 기질 언어로 세상을 말하기 시작했다는 신호로 볼 수 있습니다.\n\n`
                    : `네 축 모두에서 급격한 단일 방향보다는 **섬세한 조정**이 주를 이루었습니다. 이는 기질적 균형과 안정을 찾아가는 과정으로, 숲이 요구하는 속도에 맞추어 몸과 마음이 서로 협상하는 아름다운 리듬으로 읽힙니다.\n\n`) +
                `교사와 원장님께서는 표의 **성장 지수(Δ)**를 “좋고 나쁨”이 아니라 **어디에 관심을 두고 칭찬·예고·휴식을 배치할지**를 정하는 참고선으로 활용해 주세요. ` +
                `4STT는 이 변화를 평가가 아닌 **함께 읽기**로 제안드립니다.\n\n` +
                `아래에서는 축별로 사전·사후의 차이를 따뜻한 언어로 풀어 드리며, 마지막에 다음 학기와 가정으로 이어질 **지속 성장 가이드**를 드립니다.`;

            const axisParts = cats.map((c) => {
                const d = growthIndex[c] || 0;
                const pre = meanPre[c] || 0;
                const post = meanPost[c] || 0;
                if (d >= 3) {
                    return (
                        `**${catLabel(c)}** · 사전 ${pre}%에서 사후 ${post}%로, 성장 지수 **+${d}**입니다. ` +
                        `사전 대비 ${c === 'WINT' ? 'WINT(원칙·마무리)' : catLabel(c)} 점수가 오른 것은 숲 활동을 통해 아이들의 **자기 주도성·책임감·관계 감각** 중 이 축에 해당하는 고운 에너지가 단단해졌음을 의미합니다. ` +
                        `숲에서의 반복 경험(예고, 선택, 마침표, 돌봄의 말)이 집단의 몸기억으로 남았을 가능성이 큽니다. 앞으로도 이 축을 구체적으로 칭찬 언어로 붙잡아 주면 재능이 더 넓게 퍼집니다.`
                    );
                }
                if (d <= -3) {
                    return (
                        `**${catLabel(c)}** · 사전 ${pre}%에서 사후 ${post}%로, 성장 지수 **${d}**입니다. ` +
                        `이 숫자는 “후퇴”라기보다 **다른 축이 크게 자라는 동안 잠시 숨 고르기**를 한 패턴으로 읽을 수 있어요. 기질적 균형과 안정을 찾아가는 과정에서, 한동안 이 축의 에너지가 옆으로 양보했을 수 있습니다. ` +
                        `숲은 아이의 속도를 기다리듯, 이 축에는 **짧은 예고·작은 성공·함께 걷기**를 더해 주시면 다시 고르게 돌아오기 쉽습니다.`
                    );
                }
                return (
                    `**${catLabel(c)}** · 사전 ${pre}%에서 사후 ${post}%로, 성장 지수 **${d >= 0 ? '+' : ''}${d}**입니다. ` +
                    `큰 요동 없이 **기질적 균형과 안정을 찾아가는 과정**에 가깝습니다. 이미 갖춘 리듬을 존중하면서, 숲에서의 새 자극을 천천히 흡수한 흔적으로 볼 수 있어요. ` +
                    `일상에서도 “지금은 유지와 응원”이 가장 큰 선물입니다.`
                );
            });
            const axisInsights = axisParts.join('\n\n');

            const topPost = cats.slice().sort((a, b) => (meanPost[b] || 0) - (meanPost[a] || 0))[0];
            const forestGift =
                `**[지속 성장 가이드] — 숲의 선물을 집과 다음 학기로**\n\n` +
                `사후 평균에서 **${catLabel(topPost)}** 축이 상대적으로 높게 자리하고 있어, 다음 학기 현장·야외 프로그램에서는 이 결을 **시작 루틴**에 녹여 보시길 권합니다. ` +
                `출발 전 짧은 원 모임에서 “오늘 숲이 우리에게 부탁하는 한 가지”를 아이들이 스스로 말하게 하면, 사후에 깨어난 에너지가 현장에서 다시 이어집니다.\n\n` +
                `가정에서는 숲에서 쓰던 **같은 어휘**(예고, 마침표, 우리들의 약속)를 저녁 이야기에 한 번씩만 불러도 연속성이 생깁니다. ` +
                `주말 산책을 미니 숲으로 삼아 “오늘은 어떤 기질 씨앗이 보였나요?”라고 묻는 것만으로도 아이는 자신의 변화를 이야기로 소유하게 됩니다.\n\n` +
                (rises.length
                    ? `상승이 두드러진 축(${rises.map((c) => catLabel(c)).join(', ')})은 학기 말 **성과 사진·짧은 영상**으로 남겨 두시면 교사 연수와 학부모 안내 자료로 활용하기 좋습니다. 숲이 준 변화는 숫자 너머의 이야기로 전할 때 더 오래 기억됩니다.`
                    : `네 축이 고르게 유지·조정되었다면, 다음 단계는 **깊이**입니다. 같은 코스라도 관찰 질문을 한 가지씩만 바꿔 보세요. “오늘 누가 먼저 숲을 살폈나요?”처럼 작은 초점이 집단의 풍경을 새로 그립니다.`);

            return { synthesis, axisInsights, forestGift, rises, dips, stable };
        },

        /** 거시: 어린이집 vs 유치원 (v8.6 스키마·발달 심리 톤) */
        buildMacroTypeComparisonNarrative(ctx) {
            const { meanDay, meanKg, nDay, nKg, rsiCat, rsiVal, absDiff, signedDiff } = ctx;
            const cats = SCHEMA.categories;
            const cn = (c) => SCHEMA.temperamentRankLabel[c] || c;

            const rsiLine =
                `**상대적 강점 지표(RSI)**로 본 이번 표본에서 두 집단의 거리가 가장 넓게 벌어진 축은 **${cn(rsiCat)}**이며, 평균 절대 차이는 약 **${rsiVal}퍼센트포인트**입니다. ` +
                `이 지표는 “어느 쪽이 우수한가”가 아니라, **어떤 기질 언어에서 환경적 맥락의 차이가 가장 선명하게 드러나는가**를 가리킵니다. ` +
                (signedDiff[rsiCat] > 0
                    ? `현재 데이터에서는 유치원 집단의 ${cn(rsiCat)} 평균이 어린이집보다 높게 나타났습니다. 누리과정 활동·또래 상호작용·과업 구조가 이 축의 발현을 촉진했을 가능성을 함께 고려해 볼 수 있습니다.\n\n`
                    : signedDiff[rsiCat] < 0
                      ? `현재 데이터에서는 어린이집 집단의 ${cn(rsiCat)} 평균이 유치원보다 높게 나타났습니다. 보육 맥락에서의 애착·일상 예측 가능성·감정 조절 지지가 이 축을 부각했을 수 있습니다.\n\n`
                      : `두 집단이 이 축에서 매우 가깝습니다.\n\n`);

            const maturity =
                `**집단 성숙도·발달 맥락 비교** 측면에서, 어린이집 표본은 전반적으로 **연령 중심이 낮은 구간**에 가까운 보육 환경의 특성을 띠는 경우가 많고, 유치원 표본은 **또래 집단 규범과 과업 지속**에 더 익숙한 발달 과제를 동시에 안고 있습니다. ` +
                `발달심리학적으로 보면, **사회정서적 조절**과 **실행기능(주의 유지·순서 지키기)**의 요구 수준이 기관 유형에 따라 달라지며, 이는 관찰 점수의 패턴 차이로 번역될 수 있습니다. ` +
                `본 보고서는 이러한 차이를 “우열”이 아니라 **각 유형 아이들이 숲에서 어떤 독특한 기질적 분포를 보이는가**에 초점을 맞춥니다.\n\n` +
                `어린이집 평균은 SPRT·AUTT 축에서 따뜻한 정서적 안정감과 신중함이 읽히기 쉬운 구조이고, 유치원 평균은 SUMT·WINT 축에서 주도성·탐구·과업 마무리가 두드러질 여지가 있습니다—이는 가설이며, 실제 곡선은 아래 레이더와 표가 말해 줍니다.`;

            const cardDay =
                `(본 카드는 관찰 ${nDay}건의 산술 평균을 바탕으로 합니다.)\n\n` +
                `보육 중심 환경에서 자라나는 아이들은 **애착 형성**과 **안전 기지**를 바탕으로 세상을 탐색합니다. 4STT의 **SPRT(봄)**와 **AUTT(가을)**는 이러한 맥락에서 특히 의미 있게 읽힐 수 있어요. ` +
                `일대일·소그룹 돌봄이 잦을수록 **정서 표현의 미세신호**에 민감해지고, 낯선 자극 앞에서는 **예측 가능한 루틴**을 먼저 확인하려는 경향이 강화될 수 있습니다.\n\n` +
                `숲에서는 이 아이들이 **오감을 통한 정서 교감**(바람 소리, 흙의 질감, 친구의 표정)을 풍부하게 경험할 때, 공감·신중 축의 고운 에너지가 자연스럽게 피어오릅니다. ` +
                `교사의 **공명적 반응(Reflective responding)**과 **명명하기(Name it to tame it)** 전략을 숲 언어로 옮기면, 기질적 강점이 학습으로 이어지기 쉽습니다.\n\n` +
                `현재 표본의 네 축 평균은 **SPRT ${meanDay['SPRT']}% · SUMT ${meanDay['SUMT']}% · AUTT ${meanDay['AUTT']}% · WINT ${meanDay['WINT']}%**로 요약됩니다. 이 프로필은 “조용한 숲”이 아니라 **관계와 안전이 숲길을 열어 주는 타입**으로 읽을 수 있습니다.`;

            const cardKg =
                `(본 카드는 관찰 ${nKg}건의 산술 평균을 바탕으로 합니다.)\n\n` +
                `누리과정과 또래 활동이 중심인 환경에서는 **사회적 참여**와 **과제 지속**이 발달 과제의 전면에 놓입니다. 4STT의 **SUMT(여름)**와 **WINT(겨울)**는 **주도적 탐색**과 **규칙·순서 내면화**의 흐름과 잘 맞닿아 있어요. ` +
                `집단 놀이와 프로젝트형 활동이 많을수록 **행동 활성화**와 **목표 지향성**이 동시에 자극될 수 있습니다.\n\n` +
                `숲에서는 이런 아이들이 **협동·모험·역할 분담** 속에서 탐구 에너지를 분출하고, **작은 완성 경험**을 쌓을 때 WINT 축이 단단해지는 경향이 있습니다. ` +
                `교사는 **협동학습 구조**와 **시각적 일정표**를 숲에도 가져와, 자극이 커질 때 **실행기능을 지지하는 발달적 비계(Scaffolding)**를 제공하면 좋습니다.\n\n` +
                `현재 표본 평균은 **SPRT ${meanKg['SPRT']}% · SUMT ${meanKg['SUMT']}% · AUTT ${meanKg['AUTT']}% · WINT ${meanKg['WINT']}%**입니다. 이 프로필은 **움직임과 과업이 숲을 열어 주는 타입**으로 읽을 수 있습니다.`;

            const gapParts = cats
                .filter((c) => (absDiff[c] || 0) >= 10)
                .map((c) => {
                    const sd = signedDiff[c] || 0;
                    const higher = sd > 0 ? '유치원' : '어린이집';
                    return (
                        `**${cn(c)}** 축에서 두 집단의 평균 차이가 **${absDiff[c]}포인트**에 달합니다(유치원 평균 − 어린이집 평균 기준 **${sd >= 0 ? '+' : ''}${sd}**). ` +
                        `이 간극은 개인의 고정된 성격 차이라기보다 **일상 환경이 요구하는 행동 규범·사회적 기대·놀이 구조**가 기질 발현을 어떻게 **촉진하거나 완충**하는지를 보여 주는 단서로 해석할 수 있습니다. ` +
                        `발달생태학적 관점에서, **마이크로시스템(교실·반 문화)**의 차이가 거시 프로필에 투영된 결과일 수 있으므로, 숲 프로그램 설계 시 **두 유형 모두에게 공정한 출발선**을 주는 예고·선택권·휴식 루틴이 특히 중요합니다.`
                    );
                });
            const gapAnalysis =
                gapParts.length > 0
                    ? gapParts.join('\n\n')
                    : `네 축 모두에서 두 집단의 평균 차이가 10퍼센트포인트 미만으로, **기질적 분포가 서로 멀지 않게 겹치는** 구간입니다. ` +
                      `이는 표본 내 기관들이 비슷한 숲 운영 철학을 공유하거나, 관찰 시기·입력 패턴이 유사했을 수도 있습니다. ` +
                      `그럼에도 미세한 차이는 레이더 형태로 읽히니, **반별·월별**로 데이터를 쌓을수록 거시 곡선이 선명해집니다.`;

            const solDay =
                `**어린이집 맞춤 · 안정적 애착을 강화하는 숲 산책법**\n\n` +
                `① 출발 전 **같은 문장으로 약속 고정**하기(“돌아올 곳은 여기”). ② 산책 중 **속도 맞추기 걷기**로 애착 대상(교사) 옆자리를 몸으로 기억하게 하기. ③ **오감 정지 1분**—바람·냄새 이름 붙이기로 정서 레이블링 연습. ` +
                `④ 돌아오며 **짧은 회상 삼문장**으로 하루를 마감합니다. 이 루틴은 **애착 이론**이 말하는 안전기지 탐색을 숲 버전으로 옮긴 것입니다.`;

            const solKg =
                `**유치원 맞춤 · 리더십과 규칙 준수를 배우는 숲 프로젝트**\n\n` +
                `① **숲 역할 배지**(탐험대장·안전요원·정리요원)를 하루씩 돌려 가며 사회적 역할 연습. ② **미니 미션 카드**(찾기·그리기·함께 옮기기)로 협동 과업 설계. ③ 마무리 **링 마무리 서클**에서 “오늘 지킨 약속 한 가지”만 공유. ` +
                `④ 다음 주 **연속 프로젝트**(나무 기록·곤충 호텔)로 실행기능을 지지합니다. 이는 **사회학습·자기조절** 발달을 숲 맥락에 심는 구조입니다.`;

            const researchFooter =
                `본 자료는 단일 기관의 내부 보고를 넘어, **지역 내 보육·교육 돌봄 생태계**를 읽는 1차 거시 지도로 활용할 수 있습니다. 숫자는 항상 **맥락과 함께** 읽혀야 하며, 표본 수·입력 시기·숲 프로그램의 질이 곡선을 바꿉니다. ` +
                `연구소는 “어느 유형이 더 낫다”가 아니라 **각 유형 아이들이 숲에서 어떤 기질적 결을 드러내는가**를 존중하는 해석을 지향합니다. ` +
                `현장의 목소리—교사 관찰 일지·학부모 이야기—를 이 곡선에 덧붙일 때, 데이터는 비로소 **설득력 있는 컨설팅 언어**가 됩니다.\n\n` +
                `후속 연구와 현장 맞춤 워크숍 문의는 기관 정책에 맞추어 별도 협의가 가능합니다. **숲은 모든 유형의 아이들의 속도를 기다립니다.**`;

            return {
                rsiLine,
                maturity,
                cardDay,
                cardKg,
                gapAnalysis,
                solDay,
                solKg,
                researchFooter
            };
        },

        /** 거시: 유아부 vs 초등부 (동일 RSI 구조, 서술만 교체) */
        buildPreschoolElementaryMacroNarrative(ctx) {
            const { meanDay, meanKg, nDay, nKg, rsiCat, rsiVal, absDiff, signedDiff } = ctx;
            const cats = SCHEMA.categories;
            const cn = (c) => SCHEMA.temperamentRankLabel[c] || c;

            const rsiLine =
                `**상대적 강점 지표(RSI)**로 본 이번 표본에서 **유아부**와 **초등부** 관찰의 거리가 가장 넓게 벌어진 축은 **${cn(rsiCat)}**이며, 평균 절대 차이는 약 **${rsiVal}퍼센트포인트**입니다. ` +
                (signedDiff[rsiCat] > 0
                    ? `현재 데이터에서는 초등부 집단의 ${cn(rsiCat)} 평균이 유아부보다 높게 나타났습니다. 누리·과제 구조·또래 규범이 서로 다른 발달 과제와 맞닿아 있어요.\n\n`
                    : signedDiff[rsiCat] < 0
                      ? `현재 데이터에서는 유아부 집단의 ${cn(rsiCat)} 평균이 초등부보다 높게 나타났습니다. 보육·애착·일상 예측 가능성이 이 축을 부각했을 수 있습니다.\n\n`
                      : `두 집단이 이 축에서 매우 가깝습니다.\n\n`);

            const maturity =
                `**발달 맥락 비교** 측면에서, 유아부는 **유아·유치 문항뱅크**로, 초등부는 **초등 문항뱅크**로 각각 산출됩니다. 같은 4축 언어로 읽되, **질문 맥락이 다르므로** 절대값 비교는 참고용이며, **집단 간 상대 패턴**에 주목해 주세요.`;

            const cardDay =
                `(유아부 관찰 ${nDay}건 평균)\n\n` +
                `보육·누리 환경에서의 기질 분포는 **애착·일상 루틴·소그룹 돌봄**과 연결되어 읽히는 경우가 많습니다. ` +
                `현재 표본 평균은 **SPRT ${meanDay['SPRT']}% · SUMT ${meanDay['SUMT']}% · AUTT ${meanDay['AUTT']}% · WINT ${meanDay['WINT']}%**입니다.`;

            const cardKg =
                `(초등부 관찰 ${nKg}건 평균)\n\n` +
                `방과 후·지역아동센터 등 초등 맥락에서는 **과제 지속·협동·규칙**과 연결된 기질 발현이 두드러질 수 있습니다. ` +
                `현재 표본 평균은 **SPRT ${meanKg['SPRT']}% · SUMT ${meanKg['SUMT']}% · AUTT ${meanKg['AUTT']}% · WINT ${meanKg['WINT']}%**입니다.`;

            const gapParts = cats
                .filter((c) => (absDiff[c] || 0) >= 10)
                .map((c) => {
                    const sd = signedDiff[c] || 0;
                    const higher = sd > 0 ? '초등부' : '유아부';
                    return (
                        `**${cn(c)}** 축에서 두 집단의 평균 차이가 **${absDiff[c]}포인트**에 달합니다(초등 − 유아 기준 **${sd >= 0 ? '+' : ''}${sd}**). ` +
                        `이 간극은 **문항뱅크 차이**와 **환경적 요구**가 함께 작용했을 수 있으므로, 해석 시 현장 맥락을 병행해 주세요.`
                    );
                });
            const gapAnalysis =
                gapParts.length > 0
                    ? gapParts.join('\n\n')
                    : `네 축 모두에서 두 집단의 평균 차이가 10퍼센트포인트 미만으로, **기질적 분포가 서로 멀지 않게 겹치는** 구간입니다.`;

            const solDay =
                `**유아부 맞춤 · 안정적 애착을 강화하는 숲 산책법**\n\n` +
                `① 출발 전 **같은 문장으로 약속 고정**하기. ② **속도 맞추기 걷기**로 안전기지를 몸으로 기억하게 하기. ③ **오감 정지 1분**으로 정서 레이블링 연습.`;

            const solKg =
                `**초등부 맞춤 · 협동과 과업을 숲에 심기**\n\n` +
                `① **숲 역할 배지**로 사회적 역할 연습. ② **미니 미션 카드**로 협동 과업. ③ 마무리 **서클**에서 오늘 지킨 약속 한 가지 공유.`;

            const researchFooter =
                `본 자료는 **유아부·초등부 문항뱅크**로 각각 산출된 평균을 한 화면에 겹쳐 읽는 **탐색용 거시 지도**입니다. ` +
                `“어느 쪽이 우수”가 아니라 **각 집단이 숲에서 어떤 기질 언어를 드러내는가**를 존중하는 해석을 지향합니다.`;

            return {
                rsiLine,
                maturity,
                cardDay,
                cardKg,
                gapAnalysis,
                solDay,
                solKg,
                researchFooter
            };
        },

        consultingSectionHtml(title, bodyMdLike, size) {
            const pClass =
                size === 'lg'
                    ? 'text-sm md:text-base text-ms-body leading-relaxed mb-5 last:mb-0'
                    : 'text-sm text-ms-body leading-relaxed mb-4 last:mb-0';
            const inner = String(bodyMdLike || '')
                .split(/\n\n+/)
                .map((p) => p.trim())
                .filter(Boolean)
                .map((p) => {
                    let t = this.esc(p);
                    t = t.replace(/\*\*(.+?)\*\*/g, '<strong class="text-[#2D4A3E]">$1</strong>');
                    return `<p class="${pClass}">${t}</p>`;
                })
                .join('');
            const hClass =
                size === 'lg'
                    ? 'text-sm md:text-base font-black text-[#2D4A3E] tracking-[0.12em] mb-5 pb-2 border-b-2 border-[#2D4A3E]/25'
                    : 'text-xs font-black text-[#2D4A3E] tracking-[0.15em] mb-4 pb-2 border-b-2 border-[#2D4A3E]/20';
            return `
                <section class="ms-print-avoid-break mb-10 last:mb-0">
                    <h3 class="${hClass}">${this.esc(title)}</h3>
                    <div>${inner}</div>
                </section>
            `;
        },

        /** 메인(설정) 화면 · 최근 검사 히스토리 (폐쇄형 금고 기준) */
        buildRecentHistorySectionHtml() {
            const byName = {};
            STATE.institutions.forEach((inst) => {
                const k = String(inst.name || '').trim();
                if (!k) return;
                if (!byName[k]) byName[k] = [];
                byName[k].push(inst);
            });
            const keys = Object.keys(byName).filter((k) => byName[k].some((m) => this.hasAnyCount(m.counts)));
            keys.sort((a, b) => {
                const ta = Math.max(...byName[a].map((x) => new Date(x.updatedAt || 0).getTime()));
                const tb = Math.max(...byName[b].map((x) => new Date(x.updatedAt || 0).getTime()));
                return tb - ta;
            });
            if (!keys.length) {
                return '';
            }
            const rows = keys.slice(0, 25).map((k) => {
                const members = byName[k];
                const n = members.length;
                const latest = members
                    .slice()
                    .sort((a, b) => String(b.updatedAt || '').localeCompare(String(a.updatedAt || '')))[0];
                const d = latest.updatedAt ? String(latest.updatedAt).slice(0, 10) : '—';
                const enc = encodeURIComponent(k);
                const safeEnc = enc.replace(/'/g, '%27');
                return `
                    <button type="button"
                        class="w-full text-left rounded-2xl border border-[rgba(45,74,62,0.1)] bg-white/85 hover:bg-white hover:border-[#2D4A3E]/25 px-4 py-3.5 transition-colors flex flex-wrap items-baseline justify-between gap-2 group"
                        onclick="MS.openHistoryToReport('${safeEnc}')">
                        <span class="font-black text-[#2D4A3E] text-sm group-hover:underline decoration-[#D4A373] underline-offset-4">${this.esc(k)}</span>
                        <span class="text-[10px] font-bold text-ms-muted shrink-0">${this.esc(d)} · 아동(기록) ${n}명</span>
                    </button>
                `;
            }).join('');
            return `
                <div class="ms-vault-panel p-5 md:p-6 mb-2 print-hidden">
                    <div class="flex items-center gap-2 mb-1">
                        <span class="text-lg leading-none" aria-hidden="true">🔐</span>
                        <h3 class="text-xs font-black text-[#2D4A3E] tracking-[0.18em]">최근 검사 기록</h3>
                    </div>

        renderResult(el) {
            const inst = STATE.selected();
            if (!inst) {
                STATE.step = 'dashboard';
                this.render();
                return;
            }
            const tgRes = SCHEMA.getTargetGroup(inst);
            const scores = SCHEMA.scoresFromCounts(inst.counts, tgRes);
            const totalsO = SCHEMA.rawOTotalsFromCounts(inst.counts, tgRes);
            const rankedTemperaments = SCHEMA.rankTemperamentsByRawO(totalsO);
            const totalOXSlots = SCHEMA.totalOXSlotsFromCounts(inst.counts, tgRes);
            const hasRevPs = tgRes === 'preschool' && SCHEMA.questionsPreschool.some((q) => q.isReverse);

        async exportBackup() {
            const payload = {
                mindstoryExport: true,
                schemaVersion: SCHEMA.version,
                storageKey: STORAGE_KEY,
                exportedAt: new Date().toISOString(),
                institutions: STATE.institutions
            };
            const jsonStr = JSON.stringify(payload, null, 2);
            const blob = new Blob([jsonStr], { type: 'application/json' });
            const d = new Date().toISOString().slice(0, 10);
            const filename = `mindstory-forest-temperament-${d}.json`;

            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            setTimeout(() => URL.revokeObjectURL(url), 2500);

            const file = new File([blob], filename, { type: 'application/json' });
            if (typeof navigator !== 'undefined' && navigator.share) {
                try {
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        await navigator.share({
                            files: [file],
                            title: APP_TITLE_DE,
                            text: '관찰 기록 백업(JSON)입니다.'
                        });
                    } else {
                        await navigator.share({
                            title: APP_TITLE_DE,
                            text: 'JSON 파일이 저장되었습니다. 파일 앱에서 카카오톡으로 보내실 수 있어요.'
                        });
                    }
                } catch (err) {
                    if (err && err.name !== 'AbortError') {
                        console.warn('[share]', err);
                    }
                }
            }
        },

        triggerImport() {
            const inp = document.getElementById('ms-import-input');
            if (inp) {
                inp.value = '';
                inp.onchange = () => UI.handleImportFile(inp.files[0]);
                inp.click();
            }
        },

        handleImportFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                try {
                    const data = JSON.parse(reader.result);
                    const list = data.institutions;
                    if (!Array.isArray(list)) {
                        alert('파일 형식이 맞지 않아요. 보낸 JSON 인지 확인해 주세요.');
                        return;
                    }
                    const existingIds = new Set(STATE.institutions.map((x) => x.id));
                    const normalize = (i) => {
                        if (!i.id) i.id = newVaultRecordId();
                        if (!i.name) i.name = '이름 없음';
                        if (!i.type) i.type = STATE.guessType(i.name);
                        if (i.groupName === undefined) i.groupName = '';
                        STATE.ensureCounts(i);
                    };
                    let added = 0;
                    let skipped = 0;
                    list.forEach((raw, idx) => {
                        const incoming = JSON.parse(JSON.stringify(raw));
                        normalize(incoming);
                        if (existingIds.has(incoming.id)) {
                            skipped += 1;
                            return;
                        }
                        while (STATE.institutions.some((x) => x.id === incoming.id)) {
                            incoming.id = newVaultRecordId();
                        }
                        existingIds.add(incoming.id);
                        STATE.institutions.push(incoming);
                        added += 1;
                    });
                    STATE.institutions.sort((a, b) =>
                        String(b.updatedAt || '').localeCompare(String(a.updatedAt || ''))
                    );
                    STATE.persist();
                    STATE.step = 'dashboard';
                    STATE.isPreviewSample = false;
                    UI.render();
                    const skipMsg = skipped ? ` (이미 금고에 있는 ID ${skipped}건은 건너뜀)` : '';
                    alert(`백업에서 ${added}건을 합쳤어요.${skipMsg} 전체 목록은 최신순으로 정리했습니다.`);
                } catch (e) {
                    alert('JSON 읽기에 실패했어요.');
                }
            };
            reader.readAsText(file, 'UTF-8');
        }
    };

        submitUnifiedSetupFromModal() {
            const instEl = document.getElementById('ms-modal-inst-name');
            const name = String((instEl && instEl.value) || '').trim();
            if (!name) {
                alert('기관명을 입력해 주세요.');
                return;
            }
            const exEl = document.getElementById('ms-examiner-name-modal');
            const examiner = String((exEl && exEl.value) || '').trim();
            if (!examiner) {
                alert('진행자(해설사) 성함을 입력해 주세요.');
                return;
            }
            MS.onExaminerNameInput(examiner);
            STATE.searchTerm = name;
            const phase = STATE.observationStage === 'post' ? 'post' : 'pre';
            let inst = STATE.institutions.find((i) => String(i.name).trim() === name);
            if (!inst) {
                if (STATE.targetGroup === 'preschool' && !STATE.setupTypeOverride) {
                    alert('유아부는 기관 유형(어린이집·유치원·기타)을 선택해 주세요.');
                    return;
                }
                if (STATE.targetGroup === 'elementary' && !STATE.setupTypeOverride) {
                    alert('초등부는 기관 유형(지역아동센터·방과후교실·초등학교)을 선택해 주세요.');
                    return;
                }
                inst = STATE.addInstitution(name);
                inst.type = STATE.setupTypeOverride || STATE.guessType(name);
                inst.obsPhase = phase;
            } else {
                STATE.selectedId = inst.id;
                STATE.ensureCounts(inst);
                if (STATE.setupTypeOverride) inst.type = STATE.setupTypeOverride;
                if (phase === 'pre' || phase === 'post') inst.obsPhase = phase;
            }
            inst.targetGroup = STATE.targetGroup === 'elementary' ? 'elementary' : 'preschool';
            const gEl = document.getElementById('ms-unified-group-name');
            const gn = gEl && gEl.value.trim() ? gEl.value.trim().slice(0, 120) : '';
            inst.groupName = gn;
            inst.obsLocation = STATE.obsLocation === 'indoor' ? 'indoor' : 'forest';
            STATE.setupObsPhase = phase;
            STATE.setupTypeOverride = null;
            STATE.unifiedSetupGroupDraft = '';
            STATE.step = 'input';
            STATE.isPreviewSample = false;
            STATE.touchSelected();
            STATE.persist();
            MS.closeForestModal();
            UI.render();
        },
        /** v18.0: 기관명만 비우고 모달 유지 (입력은 브라우저·IME에 맡김) */
        clearModalInstNameInput(ev) {
            if (ev) {
                ev.preventDefault();
                ev.stopPropagation();
            }
            STATE.searchTerm = '';
            STATE.selectedId = null;
            STATE.setupTypeOverride = null;
            MS._modalInstDropdownAll = false;
            try {
                STATE.persist();
            } catch (_) {
                /* ignore */
            }
            MS.openNewExamPrepModal();
            requestAnimationFrame(() => {
                const n = document.getElementById('ms-modal-inst-name');
                if (n) {
                    n.value = '';
                    n.focus();
                }
                MS.updateModalInstDropdown();
            });
        },
        setPrepModalTargetGroup(tg) {
            if (tg !== 'preschool' && tg !== 'elementary') return;
            STATE.targetGroup = tg;
            const sel = STATE.selected();
            const instInp = document.getElementById('ms-modal-inst-name');
            const nameVal = String((instInp && instInp.value) || STATE.searchTerm || '');
            if (sel) {
                STATE.setupTypeOverride = null;
            } else {
                const type = STATE.setupTypeOverride || STATE.guessType(nameVal);
                if (tg === 'elementary' && (type === '어린이집' || type === '유치원' || type === '기타')) {
                    STATE.setupTypeOverride = '방과후교실';
                } else if (
                    tg === 'preschool' &&
                    (type === '지역아동센터' || type === '방과후학교' || type === '방과후교실' || type === '초등학교')
                ) {
                    STATE.setupTypeOverride = '어린이집';
                }
            }
            try {
                STATE.persist();
            } catch (_) {
                /* ignore */
            }
            MS.openNewExamPrepModal();
        },

        scheduleForestGroupSubmit() {
            requestAnimationFrame(() => {
                void MS.submitForestGroupResult();

        submitForestGroupResult() {
            if (STATE.isPreviewSample) return;
            const inst = STATE.selected();
            if (!inst) return;
            const iname = String(inst.name || '').trim();
            if (!iname) return;
            try {
                const key = 'ms_forest_submitted:' + inst.id + ':' + String(inst.updatedAt || '');
                if (typeof sessionStorage !== 'undefined' && sessionStorage.getItem(key)) return;
            } catch (_) {
                /* ignore */
            }
            const tg = SCHEMA.getTargetGroup(inst);
            const scores = SCHEMA.scoresFromCounts(inst.counts, tg);
            const totalsO = SCHEMA.rawOTotalsFromCounts(inst.counts, tg);
            const ranked = SCHEMA.rankTemperamentsByRawO(totalsO);
            const totalSlots = SCHEMA.totalOXSlotsFromCounts(inst.counts, tg);
            const densityPct = SCHEMA.temperamentDensityPercent(totalsO);
            const test_type =
                inst.obsPhase === 'pre' || inst.obsPhase === 'post' ? inst.obsPhase : 'unspecified';
            const observation_stage =
                inst.obsPhase === 'pre' || inst.obsPhase === 'post'
                    ? inst.obsPhase
                    : STATE.observationStage === 'post'
                      ? 'post'
                      : 'pre';
            const group_name = String(inst.groupName || '').trim();
            const examiner = String(MS.getExaminerName() || '').trim();
            const location = inst.obsLocation === 'indoor' ? '실내' : '숲';
            const scoreM = totalsO.WINT || 0;
            const scoreN = totalsO.SPRT || 0;
            const scoreK = totalsO.AUTT || 0;
            const scoreD = totalsO.SUMT || 0;
            /** 구글 시트 doPost: 열 순서와 동일한 키 순서(SPRT→scoreN … WINT→scoreM) */
            const sheetPayload = {
                instType: String(inst.type || ''),
                institute: iname,
                stage: observation_stage,
                scoreN,
                scoreD,
                scoreK,
                scoreM,
                className: group_name,
                targetGroup: tg,
                location,
                examiner
            };
            void fetch(FOREST_SHEETS_WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(sheetPayload),
                mode: 'cors',
                credentials: 'omit'
            }).catch(() => {});
            const payload = {
                instType: String(inst.type || ''),
                institute: iname,
                stage: observation_stage,
                scoreN,
                scoreD,
                scoreK,
                scoreM,
                className: group_name,
                targetGroup: tg,
                location,
                examiner,
                institution_name: iname,
                group_name: group_name,
                test_type: test_type,
                observation_stage: observation_stage,
                target_group: tg,
                scores: {
                    schema_version: SCHEMA.version,
                    target_group: tg,
                    observation_stage: observation_stage,
                    institution_type: inst.type || '',
                    examiner_name: examiner,
                    record_id: inst.id,
                    updated_at: inst.updatedAt || '',
                    scoring_model: 'o_x_routed_v1',
                    x_temperament_routing: { ...SCHEMA.xTemperamentForOCat },
                    total_o_x_slots: totalSlots,
                    density_percent_by_temperament: densityPct,
                    totals_o_by_temperament: totalsO,
                    rank_letters: ranked.map((r) => r.letter),
                    rank_full_names: ranked.map((r) => r.cat),
                    rank_detail: ranked,
                    percent_by_type: scores,
                    dominant_type: ranked[0] ? ranked[0].cat : '',
                    dominant_type_letter: ranked[0] ? ranked[0].letter : '',
                    raw_answers: SCHEMA.buildRawAnswersArray(inst.counts, tg),
                    counts: inst.counts
                }
            };
            fetch('/api/forest-results', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
                credentials: 'same-origin'
            })
                .then((r) => {
                    if (!r.ok) return;
                    try {
                        const key = 'ms_forest_submitted:' + inst.id + ':' + String(inst.updatedAt || '');
                        if (typeof sessionStorage !== 'undefined') sessionStorage.setItem(key, '1');
                    } catch (_) {
                        /* ignore */
                    }
                    try {
                        MS.showForestTransmitSuccessModal();
                    } catch (_) {
                        /* ignore */
                    }
                })
                .catch(() => {});
        },

        bindInstSuggestCloseOutside() {

            MS._instSuggestCloseBound = true;
            document.addEventListener(
                'mousedown',
                (ev) => {
                    const t = ev.target;

                        const inp = document.getElementById('inst-name');
                        const btn = document.getElementById('ms-inst-toggle-all');
                        const clearS = document.getElementById('ms-inst-clear');
                        if (
                            panelSetup.contains(t) ||
                            inp === t ||

                            (btn && btn.contains(t)) ||
                            clearS === t ||
                            (clearS && clearS.contains(t))
                        ) {
                            /* keep open */
                        } else {
                            MS._instDropdownAll = false;
                            panelSetup.innerHTML = '';

                    const panelModal = document.getElementById('ms-modal-inst-dropdown');

                        const clearM = document.getElementById('ms-modal-inst-clear');
                        /** 검사 설정 카드 안(대상 탭·유형 등) 클릭은 드롭다운을 닫지 않음 — 유아·유치부 클릭 시 목록 유지 */
                        const modalPrepCard = document.querySelector('#ms-modal-root > div.relative.w-full.max-w-md');
                        const el = t && t.nodeType === 1 ? t : t && t.parentElement;
                        if (modalPrepCard && el && modalPrepCard.contains(el)) {
                            return;
                        }
                        if (
                            panelModal.contains(t) ||
                            inpM === t ||
                            (inpM && inpM.contains(t)) ||
                            btnM === t ||
                            (btnM && btnM.contains(t)) ||
                            clearM === t ||
                            (clearM && clearM.contains(t))
                        ) {
                            return;
                        }
                        MS._modalInstDropdownAll = false;
                        panelModal.innerHTML = '';
                        panelModal.classList.add('hidden');
                        if (btnM) btnM.setAttribute('aria-expanded', 'false');
                        if (inpM) inpM.setAttribute('aria-expanded', 'false');
                    }

            );

        setInstToggleAria(open) {
            const btn = document.getElementById('ms-inst-toggle-all');
            const inp = document.getElementById('inst-name');
