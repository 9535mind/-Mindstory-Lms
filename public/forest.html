        setDashboardBuilderInstFromSelect(sel) {
            try {
                STATE.dashboardBuilderInst = sel.value ? decodeURIComponent(sel.value) : '';
            } catch (_) {
                STATE.dashboardBuilderInst = sel.value || '';
            }
            STATE.persist();
        },
        setDashboardBuilderType(v) {
            STATE.dashboardBuilderTypeFilter = v;
            STATE.persist();
        },
        setDashboardBuilderMode(v) {
            STATE.dashboardBuilderMode = v === 'prepost' || v === 'group' ? v : 'single';
            if (STATE.dashboardBuilderMode === 'group') {
                if (STATE.dashboardBuilderTypeFilter !== 'cmp_pe' && STATE.dashboardBuilderTypeFilter !== 'cmp_dk') {
                    STATE.dashboardBuilderTypeFilter = 'cmp_dk';
                }
            } else if (STATE.dashboardBuilderTypeFilter === 'cmp_pe' || STATE.dashboardBuilderTypeFilter === 'cmp_dk') {
                STATE.dashboardBuilderTypeFilter = 'all';
            }
            STATE.persist();
            UI.render();
        },
        matchesBuilderKind(inst, tf) {
            if (tf === 'all') return true;
            const tg = SCHEMA.getTargetGroup(inst);
            if (tf === 'preschool_daycare') return tg === 'preschool' && SCHEMA.preschoolKindNorm(inst) === '어린이집';
            if (tf === 'preschool_kg') return tg === 'preschool' && SCHEMA.preschoolKindNorm(inst) === '유치원';
            if (tf === 'preschool_other') return tg === 'preschool' && SCHEMA.preschoolKindNorm(inst) === '기타';
            if (tf === 'elem_community') return tg === 'elementary' && SCHEMA.elementaryTypeNorm(inst) === '지역아동센터';
            if (tf === 'elem_afterschool') return tg === 'elementary' && SCHEMA.elementaryTypeNorm(inst) === '방과후교실';
            if (tf === 'elem_school') return tg === 'elementary' && SCHEMA.elementaryTypeNorm(inst) === '초등학교';
            return true;
        },
        filterMembersByKindFilter(members, tf) {
            if (tf === 'all') return members;
            return members.filter((m) => MS.matchesBuilderKind(m, tf));
        },
        _builderKindLabel(tf) {
            const map = {
                all: '전체',
                preschool_daycare: '어린이집',
                preschool_kg: '유치원',
                preschool_other: '기타',
                elem_community: '지역아동센터',
                elem_afterschool: '방과후교실',
                elem_school: '초등학교',
                cmp_dk: '어린이집↔유치원',
                cmp_pe: '유아부↔초등부'
            };
            return map[tf] || tf;
        },
        _builderAggregateTitle(tf) {
            return MS._builderKindLabel(tf) + ' · 전체 집계';
        },
        _builderReportTitle(instKey, tf, kind) {
            const kl = MS._builderKindLabel(tf);
            if (kind === 'prepost') return instKey + (tf === 'all' ? '' : ' · ' + kl) + ' · 사전·사후';
            return instKey + (tf === 'all' ? '' : ' · ' + kl);
        },
        runCustomReportBuilder() {
            const instKey = String(STATE.dashboardBuilderInst || '').trim();
            const mode = STATE.dashboardBuilderMode;
            const tf = STATE.dashboardBuilderTypeFilter;

            if (mode === 'group') {
                if (instKey) {
                    alert('집단 간 비교는 기관을「전체」로 두어 주세요.');
                    return;
                }
                if (tf === 'cmp_pe') {
                    const macro = SCHEMA.aggregatePreschoolVsElementary(STATE.institutions, (c) => UI.hasAnyCount(c));
                    if (!macro) {
                        alert('유아부와 초등부 각각에서 숫자가 입력된 관찰이 한 건 이상씩 있어야 비교합니다.');
                        return;
                    }
                    STATE.macroVariant = 'pe';
                    STATE.step = 'institution-type-macro-report';
                    STATE.persist();
                    UI.render();
                    return;
                }
                STATE.macroVariant = 'dk';
                MS.openInstitutionTypeMacroReport();
                return;
            }

            if (mode === 'prepost') {
                if (!instKey) {
                    alert('사전·사후 비교는 기관명을 선택해 주세요.');
                    return;
                }
                let members = SCHEMA.membersByInstitutionName(STATE.institutions, instKey);
                members = MS.filterMembersByKindFilter(members, tf);
                const cmp = SCHEMA.aggregatePrePostComparison(members, (c) => UI.hasAnyCount(c));
                if (!cmp) {
                    alert(
                        '필터 조건에 맞는 사전·사후 관찰이 각각 한 건 이상, 그리고 숫자 입력이 완료되어야 합니다.'
                    );
                    return;
                }
                STATE.selectedGroupName = instKey;
                STATE.reportAggregateMembers = members;
                STATE.reportAggregateTitle = MS._builderReportTitle(instKey, tf, 'prepost');
                STATE.reportFromDashboard = true;
                STATE.step = 'institution-prepost-report';
                STATE.persist();
                UI.render();
                return;
            }

            if (instKey && tf === 'all') {
                const members = SCHEMA.membersByInstitutionName(STATE.institutions, instKey);
                const agg = SCHEMA.aggregateMeanScores(members, (c) => UI.hasAnyCount(c));
                if (!agg) {
                    alert('관찰 숫자가 입력된 기록이 없어요.');
                    return;
                }
                STATE.selectedGroupName = instKey;
                STATE.reportAggregateMembers = null;
                STATE.reportAggregateTitle = '';
                STATE.reportFromDashboard = true;
                STATE.step = 'institution-report';
                STATE.persist();
                UI.render();
                return;
            }
            if (instKey && tf !== 'all') {
                let members = SCHEMA.membersByInstitutionName(STATE.institutions, instKey);
                members = MS.filterMembersByKindFilter(members, tf);
                const agg = SCHEMA.aggregateMeanScores(members, (c) => UI.hasAnyCount(c));
                if (!agg) {
                    alert('선택한 유형에 해당하는 기록이 없거나 숫자 입력이 없어요.');
                    return;
                }
                STATE.selectedGroupName = instKey;
                STATE.reportAggregateMembers = members;
                STATE.reportAggregateTitle = MS._builderReportTitle(instKey, tf, 'single');
                STATE.reportFromDashboard = true;
                STATE.step = 'institution-report';
                STATE.persist();
                UI.render();
                return;
            }
            if (!instKey && tf !== 'all') {
                const members = STATE.institutions.filter((i) => MS.matchesBuilderKind(i, tf));
                const agg = SCHEMA.aggregateMeanScores(members, (c) => UI.hasAnyCount(c));
                if (!agg) {
                    alert('해당 유형에 맞는 관찰 데이터가 충분하지 않아요.');
                    return;
                }
                STATE.selectedGroupName = '';
                STATE.reportAggregateMembers = members;
                STATE.reportAggregateTitle = MS._builderAggregateTitle(tf);
                STATE.reportFromDashboard = true;
                STATE.step = 'institution-report';
                STATE.persist();
                UI.render();
                return;
            }
            alert('기관을 선택하거나, 유형 필터를 지정해 주세요.');
        },
        setSetupTargetGroup(tg) {
            STATE.targetGroup = tg === 'elementary' ? 'elementary' : 'preschool';
            STATE.setupTypeOverride = null;
            const sel = STATE.selected();
            if (sel) {
                sel.targetGroup = STATE.targetGroup;
                if (STATE.targetGroup === 'elementary') {

        appendInstNameSuffix(suffix, inputId) {
            const id = inputId || 'inst-name';
            const el = document.getElementById(id);
            if (!el || !suffix) return;
            const suf = String(suffix).trim();
            if (!suf) return;
            const v = String(el.value || '');
            if (v.includes(suf)) return;
            el.value = v + suf;
            if (id === 'ms-modal-inst-name') {
                MS.applyModalInstNameSync(el);
            } else {
                MS.applySetupInstNameFromInput(el.value);
            }
            try {
                el.focus();
                const len = el.value.length;
                el.setSelectionRange(len, len);
            } catch (_) {
                /* ignore */
            }
        },
        /** 초등부: 기관명 + 유형 접미어 자동 완성(지역아동센터·방과후교실·초등학교). 기존 접미어가 있으면 교체 */
        applyElementaryTypeSuffixToInstName(t, source) {
            const elem = ['지역아동센터', '방과후교실', '초등학교'];
            const suf = String(t || '').trim();
            if (elem.indexOf(suf) < 0) return;
            let base = '';
            if (source === 'modal') {
                const mel = document.getElementById('ms-modal-inst-name');
                base = mel ? String(mel.value || '').trim() : '';
            } else {
                const selEl = document.getElementById('inst-name');
                base = selEl ? String(selEl.value || '').trim() : '';
            }
            if (!base) {
                base = String(STATE.searchTerm || (STATE.selected() && STATE.selected().name) || '').trim();
            }
            let i;
            for (i = 0; i < elem.length; i++) {
                const s = elem[i];
                if (base.endsWith(s) && base.length > s.length) {
                    base = base.slice(0, -s.length).trimEnd();
                    break;
                }
            }
            if (base.endsWith(suf)) {
                STATE.searchTerm = base;
                const sel0 = STATE.selected();
                if (sel0) sel0.name = base;
                return;
            }
            const next = base + suf;
            STATE.searchTerm = next;
            const sel = STATE.selected();
            if (sel) sel.name = next;
        },
        setType(t) {
            const sel = STATE.selected();
            if (sel) {
                sel.type = t;
                STATE.setupTypeOverride = null;
            } else {
                STATE.setupTypeOverride = t;
            }
            if (STATE.targetGroup === 'elementary') {
                MS.applyElementaryTypeSuffixToInstName(t, 'setup');
            }
            STATE.persist();
            UI.render();
        },
        startTest() {
            if (!String(MS.getExaminerName() || '').trim()) {
                alert('진행자(해설사) 성함을 입력해 주세요. 대시보드에서 「새 검사 시작」을 눌러 주세요.');
                return;
            }
            const el = document.getElementById('inst-name');
            const name = (el && el.value.trim()) || STATE.searchTerm.trim();
            if (!name) {
                alert('기관 이름을 넣어 주세요.');
                return;
            }
            const phase = STATE.observationStage === 'post' ? 'post' : 'pre';
            let inst = STATE.institutions.find((i) => String(i.name).trim() === name);
            if (!inst) {
                if (STATE.targetGroup === 'preschool' && !STATE.setupTypeOverride) {
                    alert('유아부는 기관 유형(어린이집·유치원·기타)을 선택해 주세요.');
                    return;
                }
                if (STATE.targetGroup === 'elementary' && !STATE.setupTypeOverride) {
                    alert('초등부는 기관 유형(지역아동센터·방과후교실·초등학교)을 선택해 주세요.');
                    return;
                }
                inst = STATE.addInstitution(name);
                inst.type = STATE.setupTypeOverride || STATE.guessType(name);
                inst.obsPhase = phase;
            } else {
                STATE.selectedId = inst.id;
                STATE.ensureCounts(inst);
                if (STATE.setupTypeOverride) inst.type = STATE.setupTypeOverride;
                if (phase === 'pre' || phase === 'post') inst.obsPhase = phase;
            }
            inst.targetGroup = STATE.targetGroup === 'elementary' ? 'elementary' : 'preschool';
            const gEl = document.getElementById('ms-group-name');
            const gn = gEl && gEl.value.trim() ? gEl.value.trim().slice(0, 120) : '';
            inst.groupName = gn;
            const pcEl = document.getElementById('ms-setup-participant-count');
            const pcRaw = pcEl ? String(pcEl.value || '').trim() : '';
            if (pcRaw === '') {
                inst.participantTargetCount = null;
            } else {
                const pn = parseInt(pcRaw, 10);
                inst.participantTargetCount = Number.isFinite(pn) && pn > 0 ? pn : null;
            }
            STATE.setupObsPhase = phase;
            STATE.setupTypeOverride = null;
            STATE.step = 'input';
            STATE.isPreviewSample = false;
            STATE.touchSelected();
            STATE.persist();
            UI.render();
        },
        openInput(id) {
            STATE.selectedId = id;
            STATE.step = 'input';
            STATE.isPreviewSample = false;
            const sel = STATE.selected();
            if (sel) STATE.targetGroup = SCHEMA.getTargetGroup(sel);
            STATE.persist();
            UI.render();
        },

        /** 히스토리: 기관명 그룹 → 최신·유효 기록으로 결과 또는 입력 */
        openHistoryToReport(encName) {
            const name = decodeURIComponent(encName || '').trim();
            if (!name) return;
            const members = SCHEMA.membersByInstitutionName(STATE.institutions, name);
            if (!members.length) return;
            const withData = members.filter((m) => UI.hasAnyCount(m.counts));
            const pool = withData.length ? withData : members;
            pool.sort((a, b) => String(b.updatedAt || '').localeCompare(String(a.updatedAt || '')));
            const pick = pool[0];
            STATE.selectedId = pick.id;
            STATE.isPreviewSample = false;
            STATE.searchTerm = name;
            if (withData.length && UI.hasAnyCount(pick.counts)) {
                if (!MS.forestRespondentTotalsOk(pick)) {
                    MS.showForestRespondentMismatchModal();
                    return;
                }
                STATE.step = 'result';
            } else {
                STATE.step = 'input';
            }
            STATE.persist();
            UI.render();
        },
        setCount(qid, field, val) {
            const inst = STATE.selected();
            if (!inst) return;
            STATE.ensureCounts(inst);
            inst.counts[qid][field] = val === '' ? '' : String(Math.max(0, parseInt(val, 10) || 0));
            STATE.isPreviewSample = false;
            STATE.touchSelected();
            STATE.persist();
            if (STATE.step === 'input') {
                MS.refreshInputSubmitButton();
                MS.refreshParticipantInputWarnings();
            }
        },
        /** 입력 중 전체 완료 시에만 하단 버튼 활성화 (전체 리렌더 없이) */
        refreshInputSubmitButton() {
            if (STATE.step !== 'input') return;
            const inst = STATE.selected();
            if (!inst) return;
            const lastDone = UI.lastQuestionRowComplete(inst);
            const wrap = document.getElementById('ms-input-submit-wrap');
            if (wrap) {
                wrap.classList.toggle('hidden', !lastDone);
                wrap.setAttribute('aria-hidden', lastDone ? 'false' : 'true');
            }
            const btn = document.getElementById('ms-input-submit-btn');
            if (!btn) return;
            const ok = UI.allInputQuestionsFilled(inst) && MS.forestRespondentTotalsOk(inst);
            btn.disabled = !ok;
            btn.classList.toggle('opacity-45', !ok);
            btn.classList.toggle('cursor-not-allowed', !ok);
            btn.setAttribute('aria-disabled', ok ? 'false' : 'true');
        },
        /** Q1 기준 인원과 Q2~ 마지막 문항 합이 다를 때 문항별 경고 문구 */
        refreshParticipantInputWarnings() {
            if (STATE.step !== 'input') return;
            const inst = STATE.selected();
            if (!inst) return;
            try {
                STATE.ensureCounts(inst);
            } catch (_) {
                return;
            }
            const tg = MS.resolveForestTargetGroup(inst);
            const qs = SCHEMA.questionsForGroup(tg);
            if (qs.length < 2) return;
            const pt = parseInt(inst.participantTargetCount, 10);
            const baseline =
                Number.isFinite(pt) && pt > 0 ? pt : SCHEMA.participantCountFromQ1(inst.counts, tg);
            for (let i = 1; i < qs.length; i++) {
                const q = qs[i];
                const row = inst.counts[q.id] || { yes: '', no: '' };
                const tot = (parseInt(row.yes, 10) || 0) + (parseInt(row.no, 10) || 0);
                const el = document.getElementById('ms-q-participant-warn-' + q.id);
                if (!el) continue;
                if (tot !== baseline) {
                    el.textContent = '⚠️ 인원이 맞지 않습니다 (기준: ' + baseline + '명)';
                    el.classList.remove('hidden');
                } else {
                    el.textContent = '';
                    el.classList.add('hidden');
                }
            }
        },
        goResult() {
            const inst = STATE.selected();

                const tgG = inst ? SCHEMA.getTargetGroup(inst) : 'preschool';
                alert(

                alert('인원을 확인해 주세요.');

            STATE.touchSelected();
            void (async function () {
                let r;
                try {
                    r = await MS.submitForestGroupResult();

                    try {
                        console.error('[forest] goResult 전송', err);

                        /* ignore */

                    STATE.step = 'result';

                    }

                <div class="absolute inset-0 bg-black/45" onclick="MS.closeForestMapModal()" aria-hidden="true"></div>
                <div class="relative w-full max-w-md rounded-t-[1.75rem] sm:rounded-[2rem] bg-[#FDFBF7] shadow-2xl border border-[#2D4A3E]/12 p-6 md:p-8 max-h-[88vh] overflow-y-auto pb-[max(1.25rem,env(safe-area-inset-bottom,0px))] sm:pb-8" onclick="event.stopPropagation()">
                    <h3 id="ms-modal-title" class="text-lg md:text-xl font-black text-[#2D4A3E] text-center mb-1 leading-tight">우리 아이의 마음 숲 지도</h3>
                    <p class="text-center text-[12px] text-gray-400 mb-4">${getAppBrandShortForGroup(tg)} · 네 축 기질 해설</p>
                    <p class="text-sm text-ms-body leading-relaxed mt-2 mb-6 text-left">${UI.esc(summary)}</p>
                    <button type="button" class="w-full rounded-full border-2 border-[#2D4A3E] bg-transparent text-[#2D4A3E] font-bold py-3 text-sm mb-2 hover:bg-[rgba(45,74,62,0.06)]" onclick="MS.goHomeToDashboard()">🏠 홈으로 — 대시보드</button>
                    <button type="button" class="w-full rounded-full bg-[#2D4A3E] text-white font-bold py-3.5 text-sm shadow-md hover:brightness-95" onclick="MS.closeForestMapModal()">닫기</button>
                </div>
            `;
            document.body.style.overflow = 'hidden';
        },

        closeForestMapModal() {
            const root = document.getElementById('ms-modal-root');
            if (root) {
                root.className = 'hidden print-hidden';
                root.innerHTML = '';
            }
            document.body.style.overflow = '';
        },

        /**
         * 결과·종합 화면에서 홈(대시보드)으로.
         * 방금 본 관찰 1건은 금고·목록에서 제거해 대시보드를 비웁니다(미리보기 제외). 인쇄·보내기 파일은 그대로입니다.
         */
        goHomeToDashboard() {
            MS.closeForestMapModal();
            const wasPreview = STATE.isPreviewSample;
            STATE.reportDeepLink = false;
            try {
                MS.purgeCurrentCompletedExamFromVault();
            } catch (_) {}
            try {
                STATE.persist();
            } catch (_) {}
            STATE.step = 'dashboard';
            STATE.isPreviewSample = false;
            STATE.selectedGroupName = '';
            STATE.setupObsPhase = '';
            STATE.searchTerm = '';
            STATE.selectedId = null;
            STATE.toastMessage = wasPreview
                ? '미리보기를 종료했어요.'
                : '검사 기록을 정리했어요. 목록에서 사라졌으며, 새 검사는 설정에서 다시 시작할 수 있어요.';
            if (STATE._toastTimer) clearTimeout(STATE._toastTimer);
            UI.render();
            STATE._toastTimer = setTimeout(() => {
                STATE.toastMessage = null;
                UI.render();
            }, 2600);
        }
    };

    window.MS = MS;

    window.addEventListener('beforeprint', function () {
        if (typeof MS !== 'undefined' && MS.touchReportPrintDate) {
            MS.touchReportPrintDate();
        }
    });

    STATE.hydrate();

    function defaultForestBootstrap() {
        if (!STATE.institutions.length) {
            STATE.step = 'dashboard';
            STATE.searchTerm = '';
            STATE.selectedId = null;
        }
    }

    (async function forestBoot() {
        if (typeof MS !== 'undefined' && MS.tryForestReportViewFromQuery) {
            try {
                if (await MS.tryForestReportViewFromQuery()) {
                    UI.render();
                    return;
                }
            } catch (bootErr) {
                try {
                    console.error('[forest] report view bootstrap', bootErr);
                } catch (_) {
                    /* ignore */
                }
            }
        }
        defaultForestBootstrap();
        UI.render();
        try {
            if (sessionStorage.getItem(SS_FOREST_SCROLL_REPORT) === '1') {
                sessionStorage.removeItem(SS_FOREST_SCROLL_REPORT);
                let pick = null;
                try {
                    const ref = JSON.parse(localStorage.getItem(LS_FOREST_LAST_RESULT_REF) || 'null');
                    if (ref && ref.id) {
                        pick = STATE.institutions.find((i) => i.id === ref.id) || null;
                    }
                } catch (_) {
                    pick = null;
                }
                if (!pick && typeof MS.getMostRecentCompletedInst === 'function') {
                    pick = MS.getMostRecentCompletedInst();
                }
                if (
                    pick &&
                    typeof UI.allInputQuestionsFilled === 'function' &&
                    UI.allInputQuestionsFilled(pick) &&
                    typeof MS.forestRespondentTotalsOk === 'function' &&
                    MS.forestRespondentTotalsOk(pick)
                ) {
                    STATE.selectedId = pick.id;
                    STATE.isPreviewSample = false;
                    STATE.step = 'result';
                    STATE.persist();
                    UI.render();
                }
                if (STATE.step === 'result') {
                    requestAnimationFrame(function () {
                        requestAnimationFrame(function () {
                            setTimeout(function () {
                                MS.scrollToForestReportExports({ attempt: 0 });
                            }, 80);
                        });
                    });
                }
            }
        } catch (_) {
            /* ignore */
        }
    })();
})();
</script>
</body>
</html>
