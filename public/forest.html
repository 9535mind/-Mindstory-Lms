            } catch (_) {

                        String(x.lastReportRequestId || '').trim() === rid ||
                        String(x.pendingForestRequestId || '').trim() === rid

                        if (applyAnswersFromInst(x)) {

    const HANGUL_SYLLABLE_START = 0xac00;
    const HANGUL_SYLLABLE_END = 0xd7a3;
    /** ㄱ ㄲ ㄴ ㄷ ㄸ ㄹ ㅁ ㅂ ㅃ ㅅ ㅆ ㅇ ㅈ ㅉ ㅊ ㅋ ㅌ ㅍ ㅎ */
    const CHOSEONG_JAMO = ['ㄱ', 'ㄲ', 'ㄴ', 'ㄷ', 'ㄸ', 'ㄹ', 'ㅁ', 'ㅂ', 'ㅃ', 'ㅅ', 'ㅆ', 'ㅇ', 'ㅈ', 'ㅉ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ'];

    function isHangulConsonantJamoChar(ch) {
        const c = ch.charCodeAt(0);
        /** 호환 자모 ㄱ…ㅎ (U+3131–U+314E) + 조합용 초성 자모 U+1100–U+1112 (IME에 따라 ㅅ이 여기로 들어옴) */
        return (c >= 0x3131 && c <= 0x314e) || (c >= 0x1100 && c <= 0x1112);
    }

    /** 조합용 초성(U+1100…) → extractChoseongSequenceFromName 과 동일한 호환 자모 문자열로 통일 */
    function normalizeChoseongQueryToCompatibilityJamo(str) {
        let out = '';
        const s = String(str || '');
        for (let i = 0; i < s.length; i++) {
            const c = s.charCodeAt(i);
            if (c >= 0x1100 && c <= 0x1112) {
                out += CHOSEONG_JAMO[c - 0x1100] || '';
            } else {
                out += s[i];
            }
        }
        return out;
    }

    /** 검색어가 호환 자음(ㄱ~ㅎ)만으로 이루어졌는지 — 초성 검색 모드 */
    function isChoseongOnlyQueryStr(str) {
        const s = String(str || '').trim();
        if (!s) return false;
        for (let i = 0; i < s.length; i++) {
            if (!isHangulConsonantJamoChar(s[i])) return false;
        }
        return true;
    }

    function initialChoseongFromHangulSyllable(ch) {
        const c = ch.charCodeAt(0);
        if (c >= HANGUL_SYLLABLE_START && c <= HANGUL_SYLLABLE_END) {
            const idx = Math.floor((c - HANGUL_SYLLABLE_START) / 588);
            return CHOSEONG_JAMO[idx] || '';
        }
        return '';
    }

    function extractChoseongSequenceFromName(name) {
        const s = String(name || '');
        let out = '';
        for (let i = 0; i < s.length; i++) {
            const ch = s[i];
            const cc = ch.charCodeAt(0);
            if (cc >= HANGUL_SYLLABLE_START && cc <= HANGUL_SYLLABLE_END) {
                out += initialChoseongFromHangulSyllable(ch);
            }
        }
        return out;
    }

            seen.add(k);

        barStyle(cat) {
            if (cat === 'SPRT') return 'background-color:#D4A373';
            if (cat === 'SUMT') return 'background-color:#2D4A3E';
            if (cat === 'AUTT') return 'background:linear-gradient(90deg,#2D4A3E 0%,#D4A373 100%)';
            return 'background-color:#2D4A3E;opacity:0.72';
        },

        emptyCounts() {
            const o = {};
            const add = (qs) => {
                qs.forEach((q) => {
                    o[q.id] = { yes: '', no: '' };
                });
            };
            add(this.questionsPreschool);
            add(this.questionsElementary);
            for (let i = 1; i <= 8; i++) {
                const k = 'q' + i;
                if (!o[k]) o[k] = { yes: '', no: '' };
            }
            return o;
        },

        scoresFromCounts(counts, targetGroup) {
            const tg = targetGroup === 'elementary' ? 'elementary' : 'preschool';
            if (tg === 'preschool' || tg === 'elementary') {
                const totals = this.rawOTotalsFromCounts(counts, tg);
                const grand =
                    (totals.SPRT || 0) +
                        (totals.SUMT || 0) +
                        (totals.AUTT || 0) +
                        (totals.WINT || 0) || 1;
                const pct = {};
                this.categories.forEach((k) => {
                    pct[k] = Math.round(((totals[k] || 0) / grand) * 100);
                });
                return pct;
            }
            return { SPRT: 0, SUMT: 0, AUTT: 0, WINT: 0 };
        },

        /**
         * 유아(8문항): 황금 밸런스 — 축당 △2·□2. 네 축 합 = 관찰 슬롯 합.
         * 초등(12문항): 황금 밸런스 — 축당 △3·□3(최대 6점/축). 네 축 합 = 관찰 슬롯 합.
         * SPRT=Q1△+Q2△+Q3△+Q10□+Q11□+Q12□ · SUMT=Q4△+Q5△+Q6△+Q2□+Q7□+Q9□ · AUTT=Q7△+Q8△+Q9△+Q4□+Q5□+Q6□ · WINT=Q10△+Q11△+Q12△+Q1□+Q3□+Q8□
         */
        rawOTotalsFromCounts(counts, targetGroup) {
            const tg = targetGroup === 'elementary' ? 'elementary' : 'preschool';
            const qs = this.questionsForGroup(tg);
            const totals = { SPRT: 0, SUMT: 0, AUTT: 0, WINT: 0 };
            if (tg === 'preschool') {
                if (qs.length < 8) return totals;
                const tri = function (qi) {
                    const row = counts[qs[qi].id] || { yes: '', no: '' };
                    return parseInt(row.yes, 10) || 0;
                };
                const sq = function (qi) {
                    const row = counts[qs[qi].id] || { yes: '', no: '' };
                    return parseInt(row.no, 10) || 0;
                };
                totals.SPRT = tri(0) + tri(1) + sq(3) + sq(6);
                totals.SUMT = tri(2) + tri(3) + sq(0) + sq(4);
                totals.AUTT = tri(4) + tri(5) + sq(2) + sq(7);
                totals.WINT = tri(6) + tri(7) + sq(1) + sq(5);
                return totals;
            }
            if (tg === 'elementary') {
                if (qs.length < 12) return totals;
                const tri = function (qi) {
                    const row = counts[qs[qi].id] || { yes: '', no: '' };
                    return parseInt(row.yes, 10) || 0;
                };
                const sq = function (qi) {
                    const row = counts[qs[qi].id] || { yes: '', no: '' };
                    return parseInt(row.no, 10) || 0;
                };
                totals.SPRT = tri(0) + tri(1) + tri(2) + sq(9) + sq(10) + sq(11);
                totals.SUMT = tri(3) + tri(4) + tri(5) + sq(1) + sq(6) + sq(8);
                totals.AUTT = tri(6) + tri(7) + tri(8) + sq(3) + sq(4) + sq(5);
                totals.WINT = tri(9) + tri(10) + tri(11) + sq(0) + sq(2) + sq(7);
                return totals;
            }
            return totals;
        },

        /** 모든 문항의 △+□ 합 = 전체 관찰 슬롯(모수). 유아·초등 황금 밸런스는 네 축 총합과 동일. */
        totalOXSlotsFromCounts(counts, targetGroup) {
            const tg = targetGroup === 'elementary' ? 'elementary' : 'preschool';
            const qs = this.questionsForGroup(tg);
            let sum = 0;
            qs.forEach((q) => {
                const row = counts[q.id] || { yes: '', no: '' };
                sum += (parseInt(row.yes, 10) || 0) + (parseInt(row.no, 10) || 0);
            });
            return sum;
        },

        /** 문항별 응답 총합(△+□) 배열 — Q1부터 해당 연령 마지막 문항까지 */
        perQuestionRespondentTotalsFromCounts(counts, targetGroup) {
            const tg = targetGroup === 'elementary' ? 'elementary' : 'preschool';
            const qs = this.questionsForGroup(tg);
            return qs.map((q) => {
                const row = counts[q.id] || { yes: '', no: '' };
                return (parseInt(row.yes, 10) || 0) + (parseInt(row.no, 10) || 0);
            });
        },

        /** 각 문항의 세모+네모 합이 모두 동일한지 (현장 입력 오류 방지) */
        questionRespondentTotalsConsistent(counts, targetGroup) {
            const totals = this.perQuestionRespondentTotalsFromCounts(counts, targetGroup);
            if (totals.length <= 1) return true;
            const t0 = totals[0];
            return totals.every((t) => t === t0);
        },

        /** 시트 participant_count: Q1의 △+□ 만 (유아·초등 공통) */
        participantCountFromQ1(counts, targetGroup) {
            const tg = targetGroup === 'elementary' ? 'elementary' : 'preschool';
            const qs = this.questionsForGroup(tg);
            if (!qs.length) return 0;
            const row = counts[qs[0].id] || { yes: '', no: '' };
            return (parseInt(row.yes, 10) || 0) + (parseInt(row.no, 10) || 0);
        },

        /** 각 축(SPRT·SUMT·AUTT·WINT) 총점 / 네 축 총점 합 × 100 (정수 %) */
        temperamentDensityPercent(totals) {
            const grand =
                (totals.SPRT || 0) +
                    (totals.SUMT || 0) +
                    (totals.AUTT || 0) +
                    (totals.WINT || 0) || 1;
            const out = {};
            this.categories.forEach((c) => {
                out[c] = Math.round(((totals[c] || 0) / grand) * 100);
            });
            return out;
        },

        /**
         * 누적 총점 내림차순 순위. 동점: temperamentTieOrder(S→M→A→W) 앞선 유형이 상위.
         * density_pct: 전체 슬롯(네 축 총점 합) 대비 해당 기질 축 비중.
         */
        rankTemperamentsByRawO(totals) {
            const order = this.temperamentTieOrder;
            const L = this.temperamentLetter;
            const LB = this.temperamentRankLabel;
            const grand =
                (totals.SPRT || 0) +
                    (totals.SUMT || 0) +
                    (totals.AUTT || 0) +
                    (totals.WINT || 0) || 1;
            const rows = order.map((cat) => ({
                cat,
                score: totals[cat] || 0,
                letter: L[cat],
                label: LB[cat]
            }));
            rows.sort((a, b) => {
                if (b.score !== a.score) return b.score - a.score;
                return order.indexOf(a.cat) - order.indexOf(b.cat);
            });
            return rows.map((r, i) => ({
                rank: i + 1,
                cat: r.cat,
                letter: r.letter,
                score: r.score,
                label: r.label,
                density_pct: Math.round((r.score / grand) * 100)
            }));
        },

        /**
         * 연구·재분석용 문항별 원시 △/□ (DB scores.raw_answers 로 그대로 보존)
         */
        buildRawAnswersArray(counts, targetGroup) {
            const tg = targetGroup === 'elementary' ? 'elementary' : 'preschool';
            const qs = this.questionsForGroup(tg);
            return qs.map((q, idx) => {
                const row = counts[q.id] || { yes: '', no: '' };
                const tri = parseInt(row.yes, 10) || 0;
                const sq = parseInt(row.no, 10) || 0;
                const base = {
                    question_id: idx + 1,
                    question_key: q.id,
                    o_cat:
                        tg === 'preschool' ? 'preschool_tri_sq' : tg === 'elementary' ? 'elementary_tri_sq' : q.cat,
                    is_reverse: tg === 'elementary' || tg === 'preschool' ? false : !!q.isReverse,
                    question_text: q.text,
                    question_sub: q.sub || '',
                    question_desc: q.desc || '',
                    o_count: tri,
                    x_count: sq
                };
                if (tg === 'preschool') {
                    base.input_mode = 'triangle_square';
                    base.scoring_note =
                        '4축 합산(황금 밸런스): SPRT=Q1△+Q2△+Q4□+Q7□, SUMT=Q3△+Q4△+Q1□+Q5□, AUTT=Q5△+Q6△+Q3□+Q8□, WINT=Q7△+Q8△+Q2□+Q6□ (△=yes □=no)';
                    base.triangle_label = q.triangleLabel || '';
                    base.square_label = q.squareLabel || '';
                }
                if (tg === 'elementary') {
                    base.input_mode = 'triangle_square';
                    base.scoring_note =
                        '4축 합산(황금 밸런스·초등): SPRT=Q1△+Q2△+Q3△+Q10□+Q11□+Q12□, SUMT=Q4△+Q5△+Q6△+Q2□+Q7□+Q9□, AUTT=Q7△+Q8△+Q9△+Q4□+Q5□+Q6□, WINT=Q10△+Q11△+Q12△+Q1□+Q3□+Q8□ (△=yes □=no)';
                    base.triangle_label = q.triangleLabel || '';
                    base.square_label = q.squareLabel || '';
                }
                return base;
            });
        },

        /** ≥70% 재능·축하 · 40~70% 균형 격려 · &lt;40% 섬세한 보호·치유 (v2.0 내러티브) */
        segmentForScore(pct, cat) {
            const I = this.interpretations[cat];
            const empty = {
                tier: 'mid',
                badge: '',
                headline: cat,
                quote: '',
                narrative: '',
                psychDeep: '',
                forestPortrait: '',
                parentHeart: '',
                actionGuide: ''
            };
            if (!I || !I.tier) return empty;
            let tierKey = 'mid';
            if (pct >= 70) tierKey = 'high';
            else if (pct < 40) tierKey = 'low';
            const T = I.tier[tierKey];
            return {
                tier: tierKey,
                badge: T.badge,
                headline: I.title,
                quote: T.quote,
                narrative: T.narrative,
                psychDeep: I.psychDeep,
                forestPortrait: I.forestPortrait,
                parentHeart: I.parentHeart,
                actionGuide: I.actionGuide
            };
        },

        /** 동일 기관명(trim)으로 묶인 레코드 (집단 프로필용) */
        membersByInstitutionName(institutions, name) {
            const k = String(name).trim();
            return institutions.filter((i) => String(i.name).trim() === k);
        },

        /**
         * O·X 라우팅 총점 기준 대표 기질(동점 시 temperamentTieOrder) 1인 1표 → 축별 인원 비율(%)
         * @param {function(object): boolean} hasDataFn - counts에 입력이 있는지
         */
        dominantRepresentativeFromTotals(totals) {
            const order = this.temperamentTieOrder;
            const maxV = Math.max(...order.map((c) => totals[c] || 0));
            for (let i = 0; i < order.length; i++) {
                const cat = order[i];
                if ((totals[cat] || 0) === maxV) return cat;
            }
            return order[0];
        },

        aggregateMeanScores(members, hasDataFn) {
            const withData = members.filter((m) => hasDataFn(m.counts));
            if (!withData.length) return null;
            const cats = this.categories;
            const tally = {};
            cats.forEach((c) => {
                tally[c] = 0;
            });
            withData.forEach((inst) => {
                const tg = this.getTargetGroup(inst);
                const totals = this.rawOTotalsFromCounts(inst.counts, tg);
                const dom = this.dominantRepresentativeFromTotals(totals);
                tally[dom] += 1;
            });
            const n = withData.length;
            const mean = {};
            cats.forEach((c) => {
                mean[c] = Math.round(((tally[c] || 0) / n) * 100);
            });
            return { mean, nWithData: n, nTotal: members.length };
        },

        /** 각 아동의 대표 기질(O·X 총점 최고·동점 시 tie order) 빈도 → 파이 분포 */
        dominantTypeTally(members, hasDataFn) {
            const withData = members.filter((m) => hasDataFn(m.counts));
            const cats = this.categories;
            const tally = {};
            cats.forEach((c) => {
                tally[c] = 0;
            });
            withData.forEach((inst) => {
                const tg = this.getTargetGroup(inst);
                const totals = this.rawOTotalsFromCounts(inst.counts, tg);
                const dom = this.dominantRepresentativeFromTotals(totals);
                tally[dom] += 1;
            });
            return { tally, n: withData.length };
        },

        /**
         * 학술 지표용: 첫 데이터 보유 멤버와 동일한 targetGroup만 모아 축별 raw 총점 배열
         */
        metricsCohortScores(members, hasDataFn) {
            const withData = members.filter((m) => hasDataFn(m.counts));
            if (!withData.length) return null;
            const tg = this.getTargetGroup(withData[0]);
            const cohort = withData.filter((m) => this.getTargetGroup(m) === tg);
            if (!cohort.length) return null;
            const scoresList = cohort.map((m) => this.rawOTotalsFromCounts(m.counts, tg));
            return { scoresList, targetGroup: tg, n: cohort.length };
        },

        /**
         * 사전·사후: obsPhase === 'pre' | 'post' 레코드 각각 평균 → 성장 지수(Δ) = 사후 − 사전
         */
        aggregatePrePostComparison(members, hasDataFn) {
            const pre = members.filter((m) => m.obsPhase === 'pre' && hasDataFn(m.counts));
            const post = members.filter((m) => m.obsPhase === 'post' && hasDataFn(m.counts));
            if (!pre.length || !post.length) return null;
            const preAgg = this.aggregateMeanScores(pre, hasDataFn);
            const postAgg = this.aggregateMeanScores(post, hasDataFn);
            if (!preAgg || !postAgg) return null;
            const meanPre = preAgg.mean;
            const meanPost = postAgg.mean;
            const growthIndex = {};
            this.categories.forEach((c) => {
                growthIndex[c] = meanPost[c] - meanPre[c];
            });
            return {
                meanPre,
                meanPost,
                growthIndex,
                nPre: preAgg.nWithData,
                nPost: postAgg.nWithData,
                nPreRecords: pre.length,
                nPostRecords: post.length
            };
        },

        /** 유아부 기관 성격 (type) — 병설 등은 유치원으로 */
        preschoolKindNorm(inst) {
            const t = String(inst.type || '').trim();
            if (t === '유치원' || t.includes('병설')) return '유치원';
            if (t === '기타') return '기타';
            return '어린이집';
        },

        /** 초등부 기관 성격 — 레거시 「방과후학교」는 방과후교실과 동일 버킷 */
        elementaryTypeNorm(inst) {
            const t = String(inst.type || '').trim();
            if (t.includes('지역아동') || t === '지역아동센터') return '지역아동센터';
            if (t === '초등학교' || (t.includes('초등') && t.includes('학교'))) return '초등학교';
            if (t === '방과후교실' || t === '방과후학교' || t.includes('방과후')) return '방과후교실';
            return '지역아동센터';
        },

        /** 표시·호환: 대상군에 따라 유아(3분류) 또는 초등(2분류) 라벨 */
        institutionTypeNorm(inst) {
            if (this.getTargetGroup(inst) === 'elementary') return this.elementaryTypeNorm(inst);
            return this.preschoolKindNorm(inst);
        },

        /**
         * localStorage 전체 기록 중 어린이집 vs 유치원 각각 평균 프로필
         * 유형별 평균 = 해당 유형 관찰(입력 완료) 점수 합 / 해당 유형 관찰 수
         */
        aggregateGlobalByInstitutionType(institutions, hasDataFn) {
            const preschool = institutions.filter((i) => this.getTargetGroup(i) === 'preschool');
            const day = preschool.filter((i) => this.preschoolKindNorm(i) === '어린이집');
            const kg = preschool.filter((i) => this.preschoolKindNorm(i) === '유치원');
            const dayAgg = this.aggregateMeanScores(day, hasDataFn);
            const kgAgg = this.aggregateMeanScores(kg, hasDataFn);
            if (!dayAgg || !kgAgg) return null;
            const absDiff = {};
            const signedDiff = {};
            this.categories.forEach((c) => {
                const d = (dayAgg.mean[c] || 0) - (kgAgg.mean[c] || 0);
                signedDiff[c] = (kgAgg.mean[c] || 0) - (dayAgg.mean[c] || 0);
                absDiff[c] = Math.abs(d);
            });
            let rsiCat = this.categories[0];
            let rsiVal = -1;
            this.categories.forEach((c) => {
                if (absDiff[c] > rsiVal) {
                    rsiVal = absDiff[c];
                    rsiCat = c;
                }
            });
            return {
                meanDay: dayAgg.mean,
                meanKg: kgAgg.mean,
                nDay: dayAgg.nWithData,
                nKg: kgAgg.nWithData,
                rsiCat,
                rsiVal,
                signedDiff,
                absDiff
            };
        },

        /** 유아부 vs 초등부 집단 간 평균 비교 (문항뱅크는 각 레코드 targetGroup 기준) */
        aggregatePreschoolVsElementary(institutions, hasDataFn) {
            const pre = institutions.filter((i) => this.getTargetGroup(i) === 'preschool');
            const el = institutions.filter((i) => this.getTargetGroup(i) === 'elementary');
            const preAgg = this.aggregateMeanScores(pre, hasDataFn);
            const elAgg = this.aggregateMeanScores(el, hasDataFn);
            if (!preAgg || !elAgg) return null;
            if (preAgg.nWithData < 1 || elAgg.nWithData < 1) return null;
            const absDiff = {};
            const signedDiff = {};
            this.categories.forEach((c) => {
                const d = (preAgg.mean[c] || 0) - (elAgg.mean[c] || 0);
                absDiff[c] = Math.abs(d);
                signedDiff[c] = (elAgg.mean[c] || 0) - (preAgg.mean[c] || 0);
            });
            let rsiCat = this.categories[0];
            let rsiVal = -1;
            this.categories.forEach((c) => {
                if (absDiff[c] > rsiVal) {
                    rsiVal = absDiff[c];
                    rsiCat = c;
                }
            });
            return {
                meanDay: preAgg.mean,
                meanKg: elAgg.mean,
                nDay: preAgg.nWithData,
                nKg: elAgg.nWithData,
                rsiCat,
                rsiVal,
                signedDiff,
                absDiff
            };
        }
    };

    const STATE = {
        step: 'dashboard',
        institutions: [],
        selectedId: null,
        /** 기관 허브·종합 보고서: 기관명 키(trim) */
        selectedGroupName: '',
        searchTerm: '',
        isPreviewSample: false,
        setupTypeOverride: null,
        /** setup 화면: 사전/사후 선택값( observationStage 와 동기 ) */
        setupObsPhase: '',
        /** 전역 기본 관찰 단계: pre | post — localStorage ms_observation_stage */
        observationStage: 'pre',
        /** 진행 장소: forest(숲) | indoor(실내) — localStorage ms_forest_obs_location */
        obsLocation: 'forest',
        /** 예전 localStorage 키에서 이행한 경우 1회 안내 */
        migrationBanner: null,
        /** 홈 이동 직후 토스트 문구 */
        toastMessage: null,
        _toastTimer: null,
        /** 대시보드: 분석 센터(관리 대시보드) 패널 펼침 */
        dashboardReportsExpanded: false,
        /** 맞춤 보고서 빌더: 기관명(trim) 또는 ''=전체 */
        dashboardBuilderInst: '',
        /** all | preschool_daycare | preschool_kg | preschool_other | elem_community | elem_afterschool | elem_school | cmp_dk | cmp_pe */
        dashboardBuilderTypeFilter: 'all',
        /** single | prepost | group */
        dashboardBuilderMode: 'single',
        /** 집단 거시: dk 어린이집↔유치원 · pe 유아↔초등 */
        macroVariant: 'dk',
        reportAggregateMembers: null,
        reportAggregateTitle: '',
        reportFromDashboard: false,
        /** 입력 화면: preschool | elementary (기록별 inst.targetGroup과 동기화) */
        targetGroup: 'preschool',
        /** 원스톱 검사 설정 모달: 반 이름 임시 보관(재렌더 시 유지, persist 대상 아님) */
        unifiedSetupGroupDraft: '',
        /** ?view=report&id= 로 연 읽기 전용 보고서(시트 링크 등) — 금고 persist 생략 */
        reportDeepLink: false,

        guessType(name) {
            const s = String(name);
            if (this.targetGroup === 'elementary') {
                if (s.includes('지역아동') || s.includes('아동센터')) return '지역아동센터';
                if (s.includes('초등학교') || (s.includes('초등') && s.includes('학교'))) return '초등학교';
                if (s.includes('방과후')) return '방과후교실';
                return '지역아동센터';
            }
            if (s.includes('유치원') || s.includes('병설')) return '유치원';
            return '어린이집';
        },

        ensureCounts(inst) {
            if (!inst.counts || typeof inst.counts !== 'object') inst.counts = SCHEMA.emptyCounts();
            SCHEMA.questionsPreschool.forEach((q) => {
                if (!inst.counts[q.id]) inst.counts[q.id] = { yes: '', no: '' };
            });
            SCHEMA.questionsElementary.forEach((q) => {
                if (!inst.counts[q.id]) inst.counts[q.id] = { yes: '', no: '' };
            });
            for (let i = 1; i <= 8; i++) {
                const k = 'q' + i;
                if (!inst.counts[k]) inst.counts[k] = { yes: '', no: '' };
            }
            SCHEMA.migrateLegacyCounts(inst);
            if (inst.targetGroup !== 'preschool' && inst.targetGroup !== 'elementary') {
                inst.targetGroup = SCHEMA.getTargetGroup(inst);
            }
            if (inst.obsPhase !== 'pre' && inst.obsPhase !== 'post') inst.obsPhase = '';
            if (inst.groupName === undefined) inst.groupName = '';
            if (inst.obsLocation !== 'indoor' && inst.obsLocation !== 'forest') inst.obsLocation = 'forest';
            if (inst.participantTargetCount === undefined) inst.participantTargetCount = null;
        },

        selected() {
            return this.institutions.find((i) => i.id === this.selectedId) || null;
        },

        persist() {
            try {
                localStorage.setItem(
                    STORAGE_KEY,
                    JSON.stringify({
                        app: 'forest-observation',
                        engine: '1.5',
                        vault: 'ms_forest_v1',
                        v: SCHEMA.version,
                        targetGroup: this.targetGroup === 'elementary' ? 'elementary' : 'preschool',
                        institutions: this.institutions,
                        selectedId: this.selectedId,
                        dashboardBuilderInst: this.dashboardBuilderInst || '',
                        dashboardBuilderTypeFilter: this.dashboardBuilderTypeFilter || 'all',
                        dashboardBuilderMode: this.dashboardBuilderMode || 'single'
                    })
                );
            } catch (_) {}
        },

        hydrate() {
            this.migrationBanner = null;
            try {
                let raw = localStorage.getItem(STORAGE_KEY);
                let fromKey = STORAGE_KEY;
                if (!raw) {
                    raw = localStorage.getItem(LEGACY_MINDSTORY_VAULT_V1);
                    if (raw) {
                        fromKey = LEGACY_MINDSTORY_VAULT_V1;
                        this.migrationBanner =
                            '이전 키(MINDSTORY_VAULT_V1) 데이터를 ms_forest_v1로 옮겼어요.';
                    }
                }
                if (!raw) {
                    raw = localStorage.getItem(LEGACY_FOREST_OBS_V1);
                    if (raw) {
                        fromKey = LEGACY_FOREST_OBS_V1;
                        if (!this.migrationBanner) {
                            this.migrationBanner =
                                '이전 키(ms_forest_observation_v1) 데이터를 ms_forest_v1로 옮겼어요.';
                        }
                    }
                }
                if (!raw) {
                    raw = localStorage.getItem(LEGACY_OBSERVATION_V0);
                    if (raw) {
                        fromKey = LEGACY_OBSERVATION_V0;
                        if (!this.migrationBanner) {
                            this.migrationBanner =
                                '이전 키(ms_forest_observation) 데이터를 ms_forest_v1로 옮겼어요.';
                        }
                    }
                }
                if (!raw) {
                    raw = localStorage.getItem(LEGACY_FOREST_DATA);
                    if (raw) {
                        fromKey = LEGACY_FOREST_DATA;
                        if (!this.migrationBanner) {
                            this.migrationBanner =
                                '예전 키(ms_forest_data) 기록을 가져왔어요. 이제 ms_forest_v1에만 저장됩니다.';
                        }
                    }
                }
                if (!raw) {
                    raw = localStorage.getItem(LEGACY_V86);
                    if (raw) {
                        fromKey = LEGACY_V86;
                        if (!this.migrationBanner) {
                            this.migrationBanner =
                                '예전 앱 저장소에서 기록을 가져왔어요. 지금 키(ms_forest_v1)로 옮겼습니다.';
                        }
                    }
                }
                if (!raw) {
                    raw = localStorage.getItem(LEGACY_V2);
                    if (raw) {
                        this._migrateLegacyV2(raw);
                        if (!this.migrationBanner) {
                            this.migrationBanner =
                                '오래된 단일 기관 형식을 ms_forest_v1로 옮겼습니다.';
                        }
                        return;
                    }
                }
                if (!raw) {
                    this.institutions = [];
                    this.selectedId = null;
                    return;
                }
                const o = JSON.parse(raw);
                if (o.institutions && Array.isArray(o.institutions)) {
                    this.institutions = o.institutions;
                    this.selectedId = o.selectedId || (this.institutions[0] && this.institutions[0].id) || null;
                    if (o.targetGroup === 'elementary' || o.targetGroup === 'preschool') {
                        this.targetGroup = o.targetGroup;
                    } else if (o.targetGroup === '초등부' || o.targetGroup === '초등') {
                        this.targetGroup = 'elementary';
                    } else if (o.targetGroup === '유아·유치부' || o.targetGroup === '유아' || o.targetGroup === '유치원부') {
                        this.targetGroup = 'preschool';
                    }
                    if (typeof o.dashboardBuilderInst === 'string') this.dashboardBuilderInst = o.dashboardBuilderInst;
                    if (typeof o.dashboardBuilderTypeFilter === 'string') {
                        this.dashboardBuilderTypeFilter = o.dashboardBuilderTypeFilter;
                    }
                    if (o.dashboardBuilderMode === 'single' || o.dashboardBuilderMode === 'prepost' || o.dashboardBuilderMode === 'group') {
                        this.dashboardBuilderMode = o.dashboardBuilderMode;
                    }
                    this.institutions.forEach((i) => {
                        this.ensureCounts(i);
                        if (typeof MS !== 'undefined' && MS.ensurePendingForestRequestId) {
                            MS.ensurePendingForestRequestId(i);
                        }
                    });
                    if (fromKey !== STORAGE_KEY) {
                        try { localStorage.removeItem(fromKey); } catch (_) {}
                        this.persist();
                    }
                    return;
                }
            } catch (_) {}
            this.institutions = [];
            this.selectedId = null;
        },

        _migrateLegacyV2(raw) {
            try {
                const o = JSON.parse(raw);
                if (!o.institution || !o.counts) return;
                const id = newVaultRecordId();
                const inst = {
                    id,
                    name: o.institution,
                    type: this.guessType(o.institution),
                    obsPhase: '',
                    counts: o.counts,
                    updatedAt: new Date().toISOString()
                };
                this.ensureCounts(inst);
                this.institutions = [inst];
                this.selectedId = id;
                try { localStorage.removeItem(LEGACY_V2); } catch (_) {}
                this.persist();
            } catch (_) {}
        },

        addInstitution(name) {
            const id = newVaultRecordId();
            const inst = {
                id,
                name: name.trim(),
                type: this.guessType(name),
                obsPhase: '',
                groupName: '',
                obsLocation: STATE.obsLocation === 'indoor' ? 'indoor' : 'forest',
                targetGroup: this.targetGroup === 'elementary' ? 'elementary' : 'preschool',
                participantTargetCount: null,
                counts: SCHEMA.emptyCounts(),
                updatedAt: new Date().toISOString()
            };
            this.institutions.push(inst);
            this.selectedId = id;
            this.persist();
            if (typeof MS !== 'undefined' && MS.ensurePendingForestRequestId) {
                MS.ensurePendingForestRequestId(inst);
            }
            return inst;
        },

        touchSelected() {
            const i = this.selected();
            if (i) i.updatedAt = new Date().toISOString();
        }
    };

        /** 검색어와 겹치는 구간만 굵게 (HTML 조각, 이미 이스케이프됨) */
        highlightInstMatch(name, query) {
            const n = String(name);
            const q = String(query).trim();
            if (!q) return this.esc(n);
            const lower = n.toLocaleLowerCase('ko-KR');
            const ql = q.toLocaleLowerCase('ko-KR');
            const idx = lower.indexOf(ql);
            if (idx < 0) return this.esc(n);
            return (
                this.esc(n.slice(0, idx)) +
                '<strong class="font-black text-[#2D4A3E]">' +
                this.esc(n.slice(idx, idx + q.length)) +
                '</strong>' +
                this.esc(n.slice(idx + q.length))
            );
        },

        hasAnyCount(counts) {
            const rowHas = (q) => {
                const row = counts[q.id] || {};
                const y = parseInt(row.yes, 10) || 0;
                const n = parseInt(row.no, 10) || 0;
                return y + n > 0;
            };
            if (SCHEMA.questionsPreschool.some(rowHas)) return true;
            if (SCHEMA.questionsElementary.some(rowHas)) return true;
            for (let i = 1; i <= 12; i++) {
                if (rowHas({ id: 'ps_' + i })) return true;
            }
            for (let i = 1; i <= 8; i++) {
                if (rowHas({ id: 'q' + i })) return true;
            }
            return false;
        },

        hasAnyCountForActiveGroup(inst) {
            const tg = SCHEMA.getTargetGroup(inst);
            return SCHEMA.questionsForGroup(tg).some((q) => {
                const row = inst.counts[q.id] || {};
                const y = parseInt(row.yes, 10) || 0;
                const n = parseInt(row.no, 10) || 0;
                return y + n > 0;
            });
        },

        /** 문항 한 줄: O·X 모두 숫자 입력됨(0 포함) */
        hasInputRowComplete(row) {
            const y = String((row && row.yes) || '').trim();
            const n = String((row && row.no) || '').trim();
            if (y === '' || n === '') return false;
            const yi = parseInt(y, 10);
            const ni = parseInt(n, 10);
            return !Number.isNaN(yi) && !Number.isNaN(ni) && yi >= 0 && ni >= 0;
        },
        /** 현재 연령 문항 세트 전체 입력 완료 */
        allInputQuestionsFilled(inst) {
            if (!inst) return false;
            STATE.ensureCounts(inst);
            const tg =
                typeof MS !== 'undefined' && typeof MS.resolveForestTargetGroup === 'function'
                    ? MS.resolveForestTargetGroup(inst)
                    : SCHEMA.getTargetGroup(inst);
            const qs = SCHEMA.questionsForGroup(tg);
            return qs.every((q) => this.hasInputRowComplete(inst.counts[q.id]));
        },
        /** 마지막 문항 한 줄만 완료 여부 (완료 버튼 노출 기준) */
        lastQuestionRowComplete(inst) {
            if (!inst) return false;
            STATE.ensureCounts(inst);
            const tg =
                typeof MS !== 'undefined' && typeof MS.resolveForestTargetGroup === 'function'
                    ? MS.resolveForestTargetGroup(inst)
                    : SCHEMA.getTargetGroup(inst);
            const qs = SCHEMA.questionsForGroup(tg);
            if (!qs.length) return false;
            const last = qs[qs.length - 1];
            return this.hasInputRowComplete(inst.counts[last.id]);
        },

                    STATE.step === 'institution-prepost-report' ||

                    app.classList.remove('max-w-2xl');
                    app.classList.add('max-w-4xl', 'print-wide');

            else if (STATE.step === 'guide') this.renderGuide(el);

            else if (STATE.step === 'institution-report') this.renderInstitutionReport(el);
            else if (STATE.step === 'institution-prepost-report') this.renderInstitutionPrePostReport(el);

        /** 저장 안내 토스트 (고정 하단) */

        },

        /** v8.7 스키마 기반 네 기질 조화 요약 */
        buildHarmonySummary(scores, brandShort) {
            const B = brandShort || getAppBrandShort();
            const cats = SCHEMA.categories;
            const ranked = cats.map((c) => ({ c, v: scores[c] || 0 })).sort((a, b) => b.v - a.v);
            const hi = ranked[0];
            const lo = ranked[3];
            const I = SCHEMA.interpretations;
            const spread = ranked[0].v - ranked[3].v;
            if (spread <= 12) {
                return (
                    B +
                    ' 네 축(SPRT·SUMT·AUTT·WINT)이 비슷한 높이로 나란히 서 있어요. ' +
                    '따뜻한 공감·씩씩한 탐색·차분한 안전·끝까지 해내는 고운 에너지가 서로 보태며 숲처럼 자라나고 있습니다. ' +
                    '한쪽만 특별히 튀지 않을 때는 오늘의 작은 관찰 포인트를 일기처럼 남겨 두면 좋아요.'
                );
            }
            const hiT = I[hi.c].title;
            const loT = I[lo.c].title;
            let s = `「${hiT}」 쪽 고운 에너지가 지금 숲에서 가장 크게 피어올라요. ${I[hi.c].harmonySpark} `;
            if (hi.c !== lo.c) {
                s += `「${loT}」 영역은 아이만의 속도로 숨 고르기를 더하면 네 기질이 서로 덜어 주며 아름답게 이어져요. ${I[lo.c].harmonySupport}`;
            }
            s += ' 각 카드의 안내를 살펴보시면 집과 숲에서 이어 주실 수 있어요.';
            return s;
        },

        /** 사전(연한 녹)·사후(심산녹) 그룹 막대 */
        buildPrePostGroupedBarSvg(meanPre, meanPost) {
            const cats = SCHEMA.categories;
            const W = 420;
            const H = 240;
            const padL = 44;
            const padR = 16;
            const padT = 28;
            const padB = 52;
            const innerW = W - padL - padR;
            const innerH = H - padT - padB;
            const n = cats.length;
            const groupW = innerW / n;
            const barW = Math.min(26, (groupW - 10) / 2);
            const maxPct = 100;
            const y0 = padT + innerH;
            let rects = '';
            cats.forEach((cat, i) => {
                const gx = padL + i * groupW + groupW / 2;
                const preH = ((meanPre[cat] || 0) / maxPct) * innerH;
                const postH = ((meanPost[cat] || 0) / maxPct) * innerH;
                const xPre = gx - barW - 3;
                const xPost = gx + 3;
                rects += `<rect x="${xPre}" y="${y0 - preH}" width="${barW}" height="${preH}" rx="4" fill="rgba(168,201,184,0.92)" stroke="rgba(45,74,62,0.15)" stroke-width="1" />`;
                rects += `<rect x="${xPost}" y="${y0 - postH}" width="${barW}" height="${postH}" rx="4" fill="#2D4A3E" stroke="rgba(45,74,62,0.2)" stroke-width="1" />`;
                rects += `<text x="${gx}" y="${H - 28}" text-anchor="middle" fill="#2D4A3E" font-size="11" font-weight="800" font-family="Noto Sans KR,sans-serif">${SCHEMA.temperamentRankLabel[cat] || cat}</text>`;
            });
            const axis = `<line x1="${padL}" y1="${y0}" x2="${W - padR}" y2="${y0}" stroke="rgba(45,74,62,0.25)" stroke-width="1.5" />`;
            const y50 = y0 - innerH * 0.5;
            const y100 = padT;
            const grid = `<line x1="${padL}" y1="${y50}" x2="${W - padR}" y2="${y50}" stroke="rgba(45,74,62,0.08)" stroke-dasharray="4 4" /><line x1="${padL}" y1="${y100}" x2="${W - padR}" y2="${y100}" stroke="rgba(45,74,62,0.06)" stroke-dasharray="4 4" />`;
            const leg = `<g transform="translate(${padL},10)"><rect x="0" y="0" width="12" height="12" rx="2" fill="rgba(168,201,184,0.92)"/><text x="18" y="11" fill="#2D4A3E" font-size="10" font-weight="700" font-family="Noto Sans KR,sans-serif">사전 대표 비율</text><rect x="112" y="0" width="12" height="12" rx="2" fill="#2D4A3E"/><text x="130" y="11" fill="#2D4A3E" font-size="10" font-weight="700" font-family="Noto Sans KR,sans-serif">사후 대표 비율</text></g>`;
            return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" class="mx-auto max-w-full h-auto" aria-label="사전 사후 막대 비교">${leg}${grid}${axis}${rects}</svg>`;
        },

        /** 우세 기질 빈도 파이 (순수 SVG) */
        buildGroupPieSvg(tally, n) {
            if (!n) {
                return `<p class="text-center text-sm text-ms-muted py-12">집계할 관찰 데이터가 아직 없어요. 개별 입력 후 다시 열어 주세요.</p>`;
            }
            const cats = SCHEMA.categories;
            const colors = {
                SPRT: '#D4A373',
                SUMT: '#2D4A3E',
                AUTT: '#5f7f6f',
                WINT: '#7d6b5a'
            };
            const cx = 120;
            const cy = 120;
            const r = 88;
            let a = -Math.PI / 2;
            let paths = '';
            cats.forEach((cat) => {
                const cnt = tally[cat] || 0;
                if (!cnt) return;
                const frac = cnt / n;
                const slice = frac * 2 * Math.PI;
                const x1 = cx + r * Math.cos(a);
                const y1 = cy + r * Math.sin(a);
                const x2 = cx + r * Math.cos(a + slice);
                const y2 = cy + r * Math.sin(a + slice);
                const large = slice > Math.PI ? 1 : 0;
                paths += `<path d="M ${cx} ${cy} L ${x1.toFixed(2)} ${y1.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${x2.toFixed(2)} ${y2.toFixed(2)} Z" fill="${colors[cat]}" stroke="#FDFBF7" stroke-width="2" />`;
                a += slice;
            });
            const svg = `<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" aria-label="기질 분포 분석표">${paths}</svg>`;
            const legend = cats
                .map((cat) => {
                    const cnt = tally[cat] || 0;
                    const pct = Math.round((cnt / n) * 100);
                    return `<div class="flex items-center justify-between gap-3 text-sm py-1.5 border-b border-[rgba(45,74,62,0.06)] last:border-0">
                        <span class="flex items-center gap-2 font-semibold text-[#2D4A3E]"><span class="inline-block w-3.5 h-3.5 rounded-sm shrink-0" style="background:${colors[cat]}"></span>${this.esc(SCHEMA.temperamentRankLabel[cat] || cat)}</span>
                        <span class="text-ms-muted font-bold">${pct}% <span class="text-xs font-semibold">(${cnt}명)</span></span>
                    </div>`;
                })
                .join('');
            return `<div class="flex flex-col items-center">${svg}<div class="w-full max-w-xs mt-4">${legend}</div></div>`;
        },

        /** 학술 지표 — 에너지 밀도(%) 막대 (large: 인쇄·PDF용 고해상도) */
        buildJttDensityBarsSvg(density, opts) {
            if (!density || typeof density !== 'object') {
                return '<p class="text-center text-sm text-ms-muted py-8">밀도 데이터가 없습니다.</p>';
            }
            const large = opts && opts.large;
            const cats = SCHEMA.categories;
            const colors = { SPRT: '#D4A373', SUMT: '#2D4A3E', AUTT: '#5f7f6f', WINT: '#7d6b5a' };
            const W = large ? 440 : 320;
            const rowH = large ? 46 : 36;
            const barH = large ? 22 : 18;
            const labelFs = large ? 13 : 11;
            const pctFs = large ? 12 : 11;
            const labelY = large ? 28 : 22;
            const pctY = large ? 26 : 20;
            const H = rowH * cats.length + 8;
            let y = 6;
            let rects = '';
            cats.forEach((cat) => {
                const pct = Math.min(100, Math.max(0, density[cat] || 0));
                const bw = ((W - 128) * pct) / 100;
                rects += `<text x="0" y="${y + labelY}" fill="#2D4A3E" font-size="${labelFs}" font-weight="800" font-family="Noto Sans KR,sans-serif">${this.esc(
                    SCHEMA.temperamentRankLabel[cat] || cat
                )}</text>`;
                rects += `<rect x="126" y="${y + 6}" width="${Math.max(0, bw)}" height="${barH}" rx="6" fill="${colors[cat]}" opacity="0.92" />`;
                rects += `<text x="${W - 4}" y="${y + pctY}" text-anchor="end" fill="#6b7280" font-size="${pctFs}" font-weight="700" font-family="Noto Sans KR,sans-serif">${pct}%</text>`;
                y += rowH;
            });
            return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" class="ms-density-chart-svg mx-auto max-w-full" aria-label="에너지 밀도">${rects}</svg>`;
        },

        buildJttMetricsKpiHtml(metrics) {
            if (!metrics || !Number.isFinite(metrics.balance)) {
                return '';
            }
            return `
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-6 pt-6 border-t border-[rgba(45,74,62,0.1)]">
                    <div class="rounded-2xl bg-[rgba(45,74,62,0.06)] border border-ms px-4 py-4 text-center">
                        <p class="text-[12px] font-black text-[#D4A373] tracking-widest mb-1">Balance (σ)</p>
                        <p class="text-2xl md:text-3xl font-black text-[#2D4A3E]">${metrics.balance}</p>
                        <p class="text-[12px] text-ms-muted mt-1">네 축 정규화 평균의 표준편차 · 낮을수록 균형</p>
                    </div>
                    <div class="rounded-2xl bg-[rgba(212,163,115,0.12)] border border-[#D4A373]/30 px-4 py-4 text-center">
                        <p class="text-[12px] font-black text-[#2D4A3E] tracking-widest mb-1">적응 지수</p>
                        <p class="text-2xl md:text-3xl font-black text-[#2D4A3E]">${metrics.adaptive}</p>
                        <p class="text-[12px] text-ms-muted mt-1">(봄·겨울 평균) / SPRT+WINT 에너지</p>
                    </div>
                </div>`;
        },

        /** 기관 컨설팅 본문 (풍성한 서술) */
        buildInstitutionConsultingNarrative(ctx) {
            const { groupName, mean, tally, nPie, nWithData, nTotal, typeLabel, brandShort = 'JTT-Kinder' } = ctx;
            const cats = SCHEMA.categories;
            const meanRank = cats.map((c) => ({ c, v: mean[c] || 0 })).sort((a, b) => b.v - a.v);
            const topM = meanRank[0].c;
            const lowM = meanRank[3].c;
            const pieRank = cats.map((c) => ({ c, n: tally[c] || 0 })).sort((a, b) => b.n - a.n);
            const topP = pieRank[0].c;
            const spread = meanRank[0].v - meanRank[3].v;

            const pctLine = cats
                .map((c) => `${SCHEMA.temperamentRankLabel[c] || c} ${mean[c]}%`)
                .join(', ');

            const atmosphere =
                `「${groupName}」(${typeLabel}) 집단의 **대표 기질 비율**(각 축이 1인 1표로 확정된 비중)은 ${pctLine}로 읽힙니다. ` +
                `숫자는 한 아이의 성격표가 아니라, 지금 이 시기에 모여 있는 **집단 에너지의 결**을 보여 주는 나침반이에요.\n\n` +
                (spread <= 15
                    ? `네 축이 고르게 펼쳐져 있어 숲 활동에서 다양한 역할이 자연스럽게 돌아갈 수 있는 토양입니다. 한 아이에게만 시선이 머물지 않도록, 오늘의 숲에서 누가 어떤 기질의 씨앗을 드러냈는지 짧은 메모로 남기면 운영이 더 부드러워져요.`
                    : `평균 에너지는 「${SCHEMA.temperamentRankLabel[topM] || topM}」 쪽으로 조금 더 기울어 있어, 이 원 전체가 품는 숲의 분위기는 ${topM === 'SUMT' ? '탐험과 움직임' : topM === 'SPRT' ? '정서적 교감과 돌봄' : topM === 'AUTT' ? '안전 확인과 예측 가능한 리듬' : '끝맺음과 다시 시도하는 힘'}에 익숙해지기 쉬운 결을 이룹니다. ` +
                      `동시에 「${SCHEMA.temperamentRankLabel[lowM] || lowM}」 축은 집단이 함께 숨 쉴 여백을 만들어 줄 때 더 단단해질 수 있어요.`) +
                `\n\n이 기관은 전반적으로 ${SCHEMA.temperamentRankLabel[topP] || topP} 기질이 우세한 아이가 많아, 놀이와 이동을 설계할 때 이 결을 존중하면 현장의 안정감이 커집니다.`;

            const traits =
                `**우리 기관의 기질적 특징**은 두 층으로 읽을 수 있어요. 첫째, **대표 기질 비중**(축별 평균)은 장기적인 교육 방향과 환경 설계에 쓰입니다. 둘째, **우세형 분포**(파이)는 “지금 이 반·이 연령에서 누가 앞장서기 쉬운가”를 보여 줍니다.\n\n` +
                `현재 집단에서 ${SCHEMA.temperamentRankLabel[topM] || topM}이 대표로 확정된 비율이 상대적으로 높습니다. 이는 숲에서의 선택과 반응 속도가 그 방향으로 모일 가능성이 있다는 뜻이에요. ` +
                `파이 차트에서는 ${SCHEMA.temperamentRankLabel[topP] || topP}형 아이가 ${nPie ? Math.round(((tally[topP] || 0) / nPie) * 100) : 0}%를 차지하여, 소그룹 활동을 짤 때 **페이스 메이커** 역할을 맡기기 좋은 기질이 드러납니다.\n\n` +
                (nTotal > nWithData
                    ? `참고로 같은 기관명으로 저장된 기록 ${nTotal}건 중, 아직 숫자가 비어 있는 관찰 ${nTotal - nWithData}건은 집계에서 제외되었습니다. 데이터가 쌓일수록 이 지도는 더 선명해져요.`
                    : `모든 관찰 기록에 입력값이 있어 집단 지도가 완전히 반영된 상태입니다.`);

            const strategy =
                `**교사를 위한 집단 관리 전략**으로는, 먼저 “집단의 공통 리듬”을 하루 일과에 새겨 넣는 것을 권합니다. ` +
                (topM === 'AUTT'
                    ? `AUTT(가을) 대표 비중이 두드러질 때는 새로운 숲 코스로 이동하기 전에 **사진·지도·짧은 동선 시범**으로 예측 가능성을 높여 주세요. “어디로 갈지, 어디서 쉴지”를 말로 먼저 나누면 아이들의 몸이 한꺼번에 움직여도 마음은 편안합니다.`
                    : topM === 'SUMT'
                      ? `SUMT(여름) 대표 비중이 높으면 모험적인 숲 놀이에 최적화되어 있으나, **안전 신호와 우리들의 약속**을 활동 전에 짧게 고정하는 것이 중요합니다. 에너지가 크게 솟을수록 멈춤 신호를 친숙한 놀이로 연결해 두세요.`
                      : topM === 'SPRT'
                        ? `SPRT(봄) 대표 비중이 두드러지면 정서적 교감이 활동의 중심축이 됩니다. 갈등이 생겼을 때 해결보다 **이름을 부르며 감정 이름 붙이기**를 먼저 시도해 보세요. 집단 전체가 듣는 칭찬도 효과적입니다.`
                        : `WINT(겨울) 대표 비중이 높으면 마무리와 규칙을 지키는 흐름이 자연스럽습니다. 활동을 나눌 때 **작은 완성 단위**를 미리 알려 주면 스트레스 없이 몰입이 이어져요.`) +
                `\n\n소그룹을 나눌 때는 우세형과 다른 축의 아이를 한 조에 섞어, 서로의 고운 에너지가 번지도록 하면 좋아요.`;

            const curriculum =
                `**교육 커리큘럼 제안**: 이 분포를 바탕으로 ${brandShort} 연계 프로그램을 한 겹 더 풍성하게 쌓아 볼 수 있어요.\n\n` +
                (topP === 'SPRT'
                    ? `• 돌봄·협력 서사가 있는 역할 놀이(작은 숲 생명 돌보기, 친구 초대하기)\n• 감정 카드와 함께하는 원 모임\n• 조용한 관찰 시간(듣기·그리기)`
                    : topP === 'SUMT'
                      ? `• 지형이 조금씩 바뀌는 탐험 코스(단계적 난이도)\n• 도구를 바꿔 가며 같은 숲을 새로 보기\n• 짧은 목표 깃발 놀이(도착점 시각화)`
                      : topP === 'AUTT'
                        ? `• 동선을 미리 밟아 보는 “리허설 산책”\n• 안전한 기지 캠프를 두고 확장하는 놀이\n• 예고가 있는 자유 탐색`
                        : `• 한 과제를 작은 덩어리로 나눈 완성 놀이\n• 정리·마무리를 노래·의식으로 연결\n• 다시 시도하기 루틴(호흡-물-한 블록)`) +
                `\n\n평균 편차가 ${spread <= 15 ? '크지 않아' : '어느 정도 있어'} 같은 주차 안에 **빠른 코스**와 **느린 코스**를 번갈아 배치하면 집단 전체가 숲의 속도를 체험하게 됩니다.`;

            const admin =
                `**원장님용 · ${brandShort} 교육 제언**\n\n` +
                (topP === 'SPRT' || topM === 'SPRT'
                    ? `본 기관은 SPRT(봄) 기질의 비중이 높아 **정서적 교감**이 운영의 중심축이 됩니다. 교사 연수 시 ‘공감 대화법’·‘감정 이름 붙이기’ 비중을 높이고, 평가보다 **관찰 언어를 통일**하는 시간을 마련해 보시길 권합니다.`
                    : topP === 'SUMT' || topM === 'SUMT'
                      ? `본 기관은 SUMT(여름) 기질의 에너지가 활기를 이끌기 쉬워 **안전 리더십**과 **활동 설계** 역량을 연수에서 함께 다루면 좋습니다. 모험을 허용하는 만큼 멈춤 신호와 회복 루틴을 매뉴얼로 남겨 두세요.`
                      : topP === 'AUTT' || topM === 'AUTT'
                        ? `본 기관은 AUTT(가을) 기질이 집단 리듬을 잡는 데 기여합니다. 새 프로그램 도입 시 **사전 안내 자료**와 **반복 가능한 동선**을 강조하는 연수 구성을 권장합니다.`
                        : `본 기관은 WINT(겨울) 기질을 통해 **끝맺음과 책임** 문화를 쌓기 좋습니다. 연수에서는 목표 세분화·긍정적 마무리 의식을 팀 단위로 연습해 보세요.`) +
                `\n\n인력 배치 시 한 반에 **서로 다른 우세형**을 가진 교사가 짝을 이루면, 집단의 결을 균형 있게 받쳐 줄 수 있습니다. 숲은 아이의 속도를 기다리듯, 기관의 결도 천천히 읽어 가시길 바랍니다.`;

            return { atmosphere, traits, strategy, curriculum, admin };
        },

        /** 사전·사후 비교 서술 (종합·축별·숲의 선물) */
        buildPrePostNarrative(ctx) {
            const { groupName, typeLabel, meanPre, meanPost, growthIndex, nPre, nPost, brandShort = 'JTT-Kinder' } =
                ctx;
            const cats = SCHEMA.categories;
            const catLabel = (c) => SCHEMA.temperamentRankLabel[c] || c;

            const rises = cats.filter((c) => (growthIndex[c] || 0) >= 3);
            const dips = cats.filter((c) => (growthIndex[c] || 0) <= -3);
            const stable = cats.filter((c) => (growthIndex[c] || 0) > -3 && (growthIndex[c] || 0) < 3);
            const sumDelta = cats.reduce((s, c) => s + (growthIndex[c] || 0), 0);
            const leadRise = rises.length ? rises.sort((a, b) => (growthIndex[b] || 0) - (growthIndex[a] || 0))[0] : null;

            const synthesis =
                `본 **마인드스토리 종합 분석**은 「${groupName}」(${typeLabel})에 저장된 관찰 중, **사전 검사**로 표시된 기록 ${nPre}건과 **사후 검사**로 표시된 기록 ${nPost}건의 평균 프로필을 나란히 놓고 읽은 것입니다. ` +
                `숫자는 아이 한 명을 단정짓는 낙인이 아니라, 같은 기관 안에서 시간의 흐름 속에 모인 **집단 에너지의 결**이 어디로 기울어졌는지를 보여 주는 나침반입니다.\n\n` +
                `사전 시점의 평균은 숲 프로그램을 설계할 때의 출발선이었고, 사후 시점의 평균은 그 여정을 지난 뒤의 숨결에 가깝습니다. ` +
                `네 축을 합친 **성장 지수의 합**은 약 ${sumDelta > 0 ? '+' : ''}${sumDelta}포인트 방향으로 움직였으며, 이는 “모두가 같은 속도로 달려야 한다”는 뜻이 아니라 **집단 전체가 어떤 풍경을 지나왔는지**를 요약한 것입니다.\n\n` +
                (leadRise
                    ? `특히 **${catLabel(leadRise)}** 축에서 사전 대비 가장 큰 상승 폭이 관찰되었습니다. 이는 숲에서의 경험이 아이들의 ${leadRise} 에너지를 깨우고, 그 결을 드러내는 데 도움이 되었음을 긍정적으로 읽을 수 있어요. ` +
                      `놀이·이동·돌봄의 순간들이 쌓이며, 집단이 그 기질 언어로 세상을 말하기 시작했다는 신호로 볼 수 있습니다.\n\n`
                    : `네 축 모두에서 급격한 단일 방향보다는 **섬세한 조정**이 주를 이루었습니다. 이는 기질적 균형과 안정을 찾아가는 과정으로, 숲이 요구하는 속도에 맞추어 몸과 마음이 서로 협상하는 아름다운 리듬으로 읽힙니다.\n\n`) +
                `교사와 원장님께서는 표의 **성장 지수(Δ)**를 “좋고 나쁨”이 아니라 **어디에 관심을 두고 칭찬·예고·휴식을 배치할지**를 정하는 참고선으로 활용해 주세요. ` +
                `${brandShort}는 이 변화를 평가가 아닌 **함께 읽기**로 제안드립니다.\n\n` +
                `아래에서는 축별로 사전·사후의 차이를 따뜻한 언어로 풀어 드리며, 마지막에 다음 학기와 가정으로 이어질 **지속 성장 가이드**를 드립니다.`;

            const axisParts = cats.map((c) => {
                const d = growthIndex[c] || 0;
                const pre = meanPre[c] || 0;
                const post = meanPost[c] || 0;
                if (d >= 3) {
                    return (
                        `**${catLabel(c)}** · 사전 ${pre}%에서 사후 ${post}%로, 성장 지수 **+${d}**입니다. ` +
                        `사전 대비 ${c === 'WINT' ? 'WINT(원칙·마무리)' : catLabel(c)} 점수가 오른 것은 숲 활동을 통해 아이들의 **자기 주도성·책임감·관계 감각** 중 이 축에 해당하는 고운 에너지가 단단해졌음을 의미합니다. ` +
                        `숲에서의 반복 경험(예고, 선택, 마침표, 돌봄의 말)이 집단의 몸기억으로 남았을 가능성이 큽니다. 앞으로도 이 축을 구체적으로 칭찬 언어로 붙잡아 주면 재능이 더 넓게 퍼집니다.`
                    );
                }
                if (d <= -3) {
                    return (
                        `**${catLabel(c)}** · 사전 ${pre}%에서 사후 ${post}%로, 성장 지수 **${d}**입니다. ` +
                        `이 숫자는 “후퇴”라기보다 **다른 축이 크게 자라는 동안 잠시 숨 고르기**를 한 패턴으로 읽을 수 있어요. 기질적 균형과 안정을 찾아가는 과정에서, 한동안 이 축의 에너지가 옆으로 양보했을 수 있습니다. ` +
                        `숲은 아이의 속도를 기다리듯, 이 축에는 **짧은 예고·작은 성공·함께 걷기**를 더해 주시면 다시 고르게 돌아오기 쉽습니다.`
                    );
                }
                return (
                    `**${catLabel(c)}** · 사전 ${pre}%에서 사후 ${post}%로, 성장 지수 **${d >= 0 ? '+' : ''}${d}**입니다. ` +
                    `큰 요동 없이 **기질적 균형과 안정을 찾아가는 과정**에 가깝습니다. 이미 갖춘 리듬을 존중하면서, 숲에서의 새 자극을 천천히 흡수한 흔적으로 볼 수 있어요. ` +
                    `일상에서도 “지금은 유지와 응원”이 가장 큰 선물입니다.`
                );
            });
            const axisInsights = axisParts.join('\n\n');

            const topPost = cats.slice().sort((a, b) => (meanPost[b] || 0) - (meanPost[a] || 0))[0];
            const forestGift =

                `사후 평균에서 **${catLabel(topPost)}** 축이 상대적으로 높게 자리하고 있어, 다음 학기 현장·야외 프로그램에서는 이 결을 **시작 루틴**에 녹여 보시길 권합니다. ` +

                `가정에서는 숲에서 쓰던 **같은 어휘**(예고, 마침표, 우리들의 약속)를 저녁 이야기에 한 번씩만 불러도 연속성이 생깁니다. ` +
                `주말 산책을 미니 숲으로 삼아 “오늘은 어떤 기질 씨앗이 보였나요?”라고 묻는 것만으로도 아이는 자신의 변화를 이야기로 소유하게 됩니다.\n\n` +

        /** 거시: 어린이집 vs 유치원 (v8.6 스키마·발달 심리 톤) */

                `발달심리학적으로 보면, **사회정서적 조절**과 **실행기능(주의 유지·순서 지키기)**의 요구 수준이 기관 유형에 따라 달라지며, 이는 관찰 점수의 패턴 차이로 번역될 수 있습니다. ` +

            const byName = {};
            STATE.institutions.forEach((inst) => {
                const k = String(inst.name || '').trim();

                if (!byName[k]) byName[k] = [];

            });
            const keys = Object.keys(byName).filter((k) => byName[k].some((m) => this.hasAnyCount(m.counts)));

                const ta = Math.max(...byName[a].map((x) => new Date(x.updatedAt || 0).getTime()));
                const tb = Math.max(...byName[b].map((x) => new Date(x.updatedAt || 0).getTime()));

            if (!keys.length) {
                return '';

            const rows = keys.slice(0, 25).map((k) => {
                const members = byName[k];
                const n = members.length;

        async exportBackup() {
            const payload = {
                mindstoryExport: true,
                schemaVersion: SCHEMA.version,
                storageKey: STORAGE_KEY,
                exportedAt: new Date().toISOString(),
                institutions: STATE.institutions
            };
            const jsonStr = JSON.stringify(payload, null, 2);
            const blob = new Blob([jsonStr], { type: 'application/json' });
            const d = new Date().toISOString().slice(0, 10);
            const filename = `mindstory-forest-temperament-${d}.json`;

            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            setTimeout(() => URL.revokeObjectURL(url), 2500);

            const file = new File([blob], filename, { type: 'application/json' });
            if (typeof navigator !== 'undefined' && navigator.share) {
                try {
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        await navigator.share({
                            files: [file],
                            title: getAppTitleDe(),
                            text: '관찰 기록 백업(JSON)입니다.'
                        });
                    } else {
                        await navigator.share({
                            title: getAppTitleDe(),
                            text: 'JSON 파일이 저장되었습니다. 파일 앱에서 카카오톡으로 보내실 수 있어요.'
                        });
                    }
                } catch (err) {
                    if (err && err.name !== 'AbortError') {
                        console.warn('[share]', err);
                    }
                }
            }
        },

        triggerImport() {
            const inp = document.getElementById('ms-import-input');
            if (inp) {
                inp.value = '';
                inp.onchange = () => UI.handleImportFile(inp.files[0]);
                inp.click();
            }
        },

        handleImportFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                try {
                    const data = JSON.parse(reader.result);
                    const list = data.institutions;
                    if (!Array.isArray(list)) {
                        alert('파일 형식이 맞지 않아요. 보낸 JSON 인지 확인해 주세요.');
                        return;
                    }
                    const existingIds = new Set(STATE.institutions.map((x) => x.id));
                    const normalize = (i) => {
                        if (!i.id) i.id = newVaultRecordId();
                        if (!i.name) i.name = '이름 없음';
                        if (!i.type) i.type = STATE.guessType(i.name);
                        if (i.groupName === undefined) i.groupName = '';
                        STATE.ensureCounts(i);
                    };
                    let added = 0;
                    let skipped = 0;
                    list.forEach((raw, idx) => {
                        const incoming = JSON.parse(JSON.stringify(raw));
                        normalize(incoming);
                        if (existingIds.has(incoming.id)) {
                            skipped += 1;
                            return;
                        }
                        while (STATE.institutions.some((x) => x.id === incoming.id)) {
                            incoming.id = newVaultRecordId();
                        }
                        existingIds.add(incoming.id);
                        STATE.institutions.push(incoming);
                        added += 1;
                    });
                    STATE.institutions.sort((a, b) =>
                        String(b.updatedAt || '').localeCompare(String(a.updatedAt || ''))
                    );
                    STATE.persist();
                    STATE.step = 'dashboard';
                    STATE.isPreviewSample = false;
                    UI.render();
                    const skipMsg = skipped ? ` (이미 금고에 있는 ID ${skipped}건은 건너뜀)` : '';
                    alert(`백업에서 ${added}건을 합쳤어요.${skipMsg} 전체 목록은 최신순으로 정리했습니다.`);
                } catch (e) {
                    alert('JSON 읽기에 실패했어요.');
                }
            };
            reader.readAsText(file, 'UTF-8');
        }
    };

        /**

         * (상대경로 ./파일명 은 /forest 에서 루트로 잘못 해석되어 404 발생)
         * HEAD 대신 숨김 video 로 재생 가능 여부만 확인합니다.
         */
        initDashboardVisualVideo() {
            const introVideo = document.getElementById('introVideo');
            if (!introVideo) return;
            introVideo.muted = true;
            try {
                introVideo.playsInline = true;
            } catch (_) {
                /* ignore */
            }
            try {
                introVideo.setAttribute('playsinline', '');
                introVideo.setAttribute('webkit-playsinline', '');
            } catch (_) {
                /* ignore */
            }
            introVideo.preload = 'auto';

            const defaultUrl = normalizeForestVideoUrl(DEFAULT_FOREST_DASH_VIDEO);
            const relayFileNames = [
                'KakaoTalk_20240501_163910442.mp4',
                'KakaoTalk_20240501_172743992.mp4'
            ];

            function candidateUrlsForFile(name) {
                try {
                    return [
                        new URL('/assets/' + name, location.href).href,
                        new URL('/' + name, location.href).href
                    ];
                } catch (_) {
                    return [];
                }
            }

            /** HEAD 대신 숨김 video 로 재생 가능 URL 하나만 선택 (메인 DOM 깜빡임 없음) */
            function probeVideoUrl(url) {
                return new Promise(function (resolve) {
                    let done = false;
                    const t = document.createElement('video');
                    t.preload = 'metadata';
                    t.muted = true;
                    const finish = function (ok) {
                        if (done) return;
                        done = true;
                        try {
                            t.removeAttribute('src');
                            t.load();
                        } catch (_) {
                            /* ignore */
                        }
                        resolve(ok ? url : null);
                    };
                    const onOk = function () {
                        t.removeEventListener('loadeddata', onOk);
                        t.removeEventListener('error', onBad);
                        finish(true);
                    };
                    const onBad = function () {
                        t.removeEventListener('loadeddata', onOk);
                        t.removeEventListener('error', onBad);
                        finish(false);
                    };
                    t.addEventListener('loadeddata', onOk, { once: true });
                    t.addEventListener('error', onBad, { once: true });
                    try {
                        t.src = url;
                        t.load();
                    } catch (_) {
                        finish(false);
                    }
                });
            }

            function pickFirstPlayable(urls) {
                if (!urls.length) return Promise.resolve(null);
                return probeVideoUrl(urls[0]).then(function (got) {
                    if (got) return got;
                    return pickFirstPlayable(urls.slice(1));
                });
            }

            const onErr = function () {
                MS.onDashboardVideoError(introVideo);
            };

            Promise.all(
                relayFileNames.map(function (name) {
                    return pickFirstPlayable(candidateUrlsForFile(name));
                })
            ).then(function (resolved) {
                let videoSources = resolved.filter(Boolean);
                if (videoSources.length === 0) {
                    videoSources = [defaultUrl];
                }

                const relayMode = videoSources.length >= 2;
                if (relayMode) {
                    introVideo.removeAttribute('loop');
                    introVideo.loop = false;
                } else {
                    introVideo.loop = true;
                }

                let currentVideoIndex = 0;
                introVideo.addEventListener('error', onErr);
                introVideo.addEventListener(
                    'loadeddata',
                    function () {
                        introVideo.classList.remove('opacity-0', 'pointer-events-none');
                    },
                    { once: true }
                );

                if (relayMode) {
                    introVideo.addEventListener('ended', function onEnded() {
                        currentVideoIndex = (currentVideoIndex + 1) % videoSources.length;
                        introVideo.src = videoSources[currentVideoIndex];
                        try {
                            introVideo.load();
                        } catch (_) {
                            /* ignore */
                        }
                        try {
                            const p = introVideo.play && introVideo.play();
                            if (p && typeof p.catch === 'function') {
                                p.catch(function (e) {
                                    try {
                                        console.log('자동재생 방지됨', e);
                                    } catch (_) {
                                        /* ignore */
                                    }
                                });
                            }
                        } catch (_) {
                            /* ignore */
                        }
                    });
                }

                introVideo.src = videoSources[currentVideoIndex];
                try {
                    introVideo.load();
                } catch (_) {
                    /* ignore */
                }
                try {
                    const p = introVideo.play && introVideo.play();
                    if (p && typeof p.catch === 'function') {
                        p.catch(function (e) {
                            try {
                                console.log('자동재생 방지됨', e);
                            } catch (_) {
                                /* ignore */
                            }
                        });
                    }
                } catch (_) {
                    /* ignore */
                }
            });

        submitUnifiedSetupFromModal() {
            try {
                const instEl = document.getElementById('ms-modal-inst-name');
                const name = String((instEl && instEl.value) || '').trim();
                if (!name) {
                    alert('기관명을 입력해 주세요.');
                    return;
                }
                const exEl = document.getElementById('ms-examiner-name-modal');
                const examiner = String((exEl && exEl.value) || '').trim();
                if (!examiner) {
                    alert('진행자(해설사) 성함을 입력해 주세요.');
                    return;
                }
                MS.onExaminerNameInput(examiner);
                STATE.searchTerm = name;
                const phase = STATE.observationStage === 'post' ? 'post' : 'pre';
                let inst = STATE.institutions.find((i) => String(i.name).trim() === name);
                if (!inst) {
                    if (STATE.targetGroup === 'preschool' && !STATE.setupTypeOverride) {
                        alert('유아부는 기관 유형(어린이집·유치원·기타)을 선택해 주세요.');
                        return;
                    }
                    if (STATE.targetGroup === 'elementary' && !STATE.setupTypeOverride) {
                        alert('초등부는 기관 유형(지역아동센터·방과후교실·초등학교)을 선택해 주세요.');
                        return;
                    }
                    inst = STATE.addInstitution(name);
                    inst.type = STATE.setupTypeOverride || STATE.guessType(name);
                    inst.obsPhase = phase;
                } else {
                    STATE.selectedId = inst.id;
                    STATE.ensureCounts(inst);
                    if (STATE.setupTypeOverride) inst.type = STATE.setupTypeOverride;
                    if (phase === 'pre' || phase === 'post') inst.obsPhase = phase;
                }
                inst.targetGroup = STATE.targetGroup === 'elementary' ? 'elementary' : 'preschool';
                const gEl = document.getElementById('ms-unified-group-name');
                const gn = gEl && gEl.value.trim() ? gEl.value.trim().slice(0, 120) : '';
                inst.groupName = gn;
                inst.obsLocation = STATE.obsLocation === 'indoor' ? 'indoor' : 'forest';
                const pcEl = document.getElementById('ms-unified-participant-count');
                const pcRaw = pcEl ? String(pcEl.value || '').trim() : '';
                if (pcRaw === '') {
                    inst.participantTargetCount = null;
                } else {
                    const pn = parseInt(pcRaw, 10);
                    inst.participantTargetCount = Number.isFinite(pn) && pn > 0 ? pn : null;
                }
                STATE.setupObsPhase = phase;
                STATE.setupTypeOverride = null;
                STATE.unifiedSetupGroupDraft = '';
                STATE.step = 'input';
                STATE.isPreviewSample = false;
                STATE.touchSelected();
                STATE.persist();
                MS.closeForestModal();
                UI.render();
            } catch (e) {
                try {
                    console.error('[forest] submitUnifiedSetupFromModal', e);
                } catch (_) {
                    /* ignore */
                }
                try {
                    alert('검사 설정을 적용하는 중 오류가 났습니다. 페이지를 새로고침한 뒤 다시 시도해 주세요.');
                } catch (_) {
                    /* ignore */
                }
            }
        },
        /** v18.0: 기관명만 비우고 모달 유지 (입력은 브라우저·IME에 맡김) */
        clearModalInstNameInput(ev) {
            if (ev) {
                ev.preventDefault();
                ev.stopPropagation();
            }
            STATE.searchTerm = '';
            STATE.selectedId = null;
            STATE.setupTypeOverride = null;
            MS._modalInstDropdownAll = false;
            try {
                STATE.persist();
            } catch (_) {
                /* ignore */
            }
            MS.openNewExamPrepModal();
            requestAnimationFrame(() => {
                const n = document.getElementById('ms-modal-inst-name');
                if (n) {
                    n.value = '';
                    n.focus();
                }
                MS.updateModalInstDropdown();
            });
        },
        setPrepModalTargetGroup(tg) {
            if (tg !== 'preschool' && tg !== 'elementary') return;
            STATE.targetGroup = tg;
            const sel = STATE.selected();
            const instInp = document.getElementById('ms-modal-inst-name');
            const nameVal = String((instInp && instInp.value) || STATE.searchTerm || '');
            if (sel) {
                STATE.setupTypeOverride = null;

        /**
         * 결과 보고서 PDF·Word 영역이 실제로 보이는지(0 크기·display:none·부모 숨김 제외).
         */
        forestReportExportTargetUsable(el) {
            if (!el || !el.isConnected) return false;
            try {
                const r = el.getBoundingClientRect();
                if (r.width < 2 && r.height < 2) return false;
                const st = window.getComputedStyle(el);
                if (st.display === 'none' || st.visibility === 'hidden' || Number(st.opacity) === 0) return false;
                let p = el.parentElement;
                while (p && p !== document.body) {
                    const ps = window.getComputedStyle(p);
                    if (ps.display === 'none' || ps.visibility === 'hidden') return false;
                    p = p.parentElement;
                }
            } catch (_) {
                return false;
            }
            return true;
        },
        /**
         * 결과 보고서 PDF·Word 저장 영역으로 스크롤 (모달 닫은 직후 DOM이 늦을 수 있어 재시도).
         * @param {{ attempt?: number }} [opt]
         */
        scrollToForestReportExports(opt) {
            const attempt = opt && typeof opt.attempt === 'number' ? opt.attempt : 0;
            const maxAttempts = 14;
            const delayMs = attempt < 4 ? 60 : attempt < 9 ? 120 : 200;
            requestAnimationFrame(function () {
                const ids = ['result-section', 'ms-report-pdf-download-btn', 'ms-report-docx-download-btn', 'ms-report-capture-root'];
                let el = null;
                let k;
                for (k = 0; k < ids.length; k++) {
                    const cand = document.getElementById(ids[k]);
                    if (cand && MS.forestReportExportTargetUsable(cand)) {
                        el = cand;
                        break;
                    }
                }
                if (!el && attempt >= 10) {
                    const fb =
                        document.getElementById('report-container') ||
                        document.getElementById('view-content');
                    if (fb && MS.forestReportExportTargetUsable(fb)) {
                        el = fb;
                    }
                }
                if (!el || !MS.forestReportExportTargetUsable(el)) {
                    if (attempt < maxAttempts) {
                        setTimeout(function () {
                            MS.scrollToForestReportExports({ attempt: attempt + 1 });
                        }, delayMs);
                    }
                    return;
                }
                try {
                    const block = el.id === 'result-section' ? 'start' : 'center';
                    el.scrollIntoView({ behavior: attempt > 0 ? 'auto' : 'smooth', block: block });
                } catch (_) {
                    try {
                        el.scrollIntoView(true);
                    } catch (_) {
                        /* ignore */
                    }
                }
            });

        /** GAS 시트용 페이로드 로컬 백업 (no-cors 실패 시) — 키 ms_forest_gas_backup */
        backupGasSheetPayload(sheetPayload) {
            try {
                const key = 'ms_forest_gas_backup';
                const row = { savedAt: new Date().toISOString(), payload: sheetPayload };
                let prev = [];
                try {
                    prev = JSON.parse(localStorage.getItem(key) || '[]');
                } catch (_) {
                    prev = [];
                }
                if (!Array.isArray(prev)) prev = [];
                prev.unshift(row);
                localStorage.setItem(key, JSON.stringify(prev.slice(0, 40)));
            } catch (_) {
                /* ignore */
            }
        },

        /** 로컬 백업(ms_forest_gas_backup·jtt_backup)을 GAS로 재전송 후 대기열 비우기 */
        forceSyncGasBackups() {
            const entries = [];
            try {
                const raw = localStorage.getItem('ms_forest_gas_backup');
                if (raw) {
                    const p = JSON.parse(raw);
                    if (Array.isArray(p)) entries.push.apply(entries, p);
                }
            } catch (_) {
                /* ignore */
            }
            try {
                const j = localStorage.getItem('jtt_backup');
                if (j && String(j).trim()) {
                    const ob = JSON.parse(j);
                    if (ob && typeof ob === 'object') entries.push({ payload: ob, savedAt: '' });
                }
            } catch (_) {
                /* ignore */
            }
            if (entries.length === 0) {
                alert('전송할 대기 데이터가 없습니다.');
                return;
            }
            (async function () {
                for (let i = 0; i < entries.length; i++) {
                    const entry = entries[i];
                    const payload = entry && entry.payload != null ? entry.payload : entry;
                    if (!payload || typeof payload !== 'object') continue;
                    try {
                        await postForestGasSheetFetch(payload);
                    } catch (e) {
                        try {
                            console.warn('[forest GAS] forceSync 백업 재전송 실패:', e);
                        } catch (_) {
                            /* ignore */
                        }
                    }
                }
                try {
                    localStorage.removeItem('ms_forest_gas_backup');
                    localStorage.removeItem('jtt_backup');
                } catch (_) {
                    /* ignore */
                }
                alert('구글 시트로 다시 보내기를 시도했습니다.');
            })();
        },

        countForestGasBackupPending() {
            let n = 0;
            try {
                const raw = localStorage.getItem('ms_forest_gas_backup');
                if (raw) {
                    const p = JSON.parse(raw);
                    if (Array.isArray(p)) n += p.length;
                }
            } catch (_) {
                /* ignore */
            }
            try {
                const j = localStorage.getItem('jtt_backup');
                if (j && String(j).trim()) n += 1;
            } catch (_) {
                /* ignore */
            }
            return n;
        },
