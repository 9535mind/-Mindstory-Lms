        /**
         * 시트·전송용 대상 그룹: inst에 명시된 targetGroup 우선(초등 12문항·rawInputs 길이 오류 방지).
         */
        resolveForestTargetGroup(inst) {
            if (!inst) return 'preschool';
            const t = inst.targetGroup;
            if (t === 'elementary' || t === 'preschool') return t;
            if (t === '초등부' || t === '초등') return 'elementary';
            if (t === '유아·유치부' || t === '유아' || t === '유치원부') return 'preschool';
            return SCHEMA.getTargetGroup(inst);
        },
        /** GAS 시트 A열(입력시간) — 예: 26. 4. 6 오후 8:46 (Asia/Seoul, 한국어) */
        formatSheetDateYy(d) {
            const x = d instanceof Date ? d : new Date();
            const s = x.toLocaleString('ko-KR', {
                timeZone: 'Asia/Seoul',
                year: '2-digit',
                month: 'numeric',
                day: 'numeric',
                hour: 'numeric',
                minute: '2-digit',
                hour12: true
            });
            return s.replace(/\s+/g, ' ').trim();
        },
        /** GAS appendForest2026Row_(scripts/gas-forest-2026-rowContents-sample.gs) — 기관유형은 허용 목록만, 기관명은 유형 접미 중복 시 제거 */
        normalizeForestSheetInstType(inst) {
            const valid = ['어린이집', '유치원', '기타', '지역아동센터', '방과후교실', '초등학교'];
            const raw = String((inst && inst.type) || '').trim();
            if (valid.includes(raw)) return raw;
            const tg = SCHEMA.getTargetGroup(inst);
            const n = String((inst && inst.name) || '').trim();
            const g = STATE.guessType(n);
            if (valid.includes(g)) return g;
            return tg === 'elementary' ? '지역아동센터' : '어린이집';
        },
        stripForestSheetInstNameSuffix(name, type) {
            let n = String(name || '').trim();
            const t = String(type || '').trim();
            if (t === '어린이집' && n.endsWith('어린이집') && n.length > 4) {
                n = n.slice(0, -4).trimEnd();
            } else if (t === '유치원' && n.endsWith('유치원') && n.length > 3) {
                n = n.slice(0, -3).trimEnd();
            } else if (t === '기타' && n.endsWith('기타') && n.length > 2) {
                n = n.slice(0, -2).trimEnd();
            }
            return n;
        },

        /**
         * 전송·시트·복원용 원시 입력. 유아·초등: 세모(△)=yes=triangle, 네모(□)=no=square.
         * (구 q1y/q1n 대체 — GAS·buildInstFromSheetPayload 는 rawInputs 우선, 구 키는 하위 호환)
         */
        buildForestRawInputs(inst, tg) {
            const out = {};
            const g = tg === 'elementary' ? 'elementary' : 'preschool';
            try {
                STATE.ensureCounts(inst);
            } catch (_) {
                /* ignore */
            }
            try {
                SCHEMA.syncLegacyTriSquareIntoCanonical(inst);
            } catch (_) {
                /* ignore */
            }
            const qs = SCHEMA.questionsForGroup(g);
            /** 시트·GAS 12칸 고정: 유아는 Q9~Q12를 0으로 채워 payload에 키가 항상 존재 */
            for (let i = 1; i <= 12; i++) {
                if (g === 'preschool' && i > 8) {
                    out['q' + i + '_triangle'] = 0;
                    out['q' + i + '_square'] = 0;
                    continue;
                }
                const q = qs[i - 1];
                let yv = 0;
                let nv = 0;
                if (q && inst.counts && inst.counts[q.id]) {
                    const row = inst.counts[q.id];
                    yv = forestParseCountInt(row && row.yes);
                    nv = forestParseCountInt(row && row.no);
                }
                if ((yv + nv === 0 || !q) && inst.counts) {
                    const leg = inst.counts['q' + i];
                    if (leg) {
                        yv = forestParseCountInt(leg && leg.yes);
                        nv = forestParseCountInt(leg && leg.no);
                    }
                }
                out['q' + i + '_triangle'] = yv;
                out['q' + i + '_square'] = nv;
            }
            return out;
        },

        /**
         * GAS payload.answers: 키 "1"~"12" = 해당 문항의 △ 인원(정수). buildForestRawInputs 와 동일 산출(문항별 독립).
         */
        buildForestSheetAnswersPayload(inst, tg) {
            const raw = MS.buildForestRawInputs(inst, tg);
            const g = tg === 'elementary' ? 'elementary' : 'preschool';
            const answers = {};
            let i;
            for (i = 1; i <= 12; i++) {
                if (g === 'preschool' && i > 8) {
                    answers[String(i)] = 0;
                    continue;
                }
                answers[String(i)] = forestParseCountInt(raw['q' + i + '_triangle']);
            }
            return answers;
        },

        /** 전송·보고서 링크용 고유 ID (시트 requestId 열과 동일 문자열) — Date.now + 랜덤 */
        generateForestRequestId() {
            return (
                String(Date.now()) +
                '-' +
                Math.random().toString(36).slice(2, 11) +
                Math.random().toString(36).slice(2, 7)
            );
        },

        /** 검사 입력 진입 시 한 번 발급해 두었다가 submit·GAS·로컬 스냅샷에 동일 ID 사용 */
        ensurePendingForestRequestId(inst) {
            if (!inst) return;
            try {
                const r = String(inst.pendingForestRequestId || '').trim();
                if (!r) {
                    inst.pendingForestRequestId = MS.generateForestRequestId();
                    STATE.persist();
                }
            } catch (_) {
                /* ignore */
            }
        },

        /** GAS 전송 직전: requestId 누락 방지 */
        syncForestTransmitRequestIds(inst, sheetPayload) {
            if (!inst || !sheetPayload) return '';
            MS.ensurePendingForestRequestId(inst);
            let rid = String(inst.pendingForestRequestId || sheetPayload.requestId || '').trim();
            if (!rid) rid = MS.generateForestRequestId();
            inst.pendingForestRequestId = rid;
            sheetPayload.requestId = rid;
            let ru = String(sheetPayload.report_url || sheetPayload.reportUrl || '').trim();
            if (!ru) {
                try {
                    const u = new URL(location.href);
                    ru = u.origin + u.pathname + '?view=report&id=' + encodeURIComponent(rid);
                } catch (_) {
                    ru = '';
                }
            }
            if (!ru) {
                ru = 'https://mindstory.kr/forest.html?view=report&id=' + encodeURIComponent(rid);
            }
            sheetPayload.report_url = ru;
            sheetPayload.reportUrl = ru;
            try {
                STATE.persist();
            } catch (_) {
                /* ignore */
            }
            return rid;
        },

        saveForestReportSnapshot(requestId, sheetPayload, inst, tg) {
            try {
                const snap = {
                    version: 1,
                    requestId: String(requestId || '').trim(),
                    savedAt: new Date().toISOString(),
                    sheetPayload: sheetPayload && typeof sheetPayload === 'object' ? { ...sheetPayload } : {},
                    inst: {
                        name: String((inst && inst.name) || '').trim(),
                        type: MS.normalizeForestSheetInstType(inst),
                        targetGroup: tg === 'elementary' ? 'elementary' : 'preschool',
                        obsPhase: inst && inst.obsPhase === 'post' ? 'post' : inst && inst.obsPhase === 'pre' ? 'pre' : '',
                        groupName: String((inst && inst.groupName) || '').trim(),
                        obsLocation: inst && inst.obsLocation === 'indoor' ? 'indoor' : 'forest',
                        counts: JSON.parse(JSON.stringify((inst && inst.counts) || {}))
                    }
                };
                localStorage.setItem(LS_FOREST_REPORT_PREFIX + snap.requestId, JSON.stringify(snap));
            } catch (_) {
                /* ignore */
            }
        },

        /** 시트 JSON(rawInputs·isElementary 등)으로 inst 복원 — rawInputs 우선, 구 q1y/q1n 지원 */
        buildInstFromSheetPayload(payload) {
            const p = payload || {};
            const ri = p.rawInputs && typeof p.rawInputs === 'object' ? p.rawInputs : {};
            const tg = p.isElementary === true ? 'elementary' : 'preschool';
            const rawName = String(p.institution_name || '').trim() || '관찰 기록';
            const type = String(p.institution_type || '').trim() || STATE.guessType(rawName);
            const phase = p.phase === 'post' ? 'post' : 'pre';
            const groupName = String(p.class_name || '').trim();
            const loc = String(p.location || '').trim();
            const obsLocation = loc === '실내' ? 'indoor' : 'forest';
            const qs = SCHEMA.questionsForGroup(tg);
            const maxQ = tg === 'elementary' ? 12 : 8;
            const counts = {};
            for (let i = 1; i <= maxQ; i++) {
                const q = qs[i - 1];
                if (!q) continue;
                const tk = 'q' + i + '_triangle';
                const sk = 'q' + i + '_square';
                let y = ri[tk];
                let nv = ri[sk];
                if (y === undefined && nv === undefined) {
                    y = Number(p['q' + i + 'y']);
                    nv = Number(p['q' + i + 'n']);
                } else {
                    y = Number(y);
                    nv = Number(nv);
                }
                counts[q.id] = {
                    yes: String(Number.isFinite(y) && !Number.isNaN(y) ? y : 0),
                    no: String(Number.isFinite(nv) && !Number.isNaN(nv) ? nv : 0)
                };
            }
            const rid = String(p.requestId || '').trim();
            const inst = {
                id: rid ? 'report_dl_' + rid.replace(/[^a-zA-Z0-9_-]/g, '_') : newVaultRecordId(),
                name: rawName,
                type: type,
                targetGroup: tg,
                obsPhase: phase,
                groupName: groupName,
                obsLocation: obsLocation,
                counts: counts,
                updatedAt: new Date().toISOString(),
                lastReportRequestId: rid || undefined
            };
            STATE.ensureCounts(inst);
            return inst;
        },

        applyForestReportSnapshot(snap) {
            try {
                const s = snap && typeof snap === 'object' ? snap : null;
                if (!s) return false;
                let inst = null;
                if (s.inst && s.inst.counts && typeof s.inst.counts === 'object') {
                    const rid = String(s.requestId || (s.sheetPayload && s.sheetPayload.requestId) || '').trim();
                    inst = {
                        id: rid ? 'report_dl_' + rid.replace(/[^a-zA-Z0-9_-]/g, '_') : newVaultRecordId(),
                        name: String(s.inst.name || '').trim() || '관찰 기록',
                        type: String(s.inst.type || '').trim() || '어린이집',
                        targetGroup: s.inst.targetGroup === 'elementary' ? 'elementary' : 'preschool',
                        obsPhase: s.inst.obsPhase === 'post' ? 'post' : s.inst.obsPhase === 'pre' ? 'pre' : '',
                        groupName: String(s.inst.groupName || '').trim(),
                        obsLocation: s.inst.obsLocation === 'indoor' ? 'indoor' : 'forest',
                        counts: JSON.parse(JSON.stringify(s.inst.counts)),
                        updatedAt: s.savedAt || new Date().toISOString(),
                        lastReportRequestId: rid || undefined
                    };
                    STATE.ensureCounts(inst);
                } else if (s.sheetPayload && typeof s.sheetPayload === 'object') {
                    inst = MS.buildInstFromSheetPayload(s.sheetPayload);
                }
                if (!inst) return false;
                const ix = STATE.institutions.findIndex((i) => i.id === inst.id);
                if (ix >= 0) STATE.institutions[ix] = inst;
                else STATE.institutions.push(inst);
                STATE.selectedId = inst.id;
                STATE.targetGroup = SCHEMA.getTargetGroup(inst);
                STATE.observationStage = inst.obsPhase === 'post' ? 'post' : 'pre';
                STATE.step = 'result';
                STATE.isPreviewSample = false;
                STATE.reportDeepLink = true;
                STATE.searchTerm = String(inst.name || '').trim();
                return true;
            } catch (err) {
                try {
                    console.error('[forest] applyForestReportSnapshot', err);
                } catch (_) {
                    /* ignore */
                }
                return false;
            }
        },

        stripForestReportQueryParams() {
            try {
                const u = new URL(location.href);
                if (u.searchParams.get('view') !== 'report') return;
                u.searchParams.delete('view');
                u.searchParams.delete('id');
                const q = u.searchParams.toString();
                history.replaceState({}, '', u.pathname + (q ? '?' + q : '') + (u.hash || ''));
            } catch (_) {
                /* ignore */
            }
        },

        /**
         * 동일 출처 Worker 프록시(/api/forest-gas-report) → GAS doGet.
         * @returns {{ snapshot: object|null, error: null|'forbidden' }}
         */
        fetchForestReportSnapshotById(rid) {
            const id = String(rid || '').trim();
            if (!id) return Promise.resolve({ snapshot: null, error: null });

            function parseSnapshotJson(j) {
                if (!j || typeof j !== 'object') return null;
                if (j.success === false) return null;
                if (j.snapshot && typeof j.snapshot === 'object') return j.snapshot;
                if (j.version === 1 && (j.inst || j.sheetPayload)) return j;
                if (j.sheetPayload && typeof j.sheetPayload === 'object') return j;
                return null;
            }

            const proxyUrl = '/api/forest-gas-report?id=' + encodeURIComponent(id);
            return fetch(proxyUrl, { method: 'GET', mode: 'same-origin', cache: 'no-store', credentials: 'same-origin' })
                .then(function (r) {
                    return r.text().then(function (raw) {
                        try {
                            var dbgR =
                                (typeof location !== 'undefined' &&
                                    /\bforest_report_debug=1\b/.test(String(location.search || ''))) ||
                                (typeof localStorage !== 'undefined' &&
                                    localStorage.getItem('ms_forest_report_debug') === '1');
                            if (dbgR) {
                                console.info('[forest][forest-gas-report]', {
                                    id: id,
                                    status: r.status,
                                    ok: r.ok,
                                    rawLen: raw ? raw.length : 0,
                                    rawHead: raw ? String(raw).slice(0, 400) : ''
                                });
                            }
                        } catch (_) {
                            /* ignore */
                        }
                        if (r.status === 401) {
                            return { snapshot: null, error: null };
                        }
                        if (r.status === 403) {
                            return { snapshot: null, error: 'forbidden' };
                        }
                        if (!raw || !String(raw).trim()) return { snapshot: null, error: null };
                        let j = null;
                        try {
                            j = JSON.parse(raw);
                        } catch (_) {
                            return { snapshot: null, error: null };
                        }
                        if (!r.ok) return { snapshot: null, error: null };
                        return { snapshot: parseSnapshotJson(j), error: null };
                    });
                })
                .catch(function () {
                    return { snapshot: null, error: null };
                });
        },

        async tryForestReportViewFromQuery() {
            try {
                const u = new URL(location.href);
                if (u.searchParams.get('view') !== 'report') return false;
                const rid = String(u.searchParams.get('id') || '').trim();
                if (!rid) {
                    MS.stripForestReportQueryParams();
                    return false;
                }
                let snap = null;
                try {
                    const raw = localStorage.getItem(LS_FOREST_REPORT_PREFIX + rid);
                    if (raw) snap = JSON.parse(raw);
                } catch (_) {
                    snap = null;
                }
                if (!snap) {
                    await new Promise(function (r) {
                        queueMicrotask(r);
                    });
                    try {
                        const raw2 = localStorage.getItem(LS_FOREST_REPORT_PREFIX + rid);
                        if (raw2) snap = JSON.parse(raw2);
                    } catch (_) {
                        snap = null;
                    }
                }
                if (!snap) {
                    await new Promise(function (r) {
                        setTimeout(r, 0);
                    });
                    try {
                        const raw3 = localStorage.getItem(LS_FOREST_REPORT_PREFIX + rid);
                        if (raw3) snap = JSON.parse(raw3);
                    } catch (_) {
                        snap = null;
                    }
                }
                if (!snap) {
                    try {
                        if (STATE.institutions && STATE.institutions.length) {
                            let ji;
                            for (ji = 0; ji < STATE.institutions.length; ji++) {
                                const ii = STATE.institutions[ji];
                                const lr = String(ii.lastReportRequestId || '').trim();
                                const pr = String(ii.pendingForestRequestId || '').trim();
                                if (lr === rid || pr === rid) {
                                    STATE.selectedId = ii.id;
                                    STATE.isPreviewSample = false;
                                    STATE.reportDeepLink = true;
                                    STATE.step = 'result';
                                    STATE.persist();
                                    MS.stripForestReportQueryParams();
                                    return true;
                                }
                            }
                        }
                    } catch (_) {
                        /* ignore */
                    }
                    const out = await MS.fetchForestReportSnapshotById(rid);
                    if (out && out.error === 'forbidden') {
                        try {
                            alert(
                                '이 링크로는 보고서를 불러올 수 없습니다.\n같은 기기에 저장된 링크인지 확인하거나, 구글 시트·동기화 설정을 확인해 주세요.\n\nrequestId: ' +
                                    rid
                            );
                        } catch (_) {
                            /* ignore */
                        }
                        MS.stripForestReportQueryParams();
                        return false;
                    }
                    snap = out && out.snapshot ? out.snapshot : null;
                }
                if (!snap) {
                    try {
                        alert(
                            '이 링크에 해당하는 보고서 데이터를 찾을 수 없습니다.\n\n' +
                                '· 이 기기의 로컬 저장소에 해당 requestId가 있는지 확인하세요.\n' +
                                '· 구글 시트(GAS) 연동이 설정된 경우 관리자에게 문의하세요.\n\n' +
                                'requestId: ' +
                                rid
                        );
                    } catch (_) {
                        /* ignore */
                    }
                    MS.stripForestReportQueryParams();
                    return false;
                }
                if (MS.applyForestReportSnapshot(snap)) {
                    MS.stripForestReportQueryParams();
                    return true;
                }
                MS.stripForestReportQueryParams();
                return false;
            } catch (e) {
                try {
                    console.error('[forest] tryForestReportViewFromQuery', e);
                } catch (_) {
                    /* ignore */
                }
                try {
                    MS.stripForestReportQueryParams();
                } catch (_) {
                    /* ignore */
                }
                return false;
            }
        },

        async buildForestReportPdfBlob(inst) {
            const html2pdfFn = await MS.loadHtml2Pdf();
            const html = MS.buildForestReportPdfHtmlContent(inst);
            const host = MS.getOrCreateForestPdfHtmlRoot();
            host.innerHTML = '';
            host.style.cssText =

            const el = host.firstElementChild;
            if (!el) {
                throw new Error('PDF HTML mount failed');
            }
            try {
                await MS.waitForForestPdfFonts();
                const opt = {
                    margin: [10, 10, 14, 10],
                    filename: 'forest-report.pdf',
                    image: { type: 'jpeg', quality: 0.96 },
                    html2canvas: {
                        scale: 2,
                        useCORS: true,
                        letterRendering: true,
                        logging: false,
                        backgroundColor: '#ffffff'
                    },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                    pagebreak: { mode: ['avoid-all', 'css', 'legacy'], avoid: ['.ms-pdf-avoid-break'] }
                };
                let blob;
                const worker = html2pdfFn().set(opt).from(el);
                if (typeof worker.outputPdf === 'function') {
                    blob = await worker.outputPdf('blob');
                } else {
                    const pdf = await worker.toPdf().get('pdf');
                    blob = pdf.output('blob');
                }
                if (!blob || !(blob instanceof Blob)) {
                    throw new Error('PDF Blob 생성 실패');
                }

        async confirmPdfDownloadFromPreview() {
            const filename = MS._pdfPreviewFilename;
            const blob = MS._pdfPreviewBlob;
            if (!blob || !filename) return;

            const file = new File([blob], filename, { type: 'application/pdf' });
            const isMobile =
                typeof navigator !== 'undefined' &&
                (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent || '') ||
                    (typeof window.matchMedia === 'function' && window.matchMedia('(max-width: 768px)').matches));
            const shareOk =
                isMobile &&
                typeof navigator !== 'undefined' &&
                typeof navigator.share === 'function' &&
                typeof navigator.canShare === 'function';

            if (shareOk) {
                try {
                    if (navigator.canShare({ files: [file] })) {
                        await navigator.share({
                            files: [file],
                            title: '유아숲 결과보고서',
                            text: filename
                        });
                        MS.showForestToast(
                            '공유 시트에서 파일에 저장·다른 앱으로 보내기 등을 선택할 수 있습니다.',
                            4200
                        );
                        return;
                    }
                } catch (e) {
                    if (e && e.name === 'AbortError') return;
                    /* fall through to anchor download */
                }
            }

            try {
                const url = MS._pdfPreviewBlobUrl || URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.rel = 'noopener';
                document.body.appendChild(a);
                a.click();
                a.remove();
                if (url !== MS._pdfPreviewBlobUrl) {
                    try {
                        URL.revokeObjectURL(url);
                    } catch (_) {
                        /* ignore */
                    }

        buildForestReportPdfFilename(inst) {
            const ridP = inst && String(inst.lastReportRequestId || '').trim();
            const idPart = ridP
                ? ridP.replace(/[^a-zA-Z0-9_-]/g, '_').slice(0, 40)
                : String((inst && inst.id) || 'report').replace(/[^a-zA-Z0-9_-]/g, '_').slice(0, 32);
            let dateSeg = '';
            try {
                const d = new Date();
                dateSeg =
                    String(d.getFullYear()) +
                    String(d.getMonth() + 1).padStart(2, '0') +
                    String(d.getDate()).padStart(2, '0');
            } catch (_) {
                dateSeg = String(Date.now()).slice(0, 8);
            }
            return '유아숲_결과보고서_' + dateSeg + '_' + idPart + '.pdf';
        },

                            : '모든 문항에 O·X 인원 수를 입력해 주세요.'
                    );

        /**
         * 구글 시트(webhook)만 전송 — 평생교육원 DB·로그인 API 호출 없음.
         * @returns {Promise<{ ok: boolean, gasFailed?: boolean, gasErrorMessage?: string, drivePdfUrl?: string, gasResponse?: object }>}
         */
        submitForestGroupResult() {
            if (STATE.isPreviewSample) return Promise.resolve({ ok: false });
            if (STATE.reportDeepLink) return Promise.resolve({ ok: false });
            const inst = STATE.selected();
            if (!inst) return Promise.resolve({ ok: false });
            const iname = String(inst.name || '').trim();
            if (!iname) return Promise.resolve({ ok: false });
            if (!MS.forestRespondentTotalsOk(inst)) {
                MS.showForestRespondentMismatchModal();
                return Promise.resolve({ ok: false });
            }
            try {
                const key = 'ms_forest_submitted:' + inst.id + ':' + String(inst.updatedAt || '');
                if (typeof sessionStorage !== 'undefined' && sessionStorage.getItem(key)) return Promise.resolve({ ok: false });
            } catch (_) {
                /* ignore */
            }
            if (MS._forestGasSubmitInFlight) return Promise.resolve({ ok: false });
            MS._forestGasSubmitInFlight = true;

            let sheetPayload;
            try {
                const tg = MS.resolveForestTargetGroup(inst);
                const totalsO = SCHEMA.rawOTotalsFromCounts(inst.counts, tg);
                const participantCount = SCHEMA.participantCountFromQ1(inst.counts, tg);
                const observation_stage =
                    inst.obsPhase === 'pre' || inst.obsPhase === 'post'
                        ? inst.obsPhase
                        : STATE.observationStage === 'post'
                          ? 'post'
                          : 'pre';
                const group_name = String(inst.groupName || '').trim();
                const examiner = String(MS.getExaminerName() || '').trim();
                const location = inst.obsLocation === 'indoor' ? '실내' : '숲';
                /** GAS 시트 "2026" 열: 봄·여름·가을·겨울 = scores.SPRT … scores.WINT — sample.gs appendForest2026Row_ 와 동기 */
                const age_group_label = tg === 'elementary' ? '초등' : '유아';
                const typeForSheet = MS.normalizeForestSheetInstType(inst);
                const nameForSheet = String(MS.stripForestSheetInstNameSuffix(iname, typeForSheet) || iname).trim() || iname;
                const rawInputs = MS.buildForestRawInputs(inst, tg);
                MS.ensurePendingForestRequestId(inst);
                let requestId = String(inst.pendingForestRequestId || '').trim() || MS.generateForestRequestId();
                inst.pendingForestRequestId = requestId;
                let reportUrl = '';
                try {
                    const u = new URL(location.href);
                    reportUrl = u.origin + u.pathname + '?view=report&id=' + encodeURIComponent(requestId);
                } catch (_) {
                    reportUrl = '';
                }
                if (!String(reportUrl || '').trim() && requestId) {
                    reportUrl =
                        'https://mindstory.kr/forest.html?view=report&id=' + encodeURIComponent(requestId);
                }
                const isKinder = tg !== 'elementary';
                sheetPayload = {
                    /** GAS: 시트명 2026(유아) vs 2026초등 — scripts/gas-forest-2026-rowContents-sample.gs doPost 와 동기 */
                    isElementary: tg === 'elementary',
                    /** GAS getSheetByName — 유아/초등 탭 구분 */
                    targetSheet: isKinder ? '2026 유아용' : '2026 초등용',
                    /** 보고서 딥링크·시트 열과 동일 문자열 */
                    requestId: requestId,
                    /** 시트 표시용 날짜(YY.M.D) — GAS appendForest2026Row_ Col A */
                    sheet_date_yy: MS.formatSheetDateYy(new Date()),
                    /** ISO 전송 시각 — GAS 고정 행의 시간 열 */
                    submitted_at_iso: new Date().toISOString(),
                    /** E열(인덱스4) — GAS·스크립트 별칭 겸용 */
                    report_url: reportUrl,
                    reportUrl: reportUrl,
                    institution_type: typeForSheet,
                    institution_name: nameForSheet,
                    phase: observation_stage,
                    scores: {
                        SPRT: totalsO.SPRT || 0,
                        SUMT: totalsO.SUMT || 0,
                        AUTT: totalsO.AUTT || 0,
                        WINT: totalsO.WINT || 0
                    },
                    rawInputs: rawInputs,
                    class_name: group_name,
                    age_group: age_group_label,
                    location: location,
                    facilitator: examiner,
                    /** 참가 인원: Q1의 △+□ 만 (시트·전송 규격) */
                    participant_count: participantCount,
                    /** GAS·시트 4축 원시 합 — 줄임말(SPRT 등)만 쓰는 스크립트 호환용 풀네임 */
                    score_spring: totalsO.SPRT || 0,
                    score_summer: totalsO.SUMT || 0,
                    score_fall: totalsO.AUTT || 0,
                    score_winter: totalsO.WINT || 0
                };
                /** GAS normalizePayload_/구 시트 호환: q1y~q12y, q1n~q12n (△=y, □=n) */
                for (let qi = 1; qi <= 12; qi++) {
                    const tk = 'q' + qi + '_triangle';
                    const sk = 'q' + qi + '_square';
                    const yv = rawInputs[tk];
                    const nv = rawInputs[sk];
                    sheetPayload['q' + qi + 'y'] = yv !== undefined && yv !== null ? yv : 0;
                    sheetPayload['q' + qi + 'n'] = nv !== undefined && nv !== null ? nv : 0;
                }
                {
                    const rid = String(sheetPayload.requestId || '').trim();
                    let ru = String(sheetPayload.report_url || sheetPayload.reportUrl || '').trim();
                    if (!ru && rid) {
                        ru = 'https://mindstory.kr/forest.html?view=report&id=' + encodeURIComponent(rid);
                    }
                    sheetPayload.report_url = ru;
                    sheetPayload.reportUrl = ru;
                }
                /* GAS 시트 헤더 columnMap 호환: institutionType·institutionName·testType·reportUrl (reportUrl은 위 객체 + report_url 별칭) */
                sheetPayload.institutionType = sheetPayload.institution_type;
                sheetPayload.institutionName = sheetPayload.institution_name;
                sheetPayload.testType = observation_stage === 'post' ? '사후' : '사전';
                sheetPayload.answers = MS.buildForestSheetAnswersPayload(inst, tg);
                MS.saveForestReportSnapshot(requestId, sheetPayload, inst, tg);
                inst.lastReportRequestId = requestId;
                STATE.persist();
            } catch (buildErr) {
                MS._forestGasSubmitInFlight = false;
                try {
                    console.error('[forest] submitForestGroupResult 페이로드 생성 실패:', buildErr);
                } catch (_) {
                    /* ignore */
                }
                try {
                    alert('결과 전송 데이터를 만들지 못했습니다. 콘솔 오류를 확인하거나 페이지를 새로고침한 뒤 다시 시도해 주세요.');
                } catch (_) {
                    /* ignore */
                }
                return Promise.resolve({ ok: false });
            }

            MS.syncForestTransmitRequestIds(inst, sheetPayload);

            /** 구글 시트(GAS)만 전송 — UI는 goResult → afterForestSheetTransmitUi → showPostSubmitChoiceModal */
            return (async function () {
                let gasNetworkFailed = false;
                let gasErrorMessage = '';
                let gasResponse = null;
                try {
                    gasResponse = await postForestGasSheetFetch(sheetPayload);
                } catch (gasErr) {
                    gasNetworkFailed = true;
                    gasErrorMessage = gasErr && gasErr.message ? String(gasErr.message) : '';
                    try {
                        console.error('[forest GAS] 시트 POST 실패:', gasErrorMessage || gasErr);
                    } catch (_) {
                        /* ignore */
                    }
                    try {
                        MS.backupGasSheetPayload(sheetPayload);
                    } catch (_) {
                        /* ignore */
                    }
                }
                const drivePdfUrl =
                    !gasNetworkFailed && gasResponse && typeof gasResponse === 'object'
                        ? extractGasDrivePdfUrl_(gasResponse)
                        : '';
                const ridSnap = String(sheetPayload.requestId || '').trim();
                if (drivePdfUrl) {
                    try {
                        inst.lastDrivePdfUrl = drivePdfUrl;
                    } catch (_) {
                        /* ignore */
                    }
                    try {
                        if (ridSnap && typeof localStorage !== 'undefined') {
                            const sk = LS_FOREST_REPORT_PREFIX + ridSnap;
                            const ex = localStorage.getItem(sk);
                            if (ex) {
                                const snap = JSON.parse(ex);
                                snap.sheetPayload = snap.sheetPayload && typeof snap.sheetPayload === 'object' ? snap.sheetPayload : {};
                                snap.sheetPayload.reportUrl = drivePdfUrl;
                                snap.sheetPayload.report_url = drivePdfUrl;
                                snap.drivePdfUrl = drivePdfUrl;
                                localStorage.setItem(sk, JSON.stringify(snap));
                            }
                        }
                    } catch (_) {
                        /* ignore */
                    }
                }
                try {
                    const key = 'ms_forest_submitted:' + inst.id + ':' + String(inst.updatedAt || '');
                    if (typeof sessionStorage !== 'undefined') sessionStorage.setItem(key, '1');
                } catch (_) {
                    /* ignore */
                }
                try {
                    inst.pendingForestRequestId = undefined;
                    delete inst.pendingForestRequestId;
                    STATE.persist();
                } catch (_) {
                    /* ignore */
                }
                return {
                    ok: true,
                    gasFailed: gasNetworkFailed,
                    gasErrorMessage: gasErrorMessage,
                    drivePdfUrl: drivePdfUrl,
                    gasResponse: gasResponse
                };
            })()
                .catch(function (err) {
                    const msg = err && err.message ? String(err.message) : '네트워크 오류';
                    try {
                        console.error('[forest] submitForestGroupResult', err);
                    } catch (_) {
                        /* ignore */
                    }
                    return Promise.reject(new Error(msg));
                })
                .finally(function () {
                    MS._forestGasSubmitInFlight = false;
                });
        },

                        const btnM = document.getElementById('ms-modal-inst-toggle-all');
                        const clearM = document.getElementById('ms-modal-inst-clear');
                        /** 검사 설정 카드 안(대상 탭·유형 등) 클릭은 드롭다운을 닫지 않음 — 유아·유치부 클릭 시 목록 유지 */
                        const modalPrepCard = document.querySelector('#ms-modal-root > div.relative.w-full.max-w-md');
                        const el = t && t.nodeType === 1 ? t : t && t.parentElement;
                        if (modalPrepCard && el && modalPrepCard.contains(el)) {
                            return;
                        }
                        if (
                            panelModal.contains(t) ||
                            inpM === t ||
                            (inpM && inpM.contains(t)) ||
                            btnM === t ||
                            (btnM && btnM.contains(t)) ||
                            clearM === t ||
                            (clearM && clearM.contains(t))
                        ) {
                            return;
                        }
                        MS._modalInstDropdownAll = false;
                        panelModal.innerHTML = '';
                        panelModal.classList.add('hidden');
                        if (btnM) btnM.setAttribute('aria-expanded', 'false');
                        if (inpM) inpM.setAttribute('aria-expanded', 'false');
                    }
                },
                true
            );
        },

        setInstToggleAria(open) {
            const btn = document.getElementById('ms-inst-toggle-all');
            const inp = document.getElementById('inst-name');
            if (btn) btn.setAttribute('aria-expanded', open ? 'true' : 'false');
            if (inp) inp.setAttribute('aria-expanded', open ? 'true' : 'false');
        },

        sortInstitutionsKo(list) {
            return [...list].sort((a, b) => a.name.localeCompare(b.name, 'ko'));
        },

        /** onclick="..." 용: 작은따옴표 문자열 이스케이프 */
        escapeAttrJs(s) {
            return String(s || '')
                .replace(/\\/g, '\\\\')
                .replace(/'/g, "\\'")
                .replace(/\r|\n/g, ' ');
        },

        getPresetDaycareNamesForSetup() {
            return normalizePresetInstitutionNames(INSTITUTION_DATABASE);
        },

        /** 모달에서 세부 유형(어린이집·유치원·기타) 선택 시 자동완성에 같은 유형만 남길 때 사용 */
        matchesInstPrepKind(inst, want) {
            const t = String(inst.type || '').trim();
            const n = String(inst.name || '');
            if (want === '기타') return t === '기타';
            const g = STATE.guessType(n);
            if (want === '어린이집') {
                if (t === '어린이집') return true;
                if (t === '유치원') return false;
                return g === '어린이집';
            }
            if (want === '유치원') {
                if (t === '유치원') return true;
                if (t === '어린이집') return false;
                return g === '유치원';
            }
            return true;
        },
        matchesPresetPrepKind(name, want) {
            const n = String(name || '');
            const looksDaycare = n.includes('어린이집') && !n.includes('유치원');
            const looksKinder = n.includes('유치원');
            if (want === '기타') return !looksDaycare && !looksKinder;
            if (want === '어린이집') return looksDaycare;
            if (want === '유치원') return looksKinder;
            return true;
        },

        /**
         * 유아·유치부: PRESET_PRIORITY_INSTITUTIONS 만 즉시 필터(전국 DB 미스캔). 매칭 0건이면 direct 행.
         * 초등부: 저장 기관(STATE.institutions)만 검색.
         */
        buildInstitutionDropdownRows(q, allMode) {
            const tg = STATE.targetGroup === 'elementary' ? 'elementary' : 'preschool';
            const qt = q.trim();
            const ql = normalizeForInstSearchKey(qt);
            const choseongMode = isChoseongOnlyQueryStr(qt);
            const nameKey = (nm) => normalizeForInstSearchKey(nm);

            if (tg === 'preschool') {
                const nameMatchesPreset = (nm) => {
                    if (allMode && qt.length < 1) return true;
                    if (!allMode && qt.length < 1) return false;
                    if (qt.length === 1) return true;
                    if (choseongMode) {
                        const seq = extractChoseongSequenceFromName(nm);
                        const qNorm = normalizeChoseongQueryToCompatibilityJamo(qt);
                        return seq.includes(qNorm);
                    }
                    return nameKey(nm).includes(ql);
                };
                let allowedSet = new Set(PRESET_PRIORITY_INSTITUTIONS);
                const o = STATE.setupTypeOverride;
                const skipTypeNarrow = qt.length >= 1;
                if (!skipTypeNarrow && (o === '어린이집' || o === '유치원' || o === '기타')) {
                    allowedSet = new Set(
                        PRESET_PRIORITY_INSTITUTIONS.filter((n) => MS.matchesPresetPrepKind(n, o))
                    );
                }
                const out = [];
                for (const raw of PRESET_PRIORITY_INSTITUTIONS) {
                    if (!allowedSet.has(raw)) continue;
                    if (!nameMatchesPreset(raw)) continue;
                    out.push({ kind: 'preset', name: raw });
                }
                if (out.length === 0 && qt.length >= 1) {
                    out.push({ kind: 'direct', query: qt });
                }
                try {
                    console.log(
                        '[InstitutionSearch] preset-only; ' + out.length + ' options (q="' + qt + '")'
                    );
                } catch (_) {}
                return out;
            }

            let instList = STATE.institutions.filter((i) => SCHEMA.getTargetGroup(i) === 'elementary');
            const nameMatches = (nm) => {
                if (allMode) return true;
                if (qt.length < 1) return false;
                if (choseongMode) {
                    const seq = extractChoseongSequenceFromName(nm);
                    const qNorm = normalizeChoseongQueryToCompatibilityJamo(qt);
                    return seq.includes(qNorm);
                }
                return nameKey(nm).includes(ql);
            };
            instList = instList.filter((i) => nameMatches(i.name));
            const rows = [];
            instList.forEach((inst) => rows.push({ kind: 'inst', inst }));
            rows.sort((a, b) => {
                const na = a.inst.name;
                const nb = b.inst.name;
                return na.localeCompare(nb, 'ko');
            });
            try {
                console.log(
                    '[InstitutionSearch] elementary; ' + rows.length + ' options (q="' + qt + '")'
                );
            } catch (_) {}
            return rows;
        },

        /** 드롭다운 옵션 행 HTML (v15.0 스타일: 화이트·밤색·베이지 호버) */
        buildInstDropdownRowsHtml(rows, q, allMode) {
            const qt = String(q || '').trim();
            const choseongQ = isChoseongOnlyQueryStr(qt);
            const rowBtnClass =
                'ms-inst-dd-opt w-full text-left px-2 py-1 min-h-0 flex flex-row flex-nowrap items-center justify-between gap-x-2 border-b border-[rgba(93,64,55,0.08)] last:border-b-0 bg-white text-[#5D4037] leading-none hover:bg-[rgba(212,163,115,0.22)] active:bg-[rgba(212,163,115,0.3)] transition-colors';
            return rows
                .map((row) => {
                    if (row.kind === 'inst') {
                        const inst = row.inst;
                        const labelHtml = allMode
                            ? UI.esc(inst.name)
                            : choseongQ
                              ? UI.esc(inst.name)
                              : UI.highlightInstMatch(inst.name, q);
                        const safeId = String(inst.id).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
                        return `<button type="button" role="option"
                        class="${rowBtnClass}"
                        onmousedown="event.preventDefault()"
                        onclick="MS.pickInstitution('${safeId}')">
                        <span class="text-sm font-bold leading-tight truncate min-w-0 flex-1 text-left">${labelHtml}</span>
                        <span class="text-[12px] text-[#5D4037]/60 font-medium shrink-0">[${UI.esc(inst.type)}]</span>
                    </button>`;
                    }
                    if (row.kind === 'direct') {
                        const dq = String(row.query || '').trim();
                        const safeName = MS.escapeAttrJs(dq);
                        const labelHtml = allMode
                            ? UI.esc(dq)
                            : choseongQ
                              ? UI.esc(dq)
                              : UI.highlightInstMatch(dq, q);
                        return `<button type="button" role="option"
                        class="${rowBtnClass}"
                        onmousedown="event.preventDefault()"
                        onclick="MS.pickInstitutionByName('${safeName}')">
                        <span class="text-sm font-bold leading-tight truncate min-w-0 flex-1 text-left">직접 입력: &quot;${labelHtml}&quot; 사용하기</span>
                        <span class="text-[12px] text-[#5D4037]/60 font-medium shrink-0">[직접입력]</span>
                    </button>`;
                    }
                    const name = row.name;
                    const labelHtml = allMode
                        ? UI.esc(name)
                        : choseongQ
                          ? UI.esc(name)
                          : UI.highlightInstMatch(name, q);
                    const safeName = MS.escapeAttrJs(name);
                    return `<button type="button" role="option"
                        class="${rowBtnClass}"
                        onmousedown="event.preventDefault()"
                        onclick="MS.pickInstitutionByName('${safeName}')">
                        <span class="text-sm font-bold leading-tight truncate min-w-0 flex-1 text-left">${labelHtml}</span>
                        <span class="text-[12px] text-[#5D4037]/60 font-medium shrink-0">[사전명단]</span>
                    </button>`;
                })
                .join('');
        },

        updateInstDropdown() {
            const panel = document.getElementById('ms-inst-dropdown');
            const inp = document.getElementById('inst-name');
            if (!panel) return;
            if (MS._instDropdownSuppressNextRefresh) {
                MS._instDropdownSuppressNextRefresh = false;
                panel.innerHTML = '';
                panel.classList.add('hidden');
                MS.setInstToggleAria(false);
                return;
            }
            MS.bindInstSuggestCloseOutside();
            const raw = inp ? inp.value : STATE.searchTerm || '';
            const q = raw.trim();
            const allMode = MS._instDropdownAll;
            MS._instDropdownActiveIndex = -1;

            if (q.length < 1) {
                if (!MS._instDropdownAll) {
                    panel.innerHTML = '';
                    panel.classList.add('hidden');
                    MS.setInstToggleAria(false);
                    return;
                }
                const rowsAll = MS.buildInstitutionDropdownRows('', true);
                if (rowsAll.length === 0) {
                    panel.classList.remove('hidden');
                    panel.innerHTML =
                        '<div class="px-3 py-2 flex items-center text-sm leading-tight text-[#5D4037]/80 border-b border-[rgba(93,64,55,0.08)] bg-white">표시할 기관이 없어요.</div>';
                    MS.setInstToggleAria(true);
                    return;
                }
                panel.classList.remove('hidden');
                panel.innerHTML = MS.buildInstDropdownRowsHtml(rowsAll, '', true);
                MS.setInstToggleAria(true);
                return;
            }

            const rows = MS.buildInstitutionDropdownRows(q, allMode);

            if (rows.length === 0) {
                panel.classList.remove('hidden');
                panel.innerHTML =
                    '<div class="px-3 py-2 flex items-center text-sm leading-tight text-[#5D4037]/80 border-b border-[rgba(93,64,55,0.08)] bg-white">검색 결과가 없습니다.</div>';
                MS.setInstToggleAria(true);
                return;
            }

            panel.classList.remove('hidden');
            panel.innerHTML = MS.buildInstDropdownRowsHtml(rows, q, allMode);
            MS.setInstToggleAria(true);
        },

        updateModalInstDropdown() {
            const panel = document.getElementById('ms-modal-inst-dropdown');
            const inp = document.getElementById('ms-modal-inst-name');
            if (!panel || !inp) return;
            if (MS._modalInstDropdownSuppressNextRefresh) {
                MS._modalInstDropdownSuppressNextRefresh = false;
                panel.innerHTML = '';
                panel.classList.add('hidden');
                const btn0 = document.getElementById('ms-modal-inst-toggle-all');
                if (btn0) btn0.setAttribute('aria-expanded', 'false');
                inp.setAttribute('aria-expanded', 'false');
                return;
            }
            try {
                window.__MS_FOREST_INSTITUTIONS__ = STATE.institutions;
            } catch (_) {}
            MS.bindInstSuggestCloseOutside();
            const raw = inp.value;
            const q = raw.trim();
            const allMode = MS._modalInstDropdownAll;
            MS._instDropdownActiveIndex = -1;

            if (q.length < 1) {
                if (!MS._modalInstDropdownAll) {
                    panel.innerHTML = '';
                    panel.classList.add('hidden');
                    const btn0 = document.getElementById('ms-modal-inst-toggle-all');
                    if (btn0) btn0.setAttribute('aria-expanded', 'false');
                    if (inp) inp.setAttribute('aria-expanded', 'false');
                    return;
                }
                const rowsAll = MS.buildInstitutionDropdownRows('', true);
                if (rowsAll.length === 0) {
                    panel.classList.remove('hidden');
                    panel.innerHTML =
                        '<div class="px-3 py-2 flex items-center text-sm leading-tight text-[#5D4037]/80 border-b border-[rgba(93,64,55,0.08)] bg-white">표시할 기관이 없어요.</div>';
                    const btnE = document.getElementById('ms-modal-inst-toggle-all');
                    if (btnE) btnE.setAttribute('aria-expanded', 'true');
                    if (inp) inp.setAttribute('aria-expanded', 'true');
                    return;
                }
                panel.classList.remove('hidden');
                panel.innerHTML = MS.buildInstDropdownRowsHtml(rowsAll, '', true);
                const btnA = document.getElementById('ms-modal-inst-toggle-all');
                if (btnA) btnA.setAttribute('aria-expanded', 'true');
                if (inp) inp.setAttribute('aria-expanded', 'true');
                return;
            }

            const rows = MS.buildInstitutionDropdownRows(q, allMode);

            if (rows.length === 0) {
                panel.classList.remove('hidden');
                panel.innerHTML =
                    '<div class="px-3 py-2 flex items-center text-sm leading-tight text-[#5D4037]/80 border-b border-[rgba(93,64,55,0.08)] bg-white">검색 결과가 없습니다.</div>';
                const btn = document.getElementById('ms-modal-inst-toggle-all');
                if (btn) btn.setAttribute('aria-expanded', 'true');
                if (inp) inp.setAttribute('aria-expanded', 'true');
                return;
            }

            panel.classList.remove('hidden');
            panel.innerHTML = MS.buildInstDropdownRowsHtml(rows, q, allMode);
            const btn = document.getElementById('ms-modal-inst-toggle-all');
            if (btn) btn.setAttribute('aria-expanded', 'true');
            if (inp) inp.setAttribute('aria-expanded', 'true');
        },

        toggleInstListAll(ev) {
            if (ev) {
                ev.preventDefault();
                ev.stopPropagation();
            }
            MS._instDropdownSuppressNextRefresh = false;
            const inp = document.getElementById('inst-name');
            MS._instDropdownAll = !MS._instDropdownAll;
            if (!MS._instDropdownAll) {
                const panel = document.getElementById('ms-inst-dropdown');
                if (panel) {
                    panel.innerHTML = '';
                    panel.classList.add('hidden');
                }
                MS.setInstToggleAria(false);
                if (inp) inp.setAttribute('aria-expanded', 'false');
                MS.updateInstDropdown();
                return;
            }
            MS.updateInstDropdown();
        },

        clearSetupInstName(ev) {
            if (ev) {
                ev.preventDefault();
                ev.stopPropagation();
            }
            STATE.searchTerm = '';
            STATE.selectedId = null;
            STATE.setupTypeOverride = null;
            MS._instDropdownAll = false;
            try {
                STATE.persist();
            } catch (_) {
                /* ignore */
            }
            UI.render();
            requestAnimationFrame(() => {
                const n = document.getElementById('inst-name');
                if (n) {
                    n.value = '';
                    n.focus();
                }
                if (typeof MS !== 'undefined' && MS.updateInstDropdown) MS.updateInstDropdown();
            });
        },

        isExamPrepModalOpen() {
            return !!document.getElementById('ms-modal-inst-name');
        },

        isInstitutionDatabaseName(raw) {
            const nk = String(raw || '').trim().toLocaleLowerCase('ko-KR');
            return normalizePresetInstitutionNames(INSTITUTION_DATABASE).some(
                (n) => String(n).trim().toLocaleLowerCase('ko-KR') === nk
            );
        },

        pickInstitution(id) {
            const inst = STATE.institutions.find((i) => i.id === id);
            if (!inst) return;
            STATE.selectedId = inst.id;
            STATE.searchTerm = inst.name;
            STATE.targetGroup = SCHEMA.getTargetGroup(inst);
            if (inst.obsLocation) {
                STATE.obsLocation = inst.obsLocation === 'indoor' ? 'indoor' : 'forest';
            }
            STATE.setupObsPhase = STATE.observationStage;
            MS._instDropdownAll = false;
            MS._modalInstDropdownAll = false;
            /** 선택 직후 focus/rAF에서 자동완성이 다시 열리지 않게 (한 번만 억제) */
            MS._instDropdownSuppressNextRefresh = true;
            MS._modalInstDropdownSuppressNextRefresh = true;
            STATE.setupTypeOverride = null;
            STATE.persist();
            const panel = document.getElementById('ms-inst-dropdown');
            if (panel) {
                panel.innerHTML = '';
                panel.classList.add('hidden');
            }
            const panelM = document.getElementById('ms-modal-inst-dropdown');
            if (panelM) {
                panelM.innerHTML = '';
                panelM.classList.add('hidden');
            }
            MS.setInstToggleAria(false);
            const btnM = document.getElementById('ms-modal-inst-toggle-all');
            if (btnM) btnM.setAttribute('aria-expanded', 'false');
            if (MS.isExamPrepModalOpen()) {
                MS.openNewExamPrepModal({ skipModalInstDropdown: true });
            } else {
                UI.render();
            }
        },

        /** 사전 명단만 있고 아직 금고에 없을 때: 동일 이름 기관을 만들고 선택 */
        pickInstitutionByName(rawName) {
            const name = String(rawName || '').trim();
            if (!name) return;
            const inDb = MS.isInstitutionDatabaseName(name);
            let tg = STATE.targetGroup === 'elementary' ? 'elementary' : 'preschool';
            if (inDb) tg = 'preschool';
            const pool = STATE.institutions.filter((i) => String(i.name).trim() === name);
            let inst =
                pool.find((i) => SCHEMA.getTargetGroup(i) === tg) ||
                pool[0] ||
                null;
            if (!inst) {
                inst = STATE.addInstitution(name);
                inst.targetGroup = tg;
                inst.type = STATE.guessType(name);
            } else {
                STATE.selectedId = inst.id;
                STATE.ensureCounts(inst);
                if (inDb) {
                    inst.targetGroup = 'preschool';
                    inst.type = STATE.guessType(name);
                }
            }
            STATE.searchTerm = inst.name;
            STATE.targetGroup = SCHEMA.getTargetGroup(inst);
            STATE.setupObsPhase = STATE.observationStage;
            MS._instDropdownAll = false;
            MS._modalInstDropdownAll = false;
            /** 선택 직후 focus/rAF에서 자동완성이 다시 열리지 않게 (한 번만 억제) */
            MS._instDropdownSuppressNextRefresh = true;
            MS._modalInstDropdownSuppressNextRefresh = true;
            STATE.setupTypeOverride = null;
            STATE.persist();
            const panel = document.getElementById('ms-inst-dropdown');
            if (panel) {
                panel.innerHTML = '';
                panel.classList.add('hidden');
            }
            const panelM = document.getElementById('ms-modal-inst-dropdown');
            if (panelM) {
                panelM.innerHTML = '';
                panelM.classList.add('hidden');
            }
            MS.setInstToggleAria(false);
            const btnM = document.getElementById('ms-modal-inst-toggle-all');
            if (btnM) btnM.setAttribute('aria-expanded', 'false');
            if (MS.isExamPrepModalOpen()) {
                MS.openNewExamPrepModal({ skipModalInstDropdown: true });
            } else {
                UI.render();
            }
        },

        onInstNameFocus() {
            const inp = document.getElementById('inst-name');
            const q = (inp && inp.value.trim()) || '';
            if (q.length >= 1 || MS._instDropdownAll) MS.updateInstDropdown();
        },

        /** 초등부: 기관명 입력 후 포커스가 나가면 '지역아동센터' 접미어 자동 완성 (드롭다운 클릭 시 blur 무시) */
        onInstNameBlur(el) {
            setTimeout(() => {
                if (MS._setupInstImeComposing) return;
                if (STATE.targetGroup !== 'elementary') return;
                if (STATE.step !== 'setup') return;
                const instEl = document.getElementById('inst-name');
                if (!instEl || instEl !== el) return;
                const ae = document.activeElement;
                const dd = document.getElementById('ms-inst-dropdown');
                if (dd && ae && dd.contains(ae)) return;
                if (ae && ae.id === 'ms-inst-toggle-all') return;
                if (ae && ae.id === 'ms-inst-clear') return;
                const v = String(el.value || '').trim();
                if (!v) return;
                if (v.includes('지역아동') || v.includes('아동센터')) return;
                const next = v + '지역아동센터';
                el.value = next;
                MS.applySetupInstNameFromInput(next);
            }, 0);
        },

        highlightInstDropdownOption(panelId, idx) {
            const panel = document.getElementById(panelId);
            if (!panel) return;
            const opts = panel.querySelectorAll('button.ms-inst-dd-opt');
            opts.forEach((btn, i) => {
                if (i === idx) {
                    btn.classList.add('ring-2', 'ring-[#5D4037]/35', 'ring-inset');
                    try {
                        btn.scrollIntoView({ block: 'nearest' });
                    } catch (_) {
                        /* ignore */
                    }
                } else {
                    btn.classList.remove('ring-2', 'ring-[#5D4037]/35', 'ring-inset');
                }
            });
        },

        onInstNameKeydown(ev) {
            const panel = document.getElementById('ms-inst-dropdown');
            const inp = document.getElementById('inst-name');
            const open = panel && !panel.classList.contains('hidden');
            const opts = panel ? panel.querySelectorAll('button.ms-inst-dd-opt') : [];

            if (ev.key === 'Escape') {
                MS._instDropdownAll = false;
                MS._instDropdownActiveIndex = -1;
                if (panel) {
                    panel.innerHTML = '';
                    panel.classList.add('hidden');
                }
                MS.setInstToggleAria(false);
                return;
            }

            if (!open || !opts.length) return;

            if (ev.key === 'ArrowDown') {
                ev.preventDefault();
                MS._instDropdownActiveIndex = Math.min(
                    opts.length - 1,
                    (MS._instDropdownActiveIndex < 0 ? -1 : MS._instDropdownActiveIndex) + 1
                );
                MS.highlightInstDropdownOption('ms-inst-dropdown', MS._instDropdownActiveIndex);
                return;
            }
            if (ev.key === 'ArrowUp') {
                ev.preventDefault();
                MS._instDropdownActiveIndex = Math.max(
                    0,
                    (MS._instDropdownActiveIndex < 0 ? 0 : MS._instDropdownActiveIndex) - 1
                );
                MS.highlightInstDropdownOption('ms-inst-dropdown', MS._instDropdownActiveIndex);
                return;
            }
            if (ev.key === 'Enter') {
                if (MS._instDropdownActiveIndex >= 0 && opts[MS._instDropdownActiveIndex]) {
                    ev.preventDefault();
                    opts[MS._instDropdownActiveIndex].click();
                }
            }
        },

        toggleModalInstListAll(ev) {
            if (ev) {
                ev.preventDefault();
                ev.stopPropagation();
            }
            MS._modalInstDropdownSuppressNextRefresh = false;
            const inp = document.getElementById('ms-modal-inst-name');
            MS._modalInstDropdownAll = !MS._modalInstDropdownAll;
            if (!MS._modalInstDropdownAll) {
                const panel = document.getElementById('ms-modal-inst-dropdown');
                if (panel) {
                    panel.innerHTML = '';
                    panel.classList.add('hidden');
                }
                if (inp) inp.setAttribute('aria-expanded', 'false');
                const btn = document.getElementById('ms-modal-inst-toggle-all');
                if (btn) btn.setAttribute('aria-expanded', 'false');
                MS.updateModalInstDropdown();
                return;
            }
            MS.updateModalInstDropdown();
        },

        onModalInstNameFocus() {
            const inp = document.getElementById('ms-modal-inst-name');
            const q = (inp && inp.value.trim()) || '';
            if (q.length >= 1 || MS._modalInstDropdownAll) MS.updateModalInstDropdown();
        },

        onModalInstNameBlur(el) {
            setTimeout(() => {
                if (MS._modalInstImeComposing) return;
                if (!document.getElementById('ms-modal-inst-name')) return;
                if (STATE.targetGroup !== 'elementary') return;
                const modalInp = document.getElementById('ms-modal-inst-name');
                if (!modalInp || modalInp !== el) return;
                const ae = document.activeElement;
                if (!ae || ae === document.body || ae === document.documentElement) return;
                const modalPrepCard = document.querySelector('#ms-modal-root > div.relative.w-full.max-w-md');
                if (modalPrepCard && ae && modalPrepCard.contains(ae)) return;
                const dd = document.getElementById('ms-modal-inst-dropdown');
                if (dd && ae && dd.contains(ae)) return;
                if (ae && ae.id === 'ms-modal-inst-toggle-all') return;
                if (ae && ae.id === 'ms-modal-inst-clear') return;
                const v = String(el.value || '').trim();
                if (!v) return;
                if (v.includes('지역아동') || v.includes('아동센터')) return;
                const next = v + '지역아동센터';
                STATE.searchTerm = next;
                MS.applySmartKeywordFromInstName(next);
                try {
                    STATE.persist();
                } catch (_) {
                    /* ignore */
                }
                MS.openNewExamPrepModal();
            }, 0);
        },

        onModalInstNameKeydown(ev) {
            const panel = document.getElementById('ms-modal-inst-dropdown');
            const open = panel && !panel.classList.contains('hidden');
            const opts = panel ? panel.querySelectorAll('button.ms-inst-dd-opt') : [];

            if (ev.key === 'Escape') {
                MS._modalInstDropdownAll = false;
                MS._instDropdownActiveIndex = -1;
                if (panel) {
                    panel.innerHTML = '';
                    panel.classList.add('hidden');
                }
                const btn = document.getElementById('ms-modal-inst-toggle-all');
                const inp = document.getElementById('ms-modal-inst-name');
                if (btn) btn.setAttribute('aria-expanded', 'false');
                if (inp) inp.setAttribute('aria-expanded', 'false');
                return;
            }

            if (!open || !opts.length) return;

            if (ev.key === 'ArrowDown') {
                ev.preventDefault();
                MS._instDropdownActiveIndex = Math.min(
                    opts.length - 1,
                    (MS._instDropdownActiveIndex < 0 ? -1 : MS._instDropdownActiveIndex) + 1
                );
                MS.highlightInstDropdownOption('ms-modal-inst-dropdown', MS._instDropdownActiveIndex);
                return;
            }
            if (ev.key === 'ArrowUp') {
                ev.preventDefault();
                MS._instDropdownActiveIndex = Math.max(
                    0,
                    (MS._instDropdownActiveIndex < 0 ? 0 : MS._instDropdownActiveIndex) - 1
                );
                MS.highlightInstDropdownOption('ms-modal-inst-dropdown', MS._instDropdownActiveIndex);
                return;
            }
            if (ev.key === 'Enter') {
                if (MS._instDropdownActiveIndex >= 0 && opts[MS._instDropdownActiveIndex]) {
                    ev.preventDefault();
                    opts[MS._instDropdownActiveIndex].click();
                }
            }
        },

        clearAdvanceTimers() {
            Object.keys(this._advT).forEach((k) => clearTimeout(this._advT[k]));
            this._advT = {};
        },
        /** △ 자동 채움 후 2초 뒤 다음 칸으로 이동하는 예약만 취소 (다른 칸 입력 시) */
        clearYaf2AdvanceTimers() {
            if (!this._advT) return;
            Object.keys(this._advT).forEach((k) => {
                if (k.startsWith('yaf2')) {
                    clearTimeout(this._advT[k]);
                    delete this._advT[k];
                }
            });
        },

        /** Q1 행에 △·□가 모두 채워졌는지 (자동 기준용) */
        q1RowComplete(inst, tg) {
            if (!inst) return false;
            try {
                STATE.ensureCounts(inst);
            } catch (_) {
                return false;
            }
            const qs = SCHEMA.questionsForGroup(tg === 'elementary' ? 'elementary' : 'preschool');
            if (!qs.length) return false;
            const row = inst.counts[qs[0].id] || { yes: '', no: '' };
            return String(row.yes || '').trim() !== '' && String(row.no || '').trim() !== '';
        },

        /**
         * △ 입력 시 □ 자동(합계−△)에 쓰는 기준 인원.
         * - 참여 아동 수를 설정에 넣었으면 그 값
         * - 없으면 Q1의 △+□가 모두 채워진 뒤에만 Q1 합계를 사용 (Q1 자체는 자동 안 함)
         */
        getAutofillBaseline(inst, tg, qid) {
            if (!inst) return null;
            const g = tg === 'elementary' ? 'elementary' : 'preschool';
            const t = parseInt(inst.participantTargetCount, 10);
            if (Number.isFinite(t) && t > 0) return t;
            const qs = SCHEMA.questionsForGroup(g);
            if (!qs.length || !qid) return null;
            if (qid === qs[0].id) return null;
            if (!MS.q1RowComplete(inst, g)) return null;
            const sum = SCHEMA.participantCountFromQ1(inst.counts, g);
            return sum > 0 ? sum : null;
        },

        onYesInput(qid, el) {
            clearTimeout(MS._advT['y' + qid]);
            MS.clearYaf2AdvanceTimers();
            MS.setCount(qid, 'yes', el.value);
            let didTriangleSquareAutofill = false;
            const inst = STATE.selected();
            if (inst && STATE.step === 'input') {
                try {
                    STATE.ensureCounts(inst);
                } catch (_) {
                    /* ignore */
                }
                const tg = MS.resolveForestTargetGroup(inst);
                if (tg === 'preschool' || tg === 'elementary') {
                    const baseline = MS.getAutofillBaseline(inst, tg, qid);
                    if (baseline != null) {
                        const yesStr = String(el.value || '').trim();
                        if (yesStr === '') {
                            MS.setCount(qid, 'no', '');
                            const nEl = document.getElementById('ms-no-' + qid);
                            if (nEl) nEl.value = '';
                        } else {
                            const yes = Math.max(0, parseInt(yesStr, 10) || 0);
                            const no = Math.max(0, baseline - yes);
                            MS.setCount(qid, 'no', String(no));
                            const nEl = document.getElementById('ms-no-' + qid);
                            if (nEl) nEl.value = String(no);
                            didTriangleSquareAutofill = true;
                        }
                        MS.refreshInputSubmitButton();
                        MS.refreshParticipantInputWarnings();
                    }
                }
            }
            if (didTriangleSquareAutofill) {
                MS._advT['yaf2' + qid] = setTimeout(() => {
                    const ids = MS.activeQuestionIds();
                    const ix = ids.indexOf(qid);
                    if (ix < 0) return;
                    if (ix < ids.length - 1) {
                        document.getElementById('ms-yes-' + ids[ix + 1])?.focus();
                    } else {
                        const wrap = document.getElementById('ms-input-submit-wrap');
                        const btn = document.getElementById('ms-input-submit-btn');
                        wrap?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                        if (btn && !btn.disabled) {
                            btn.focus();
                        } else if (wrap && !wrap.classList.contains('hidden')) {
                            wrap.focus();
                        }
                    }
                }, 2000);
            } else {
                MS._advT['y' + qid] = setTimeout(() => {
                    const y = document.getElementById('ms-yes-' + qid);
                    const n = document.getElementById('ms-no-' + qid);
                    if (n && y && document.activeElement === y && String(el.value).trim() !== '') {
                        n.focus();
                    }
                }, 650);
            }
        },

        onNoInput(qid, el) {
            MS.clearYaf2AdvanceTimers();
            MS.setCount(qid, 'no', el.value);
            clearTimeout(MS._advT['n' + qid]);
            MS._advT['n' + qid] = setTimeout(() => {
                const n = document.getElementById('ms-no-' + qid);
                const ids = MS.activeQuestionIds();
                const ix = ids.indexOf(qid);
                if (ix < 0 || ix >= ids.length - 1) return;
                const nextY = document.getElementById('ms-yes-' + ids[ix + 1]);
                if (nextY && n && document.activeElement === n && String(el.value).trim() !== '') {
                    nextY.focus();
                }
            }, 650);
        },

        onCountKeydown(e, qid, role) {
            if (e.key !== 'Enter') return;
            e.preventDefault();
            if (role === 'yes') {
                document.getElementById('ms-no-' + qid)?.focus();
                return;
            }
            const ids = MS.activeQuestionIds();
            const ix = ids.indexOf(qid);
            if (ix >= 0 && ix < ids.length - 1) {
                document.getElementById('ms-yes-' + ids[ix + 1])?.focus();
            }
        },
