        sortInstitutionsKo(list) {
            return [...list].sort((a, b) => a.name.localeCompare(b.name, 'ko'));
        },

        /** onclick="..." 용: 작은따옴표 문자열 이스케이프 */
        escapeAttrJs(s) {
            return String(s || '')
                .replace(/\\/g, '\\\\')
                .replace(/'/g, "\\'")
                .replace(/\r|\n/g, ' ');
        },

        getPresetDaycareNamesForSetup() {
            return normalizePresetInstitutionNames(INSTITUTION_DATABASE);
        },

        /** 모달에서 세부 유형(어린이집·유치원·기타) 선택 시 자동완성에 같은 유형만 남길 때 사용 */
        matchesInstPrepKind(inst, want) {
            const t = String(inst.type || '').trim();
            const n = String(inst.name || '');
            if (want === '기타') return t === '기타';
            const g = STATE.guessType(n);
            if (want === '어린이집') {
                if (t === '어린이집') return true;
                if (t === '유치원') return false;
                return g === '어린이집';
            }
            if (want === '유치원') {
                if (t === '유치원') return true;
                if (t === '어린이집') return false;
                return g === '유치원';
            }
            return true;
        },
        matchesPresetPrepKind(name, want) {
            const n = String(name || '');
            if (want === '기타') return false;
            if (want === '어린이집') return n.includes('어린이집') && !n.includes('유치원');
            if (want === '유치원') return n.includes('유치원');
            return true;
        },

        /**
         * 유아·유치부: PRESET_PRIORITY_INSTITUTIONS 만 즉시 필터(전국 DB 미스캔). 매칭 0건이면 direct 행.
         * 초등부: 저장 기관(STATE.institutions)만 검색.
         */
        buildInstitutionDropdownRows(q, allMode) {
            const tg = STATE.targetGroup === 'elementary' ? 'elementary' : 'preschool';
            const qt = q.trim();
            const ql = normalizeForInstSearchKey(qt);
            const choseongMode = isChoseongOnlyQueryStr(qt);
            const nameKey = (nm) => normalizeForInstSearchKey(nm);

            if (tg === 'preschool') {
                const nameMatchesPreset = (nm) => {
                    if (allMode && qt.length < 1) return true;
                    if (!allMode && qt.length < 1) return false;
                    if (qt.length === 1) return true;
                    if (choseongMode) {
                        const seq = extractChoseongSequenceFromName(nm);
                        const qNorm = normalizeChoseongQueryToCompatibilityJamo(qt);
                        return seq.includes(qNorm);
                    }
                    return nameKey(nm).includes(ql);
                };
                let allowedSet = new Set(PRESET_PRIORITY_INSTITUTIONS);
                const o = STATE.setupTypeOverride;
                const skipTypeNarrow = qt.length >= 1;
                if (!skipTypeNarrow && (o === '어린이집' || o === '유치원' || o === '기타')) {
                    allowedSet = new Set(
                        PRESET_PRIORITY_INSTITUTIONS.filter((n) => MS.matchesPresetPrepKind(n, o))
                    );
                }
                const out = [];
                for (const raw of PRESET_PRIORITY_INSTITUTIONS) {
                    if (!allowedSet.has(raw)) continue;
                    if (!nameMatchesPreset(raw)) continue;
                    out.push({ kind: 'preset', name: raw });
                }
                if (out.length === 0 && qt.length >= 1) {
                    out.push({ kind: 'direct', query: qt });
                }
                try {
                    console.log(
                        '[InstitutionSearch] preset-only; ' + out.length + ' options (q="' + qt + '")'
                    );
                } catch (_) {}
                return out;
            }

            let instList = STATE.institutions.filter((i) => SCHEMA.getTargetGroup(i) === 'elementary');
            const nameMatches = (nm) => {
                if (allMode) return true;
                if (qt.length < 1) return false;
                if (choseongMode) {
                    const seq = extractChoseongSequenceFromName(nm);
                    const qNorm = normalizeChoseongQueryToCompatibilityJamo(qt);
                    return seq.includes(qNorm);
                }
                return nameKey(nm).includes(ql);
            };
            instList = instList.filter((i) => nameMatches(i.name));
            const rows = [];
            instList.forEach((inst) => rows.push({ kind: 'inst', inst }));
            rows.sort((a, b) => {
                const na = a.inst.name;
                const nb = b.inst.name;
                return na.localeCompare(nb, 'ko');
            });
            try {
                console.log(
                    '[InstitutionSearch] elementary; ' + rows.length + ' options (q="' + qt + '")'
                );
            } catch (_) {}
            return rows;
        },

        /** 드롭다운 옵션 행 HTML (v15.0 스타일: 화이트·밤색·베이지 호버) */
        buildInstDropdownRowsHtml(rows, q, allMode) {
            const qt = String(q || '').trim();
            const choseongQ = isChoseongOnlyQueryStr(qt);
            const rowBtnClass =
                'ms-inst-dd-opt w-full text-left px-3 py-1.5 min-h-0 flex flex-row flex-wrap items-center gap-x-1 gap-y-0 border-b border-[rgba(93,64,55,0.1)] last:border-b-0 bg-white text-[#5D4037] leading-tight hover:bg-[rgba(212,163,115,0.22)] active:bg-[rgba(212,163,115,0.3)] transition-colors';
            return rows
                .map((row) => {
                    if (row.kind === 'inst') {
                        const inst = row.inst;
                        const labelHtml = allMode
                            ? UI.esc(inst.name)
                            : choseongQ
                              ? UI.esc(inst.name)
                              : UI.highlightInstMatch(inst.name, q);
                        const safeId = String(inst.id).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
                        return `<button type="button" role="option"
                        class="${rowBtnClass}"
                        onmousedown="event.preventDefault()"
                        onclick="MS.pickInstitution('${safeId}')">
                        <span class="text-sm font-bold leading-tight">${labelHtml}</span>
                        <span class="text-[10px] text-[#5D4037]/60 font-medium ml-1 shrink-0">[${UI.esc(inst.type)}]</span>
                    </button>`;
                    }
                    if (row.kind === 'direct') {
                        const dq = String(row.query || '').trim();
                        const safeName = MS.escapeAttrJs(dq);
                        const labelHtml = allMode
                            ? UI.esc(dq)
                            : choseongQ
                              ? UI.esc(dq)
                              : UI.highlightInstMatch(dq, q);
                        return `<button type="button" role="option"
                        class="${rowBtnClass}"
                        onmousedown="event.preventDefault()"
                        onclick="MS.pickInstitutionByName('${safeName}')">
                        <span class="text-sm font-bold leading-tight">직접 입력: &quot;${labelHtml}&quot; 사용하기</span>
                        <span class="text-[10px] text-[#5D4037]/60 font-medium ml-1 shrink-0">[직접입력]</span>
                    </button>`;
                    }
                    const name = row.name;
                    const labelHtml = allMode
                        ? UI.esc(name)
                        : choseongQ
                          ? UI.esc(name)
                          : UI.highlightInstMatch(name, q);
                    const safeName = MS.escapeAttrJs(name);
                    return `<button type="button" role="option"
                        class="${rowBtnClass}"
                        onmousedown="event.preventDefault()"
                        onclick="MS.pickInstitutionByName('${safeName}')">
                        <span class="text-sm font-bold leading-tight">${labelHtml}</span>
                        <span class="text-[10px] text-[#5D4037]/60 font-medium ml-1 shrink-0">[사전명단]</span>
                    </button>`;
                })
                .join('');
        },

        updateInstDropdown() {
            const panel = document.getElementById('ms-inst-dropdown');
            const inp = document.getElementById('inst-name');
            if (!panel) return;
            MS.bindInstSuggestCloseOutside();
            const raw = inp ? inp.value : STATE.searchTerm || '';
            const q = raw.trim();
            const allMode = MS._instDropdownAll;
            MS._instDropdownActiveIndex = -1;

            if (q.length < 1) {
                if (!MS._instDropdownAll) {
                    panel.innerHTML = '';
                    panel.classList.add('hidden');
                    MS.setInstToggleAria(false);
                    return;
                }
                const rowsAll = MS.buildInstitutionDropdownRows('', true);
                if (rowsAll.length === 0) {
                    panel.classList.remove('hidden');
                    panel.innerHTML =
                        '<div class="px-3 py-2 flex items-center text-sm leading-tight text-[#5D4037]/80 border-b border-[rgba(93,64,55,0.08)] bg-white">표시할 기관이 없어요.</div>';
                    MS.setInstToggleAria(true);
                    return;
                }
                panel.classList.remove('hidden');
                panel.innerHTML = MS.buildInstDropdownRowsHtml(rowsAll, '', true);
                MS.setInstToggleAria(true);
                return;
            }

            const rows = MS.buildInstitutionDropdownRows(q, allMode);

            if (rows.length === 0) {
                panel.classList.remove('hidden');
                panel.innerHTML =
                    '<div class="px-3 py-2 flex items-center text-sm leading-tight text-[#5D4037]/80 border-b border-[rgba(93,64,55,0.08)] bg-white">검색 결과가 없습니다.</div>';
                MS.setInstToggleAria(true);
                return;
            }

            panel.classList.remove('hidden');
            panel.innerHTML = MS.buildInstDropdownRowsHtml(rows, q, allMode);
            MS.setInstToggleAria(true);
        },

                ev.preventDefault();
                ev.stopPropagation();

            STATE.searchTerm = '';
            STATE.selectedId = null;
            STATE.setupTypeOverride = null;
            MS._instDropdownAll = false;

                STATE.persist();

                /* ignore */
            }
            UI.render();

                    n.value = '';
                    n.focus();

        isExamPrepModalOpen() {

        isInstitutionDatabaseName(raw) {
            const nk = String(raw || '').trim().toLocaleLowerCase('ko-KR');
            return normalizePresetInstitutionNames(INSTITUTION_DATABASE).some(
                (n) => String(n).trim().toLocaleLowerCase('ko-KR') === nk
            );
        },

        pickInstitution(id) {
            const inst = STATE.institutions.find((i) => i.id === id);
            if (!inst) return;
            STATE.selectedId = inst.id;
            STATE.searchTerm = inst.name;
            STATE.targetGroup = SCHEMA.getTargetGroup(inst);
            if (inst.obsLocation) {
                STATE.obsLocation = inst.obsLocation === 'indoor' ? 'indoor' : 'forest';
            }
            STATE.setupObsPhase = STATE.observationStage;
            MS._instDropdownAll = false;
            MS._modalInstDropdownAll = false;
            STATE.setupTypeOverride = null;
            STATE.persist();
            const panel = document.getElementById('ms-inst-dropdown');
            if (panel) {
                panel.innerHTML = '';
                panel.classList.add('hidden');
            }
            const panelM = document.getElementById('ms-modal-inst-dropdown');
            if (panelM) {
                panelM.innerHTML = '';
                panelM.classList.add('hidden');
            }
            MS.setInstToggleAria(false);
            const btnM = document.getElementById('ms-modal-inst-toggle-all');
            if (btnM) btnM.setAttribute('aria-expanded', 'false');
            if (MS.isExamPrepModalOpen()) {
                MS.openNewExamPrepModal();
            } else {
                UI.render();
            }
        },

        /** 사전 명단만 있고 아직 금고에 없을 때: 동일 이름 기관을 만들고 선택 */
        pickInstitutionByName(rawName) {
            const name = String(rawName || '').trim();
            if (!name) return;
            const inDb = MS.isInstitutionDatabaseName(name);
            let tg = STATE.targetGroup === 'elementary' ? 'elementary' : 'preschool';
            if (inDb) tg = 'preschool';
            const pool = STATE.institutions.filter((i) => String(i.name).trim() === name);
            let inst =

        onInstNameKeydown(ev) {

            if (ev.key === 'Escape') {
                MS._instDropdownAll = false;

                if (panel) {
                    panel.innerHTML = '';
                    panel.classList.add('hidden');

                MS.setInstToggleAria(false);
                return;

            if (!open || !opts.length) return;

            if (ev.key === 'ArrowDown') {
                ev.preventDefault();
                MS._instDropdownActiveIndex = Math.min(
                    opts.length - 1,
                    (MS._instDropdownActiveIndex < 0 ? -1 : MS._instDropdownActiveIndex) + 1
                );
                MS.highlightInstDropdownOption('ms-inst-dropdown', MS._instDropdownActiveIndex);
                return;
            }
            if (ev.key === 'ArrowUp') {
                ev.preventDefault();

                    0,

        setDashboardBuilderInstFromSelect(sel) {
            try {
                STATE.dashboardBuilderInst = sel.value ? decodeURIComponent(sel.value) : '';
            } catch (_) {
                STATE.dashboardBuilderInst = sel.value || '';
            }
            STATE.persist();
        },
        setDashboardBuilderType(v) {
            STATE.dashboardBuilderTypeFilter = v;
            STATE.persist();
        },
        setDashboardBuilderMode(v) {
            STATE.dashboardBuilderMode = v === 'prepost' || v === 'group' ? v : 'single';
            if (STATE.dashboardBuilderMode === 'group') {
                if (STATE.dashboardBuilderTypeFilter !== 'cmp_pe' && STATE.dashboardBuilderTypeFilter !== 'cmp_dk') {
                    STATE.dashboardBuilderTypeFilter = 'cmp_dk';
                }
            } else if (STATE.dashboardBuilderTypeFilter === 'cmp_pe' || STATE.dashboardBuilderTypeFilter === 'cmp_dk') {
                STATE.dashboardBuilderTypeFilter = 'all';
            }
            STATE.persist();
            UI.render();
        },
        matchesBuilderKind(inst, tf) {
            if (tf === 'all') return true;
            const tg = SCHEMA.getTargetGroup(inst);
            if (tf === 'preschool_daycare') return tg === 'preschool' && SCHEMA.preschoolKindNorm(inst) === '어린이집';
            if (tf === 'preschool_kg') return tg === 'preschool' && SCHEMA.preschoolKindNorm(inst) === '유치원';
            if (tf === 'preschool_other') return tg === 'preschool' && SCHEMA.preschoolKindNorm(inst) === '기타';
            if (tf === 'elem_community') return tg === 'elementary' && SCHEMA.elementaryTypeNorm(inst) === '지역아동센터';
            if (tf === 'elem_afterschool') return tg === 'elementary' && SCHEMA.elementaryTypeNorm(inst) === '방과후교실';
            if (tf === 'elem_school') return tg === 'elementary' && SCHEMA.elementaryTypeNorm(inst) === '초등학교';
            return true;
        },
        filterMembersByKindFilter(members, tf) {
            if (tf === 'all') return members;
            return members.filter((m) => MS.matchesBuilderKind(m, tf));
        },
        _builderKindLabel(tf) {
            const map = {
                all: '전체',
                preschool_daycare: '어린이집',
                preschool_kg: '유치원',
                preschool_other: '기타',
                elem_community: '지역아동센터',
                elem_afterschool: '방과후교실',
                elem_school: '초등학교',
                cmp_dk: '어린이집↔유치원',
                cmp_pe: '유아부↔초등부'
            };
            return map[tf] || tf;
        },
        _builderAggregateTitle(tf) {
            return MS._builderKindLabel(tf) + ' · 전체 집계';
        },
        _builderReportTitle(instKey, tf, kind) {
            const kl = MS._builderKindLabel(tf);
            if (kind === 'prepost') return instKey + (tf === 'all' ? '' : ' · ' + kl) + ' · 사전·사후';
            return instKey + (tf === 'all' ? '' : ' · ' + kl);
        },
        runCustomReportBuilder() {
            const instKey = String(STATE.dashboardBuilderInst || '').trim();
            const mode = STATE.dashboardBuilderMode;
            const tf = STATE.dashboardBuilderTypeFilter;

            if (mode === 'group') {
                if (instKey) {
                    alert('집단 간 비교는 기관을「전체」로 두어 주세요.');
                    return;
                }
                if (tf === 'cmp_pe') {
                    const macro = SCHEMA.aggregatePreschoolVsElementary(STATE.institutions, (c) => UI.hasAnyCount(c));
                    if (!macro) {
                        alert('유아부와 초등부 각각에서 숫자가 입력된 관찰이 한 건 이상씩 있어야 비교합니다.');
                        return;
                    }
                    STATE.macroVariant = 'pe';
                    STATE.step = 'institution-type-macro-report';
                    STATE.persist();
                    UI.render();
                    return;
                }
                STATE.macroVariant = 'dk';
                MS.openInstitutionTypeMacroReport();
                return;
            }

            if (mode === 'prepost') {
                if (!instKey) {
                    alert('사전·사후 비교는 기관명을 선택해 주세요.');
                    return;
                }
                let members = SCHEMA.membersByInstitutionName(STATE.institutions, instKey);
                members = MS.filterMembersByKindFilter(members, tf);
                const cmp = SCHEMA.aggregatePrePostComparison(members, (c) => UI.hasAnyCount(c));
                if (!cmp) {
                    alert(
                        '필터 조건에 맞는 사전·사후 관찰이 각각 한 건 이상, 그리고 숫자 입력이 완료되어야 합니다.'
                    );
                    return;
                }
                STATE.selectedGroupName = instKey;
                STATE.reportAggregateMembers = members;
                STATE.reportAggregateTitle = MS._builderReportTitle(instKey, tf, 'prepost');
                STATE.reportFromDashboard = true;
                STATE.step = 'institution-prepost-report';
                STATE.persist();
                UI.render();
                return;
            }

            if (instKey && tf === 'all') {
                const members = SCHEMA.membersByInstitutionName(STATE.institutions, instKey);
                const agg = SCHEMA.aggregateMeanScores(members, (c) => UI.hasAnyCount(c));
                if (!agg) {
                    alert('관찰 숫자가 입력된 기록이 없어요.');
                    return;
                }
                STATE.selectedGroupName = instKey;
                STATE.reportAggregateMembers = null;
                STATE.reportAggregateTitle = '';
                STATE.reportFromDashboard = true;
                STATE.step = 'institution-report';
                STATE.persist();
                UI.render();
                return;
            }
            if (instKey && tf !== 'all') {
                let members = SCHEMA.membersByInstitutionName(STATE.institutions, instKey);
                members = MS.filterMembersByKindFilter(members, tf);
                const agg = SCHEMA.aggregateMeanScores(members, (c) => UI.hasAnyCount(c));
                if (!agg) {
                    alert('선택한 유형에 해당하는 기록이 없거나 숫자 입력이 없어요.');
                    return;
                }
                STATE.selectedGroupName = instKey;
                STATE.reportAggregateMembers = members;
                STATE.reportAggregateTitle = MS._builderReportTitle(instKey, tf, 'single');
                STATE.reportFromDashboard = true;
                STATE.step = 'institution-report';
                STATE.persist();
                UI.render();
                return;
            }
            if (!instKey && tf !== 'all') {
                const members = STATE.institutions.filter((i) => MS.matchesBuilderKind(i, tf));
                const agg = SCHEMA.aggregateMeanScores(members, (c) => UI.hasAnyCount(c));
                if (!agg) {
                    alert('해당 유형에 맞는 관찰 데이터가 충분하지 않아요.');
                    return;
                }
                STATE.selectedGroupName = '';
                STATE.reportAggregateMembers = members;
                STATE.reportAggregateTitle = MS._builderAggregateTitle(tf);
                STATE.reportFromDashboard = true;
                STATE.step = 'institution-report';
                STATE.persist();
                UI.render();
                return;
            }
            alert('기관을 선택하거나, 유형 필터를 지정해 주세요.');
        },
        setSetupTargetGroup(tg) {
            STATE.targetGroup = tg === 'elementary' ? 'elementary' : 'preschool';
            STATE.setupTypeOverride = null;
            const sel = STATE.selected();
            if (sel) {
                sel.targetGroup = STATE.targetGroup;
                if (STATE.targetGroup === 'elementary') {
                    sel.type = '방과후교실';
                } else {
                    sel.type = '어린이집';
                }
            }
            STATE.persist();
            UI.render();
        },

        /** 관찰 숫자가 있는 기록 중 updatedAt 최신 1건 (직전 검사 결과 버튼·바로가기 공통) */
        getMostRecentInstWithData() {
            const list = STATE.institutions.filter((i) => UI.hasAnyCount(i.counts));
            if (!list.length) return null;
            list.sort((a, b) => String(b.updatedAt || '').localeCompare(String(a.updatedAt || '')));
            return list[0];
        },

        /** 해설사 대시보드: 직전 결과 버튼 라벨 (기록 없으면 null) */
        getLatestExamResultButtonLabel() {
            const inst = MS.getMostRecentInstWithData();
            if (!inst) return null;
            const name = String(inst.name || '').trim() || '이름 없음';
            const g = String(inst.groupName || '').trim();
            return g ? `[최근] ${name} ${g} 결과 확인` : `[최근] ${name} 결과 확인`;
        },

        navigateToLatestResult() {
            const pick = MS.getMostRecentInstWithData();
            if (!pick) {
                alert('먼저 기관에 관찰 숫자를 입력해 주세요.');
                return;
            }
            STATE.selectedId = pick.id;
            STATE.isPreviewSample = false;
            STATE.step = 'result';
            STATE.persist();
            UI.render();
        },

        /** 최근 데이터 기관명으로 기관 종합 리포트(기존 openInstitutionReport) */
        openDashboardLatestInstitutionReport() {
            const pick = MS.getMostRecentInstWithData();
            if (!pick) {
                alert('관찰 숫자가 입력된 기록이 없어요.');
                return;
            }
            STATE.selectedGroupName = String(pick.name || '').trim();
            STATE.persist();
            MS.openInstitutionReport();
        },
        goSetup() {
            STATE.step = 'setup';
            STATE.isPreviewSample = false;
            MS._instDropdownAll = false;
            const sel = STATE.selected();
            if (sel) {
                STATE.searchTerm = sel.name;
                STATE.targetGroup = SCHEMA.getTargetGroup(sel);
                STATE.setupTypeOverride = null;
            }
            STATE.setupObsPhase = STATE.observationStage;
            STATE.persist();
            UI.render();
        },
        /** 설정 화면 기관명: 조합 완료 후에만 STATE·드롭다운 반영 */
        applySetupInstNameFromInput(val) {
            STATE.searchTerm = val;
            MS._instDropdownAll = false;
            const match = STATE.institutions.find((i) => i.name === val.trim());
            STATE.selectedId = match ? match.id : null;
            if (match) STATE.setupTypeOverride = null;
            MS.updateInstDropdown();
        },
        onNameInputFromInstEl(el, ev) {
            if (ev && ev.isComposing) return;
            if (MS._setupInstImeComposing) return;
            MS.applySetupInstNameFromInput(String((el && el.value) || ''));
        },
        onInstNameCompositionStart() {
            MS._setupInstImeComposing = true;
        },
        onInstNameCompositionEnd() {
            MS._setupInstImeComposing = false;
            const el = document.getElementById('inst-name');
            if (el) MS.applySetupInstNameFromInput(String(el.value || ''));
        },
        /** 비-IME 경로·접미어 처리 등에서 동일 로직 재사용 */
        onNameInput(val) {
            MS.applySetupInstNameFromInput(String(val || ''));
        },
        setType(t) {
            const sel = STATE.selected();
            if (sel) {
                sel.type = t;
                STATE.setupTypeOverride = null;
            } else {
                STATE.setupTypeOverride = t;
            }
            STATE.persist();
            UI.render();
        },
        startTest() {
            if (!String(MS.getExaminerName() || '').trim()) {
                alert('진행자(해설사) 성함을 입력해 주세요. 대시보드에서 「새 검사 시작」을 눌러 주세요.');
                return;
            }
            const el = document.getElementById('inst-name');
            const name = (el && el.value.trim()) || STATE.searchTerm.trim();
            if (!name) {
                alert('기관 이름을 넣어 주세요.');
                return;
            }
            const phase = STATE.observationStage === 'post' ? 'post' : 'pre';
            let inst = STATE.institutions.find((i) => String(i.name).trim() === name);
            if (!inst) {
                if (STATE.targetGroup === 'preschool' && !STATE.setupTypeOverride) {
                    alert('유아부는 기관 유형(어린이집·유치원·기타)을 선택해 주세요.');
                    return;
                }
                if (STATE.targetGroup === 'elementary' && !STATE.setupTypeOverride) {
                    alert('초등부는 기관 유형(지역아동센터·방과후교실·초등학교)을 선택해 주세요.');
                    return;
                }
                inst = STATE.addInstitution(name);
                inst.type = STATE.setupTypeOverride || STATE.guessType(name);
                inst.obsPhase = phase;
            } else {
                STATE.selectedId = inst.id;
                STATE.ensureCounts(inst);
                if (STATE.setupTypeOverride) inst.type = STATE.setupTypeOverride;
                if (phase === 'pre' || phase === 'post') inst.obsPhase = phase;
            }
            inst.targetGroup = STATE.targetGroup === 'elementary' ? 'elementary' : 'preschool';
            const gEl = document.getElementById('ms-group-name');
            const gn = gEl && gEl.value.trim() ? gEl.value.trim().slice(0, 120) : '';
            inst.groupName = gn;
            STATE.setupObsPhase = phase;
            STATE.setupTypeOverride = null;
            STATE.step = 'input';
            STATE.isPreviewSample = false;
            STATE.touchSelected();
            STATE.persist();
            UI.render();
        },
        openInput(id) {
            STATE.selectedId = id;
            STATE.step = 'input';
            STATE.isPreviewSample = false;
            const sel = STATE.selected();
            if (sel) STATE.targetGroup = SCHEMA.getTargetGroup(sel);
            STATE.persist();
            UI.render();
        },

        /** 히스토리: 기관명 그룹 → 최신·유효 기록으로 결과 또는 입력 */
        openHistoryToReport(encName) {
            const name = decodeURIComponent(encName || '').trim();
            if (!name) return;
            const members = SCHEMA.membersByInstitutionName(STATE.institutions, name);
            if (!members.length) return;
            const withData = members.filter((m) => UI.hasAnyCount(m.counts));
            const pool = withData.length ? withData : members;
            pool.sort((a, b) => String(b.updatedAt || '').localeCompare(String(a.updatedAt || '')));
            const pick = pool[0];
            STATE.selectedId = pick.id;
            STATE.isPreviewSample = false;
            STATE.searchTerm = name;
            if (withData.length && UI.hasAnyCount(pick.counts)) {
                STATE.step = 'result';
            } else {
                STATE.step = 'input';
            }
            STATE.persist();
            UI.render();
        },
        setCount(qid, field, val) {
            const inst = STATE.selected();
            if (!inst) return;
            STATE.ensureCounts(inst);
            inst.counts[qid][field] = val === '' ? '' : String(Math.max(0, parseInt(val, 10) || 0));
            STATE.isPreviewSample = false;
            STATE.touchSelected();
            STATE.persist();
            if (STATE.step === 'input') MS.refreshInputSubmitButton();
        },
        /** 입력 중 전체 완료 시에만 하단 버튼 활성화 (전체 리렌더 없이) */
        refreshInputSubmitButton() {
            if (STATE.step !== 'input') return;
            const inst = STATE.selected();
            const btn = document.getElementById('ms-input-submit-btn');
            if (!inst || !btn) return;
            const ok = UI.allInputQuestionsFilled(inst);
            btn.disabled = !ok;
            btn.classList.toggle('opacity-45', !ok);
            btn.classList.toggle('cursor-not-allowed', !ok);
            btn.setAttribute('aria-disabled', ok ? 'false' : 'true');
        },
        goResult() {
            const inst = STATE.selected();
            if (!inst || !UI.allInputQuestionsFilled(inst)) {
                alert('모든 문항에 O·X 인원 수를 입력해 주세요.');
                return;
            }
            STATE.touchSelected();
            STATE.step = 'result';
            STATE.persist();
            UI.render();
        },
        backToInput() {
            STATE.step = 'input';
            STATE.isPreviewSample = false;
            STATE.persist();
            UI.render();
        },
        runPreview() {
            const el = document.getElementById('inst-name');
            let name = (el && el.value.trim()) || STATE.searchTerm.trim();
            if (!name) name = '삼계중앙어린이집';
            let inst = STATE.institutions.find((i) => i.name === name);
            if (!inst) {
                inst = STATE.addInstitution(name);
            } else {
                STATE.selectedId = inst.id;
                STATE.ensureCounts(inst);
                STATE.persist();
            }
            const demo = [
                { yes: 14, no: 2 }, { yes: 12, no: 4 }, { yes: 9, no: 7 }, { yes: 11, no: 5 },
                { yes: 10, no: 6 }, { yes: 8, no: 8 }, { yes: 13, no: 3 }, { yes: 15, no: 1 }
            ];
            const tg = SCHEMA.getTargetGroup(inst);
            SCHEMA.questionsForGroup(tg).forEach((q, i) => {
                const row = demo[i] || demo[demo.length - 1];
                inst.counts[q.id] = { yes: String(row.yes), no: String(row.no) };
            });
            STATE.isPreviewSample = true;
            STATE.step = 'result';
            STATE.persist();
            UI.render();
        },
        exportBackup: () => {
            void UI.exportBackup();
        },
        triggerImport: () => UI.triggerImport(),

        openForestMapModal() {
            const inst = STATE.selected();
            if (!inst) return;
            const tg = SCHEMA.getTargetGroup(inst);
            const scores = SCHEMA.scoresFromCounts(inst.counts, tg);
            const root = document.getElementById('ms-modal-root');
            if (!root) return;
            const summary = UI.buildHarmonySummary(scores);
            const svg = UI.buildRadarSvg(scores);
            root.className =
                'print-hidden fixed inset-0 z-[200] flex items-end sm:items-center justify-center p-0 sm:p-4';
            root.innerHTML = `
                <div class="absolute inset-0 bg-black/45" onclick="MS.closeForestMapModal()" aria-hidden="true"></div>
                <div class="relative w-full max-w-md rounded-t-[1.75rem] sm:rounded-[2rem] bg-[#FDFBF7] shadow-2xl border border-[#2D4A3E]/12 p-6 md:p-8 max-h-[88vh] overflow-y-auto pb-[max(1.25rem,env(safe-area-inset-bottom,0px))] sm:pb-8" onclick="event.stopPropagation()">
                    <h3 id="ms-modal-title" class="text-lg md:text-xl font-black text-[#2D4A3E] text-center mb-1 leading-tight">우리 아이의 마음 숲 지도</h3>
                    <p class="text-center text-[10px] text-gray-400 mb-4">4STT 비교 · 레이더</p>
                    <div class="flex justify-center overflow-x-auto">${svg}</div>
                    <p class="text-sm text-ms-body leading-relaxed mt-4 mb-6 text-left">${UI.esc(summary)}</p>
                    <button type="button" class="w-full rounded-full border-2 border-[#2D4A3E] bg-transparent text-[#2D4A3E] font-bold py-3 text-sm mb-2 hover:bg-[rgba(45,74,62,0.06)]" onclick="MS.goHomeToDashboard()">🏠 홈으로 — 대시보드</button>
                    <button type="button" class="w-full rounded-full bg-[#2D4A3E] text-white font-bold py-3.5 text-sm shadow-md hover:brightness-95" onclick="MS.closeForestMapModal()">닫기</button>
                </div>
            `;
            document.body.style.overflow = 'hidden';
        },

        closeForestMapModal() {
            const root = document.getElementById('ms-modal-root');
            if (root) {
                root.className = 'hidden print-hidden';
                root.innerHTML = '';
            }
            document.body.style.overflow = '';
        },

        /**
         * 결과·종합 화면에서 홈(대시보드)으로.
         * 방금 본 관찰 1건은 금고·목록에서 제거해 대시보드를 비웁니다(미리보기 제외). 인쇄·보내기 파일은 그대로입니다.
         */
        goHomeToDashboard() {
            MS.closeForestMapModal();
            const wasPreview = STATE.isPreviewSample;
            try {
                MS.purgeCurrentCompletedExamFromVault();
            } catch (_) {}
            try {
                STATE.persist();
            } catch (_) {}
            STATE.step = 'dashboard';
            STATE.isPreviewSample = false;
            STATE.selectedGroupName = '';
            STATE.setupObsPhase = '';
            STATE.searchTerm = '';
            STATE.selectedId = null;
            STATE.toastMessage = wasPreview
                ? '미리보기를 종료했어요.'
                : '검사 기록을 정리했어요. 목록에서 사라졌으며, 새 검사는 설정에서 다시 시작할 수 있어요.';
            if (STATE._toastTimer) clearTimeout(STATE._toastTimer);
            UI.render();
            STATE._toastTimer = setTimeout(() => {
                STATE.toastMessage = null;
                UI.render();
            }, 2600);
        }
    };

    window.MS = MS;

    STATE.hydrate();
    if (!STATE.institutions.length) {
        STATE.step = 'dashboard';
        STATE.searchTerm = '';
        STATE.selectedId = null;
    }
    UI.render();
})();
</script>
</body>
</html>
