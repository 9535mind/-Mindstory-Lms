<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원 관리 - 마인드스토리 관리자</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --primary-color: #6366F1;
      --primary-hover: #4F46E5;
    }
    .btn-primary {
      background-color: var(--primary-color);
      transition: all 0.3s;
    }
    .btn-primary:hover {
      background-color: var(--primary-hover);
      transform: translateY(-2px);
    }
  </style>
</head>
<body class="bg-gray-50">
  <!-- 상단 네비게이션 -->
  <nav class="bg-white shadow-sm border-b">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <div class="flex justify-between items-center">
        <div class="flex items-center space-x-4">
          <a href="/admin-dashboard.html" class="text-gray-600 hover:text-gray-800">
            <i class="fas fa-arrow-left mr-2"></i>대시보드
          </a>
          <h1 class="text-xl font-bold text-gray-800">
            <i class="fas fa-users mr-2" style="color: var(--primary-color)"></i>
            회원 관리
          </h1>
        </div>
        <div>
          <span id="adminName" class="text-gray-600 mr-4"></span>
          <button onclick="logout()" class="text-red-600 hover:text-red-800">
            <i class="fas fa-sign-out-alt mr-1"></i>로그아웃
          </button>
        </div>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-4 py-8">
    <!-- 검색 및 필터 -->
    <div class="bg-white rounded-lg shadow p-6 mb-6">
      <div class="flex flex-col md:flex-row gap-4">
        <div class="flex-1">
          <input 
            type="text" 
            id="searchInput" 
            placeholder="이름, 이메일, 전화번호로 검색..." 
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
          >
        </div>
        <select id="roleFilter" class="px-4 py-2 border rounded-lg">
          <option value="">전체 권한</option>
          <option value="student">학습자</option>
          <option value="admin">관리자</option>
        </select>
        <select id="statusFilter" class="px-4 py-2 border rounded-lg">
          <option value="">전체 상태</option>
          <option value="active">활성</option>
          <option value="inactive">비활성</option>
          <option value="withdrawn">탈퇴</option>
        </select>
        <button onclick="searchUsers()" class="btn-primary text-white px-6 py-2 rounded-lg">
          <i class="fas fa-search mr-2"></i>검색
        </button>
      </div>
    </div>

    <!-- 회원 목록 테이블 -->
    <div class="bg-white rounded-lg shadow overflow-hidden">
      <div class="p-6 border-b">
        <div class="flex justify-between items-center">
          <h2 class="text-lg font-semibold text-gray-800">
            전체 회원 <span id="totalCount" class="text-indigo-600">0</span>명
          </h2>
          <div class="text-sm text-gray-500">
            <span id="pageInfo">1-20 / 0</span>
          </div>
        </div>
      </div>
      
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead class="bg-gray-50 border-b">
            <tr>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">이름</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">이메일</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">전화번호</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">권한</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">가입일</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">관리</th>
            </tr>
          </thead>
          <tbody id="usersTableBody" class="divide-y divide-gray-200">
            <!-- 회원 목록이 여기에 동적으로 추가됩니다 -->
          </tbody>
        </table>
      </div>

      <!-- 페이지네이션 -->
      <div class="px-6 py-4 border-t bg-gray-50">
        <div class="flex justify-between items-center">
          <button id="prevPage" onclick="changePage(-1)" class="px-4 py-2 border rounded-lg hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed">
            <i class="fas fa-chevron-left mr-2"></i>이전
          </button>
          <span id="currentPage" class="text-gray-600">1 / 1</span>
          <button id="nextPage" onclick="changePage(1)" class="px-4 py-2 border rounded-lg hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed">
            다음<i class="fas fa-chevron-right ml-2"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 비밀번호 재설정 모달 -->
  <div id="resetPasswordModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-lg shadow-xl max-w-md w-full mx-4">
      <div class="p-6 border-b">
        <h3 class="text-lg font-semibold text-gray-800">
          <i class="fas fa-key mr-2 text-indigo-600"></i>
          비밀번호 재설정
        </h3>
      </div>
      
      <div class="p-6">
        <p class="text-gray-600 mb-4">
          <strong id="resetUserName"></strong>님의 비밀번호를 재설정합니다.
        </p>
        
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-2">재설정 방식</label>
          <div class="space-y-2">
            <label class="flex items-center">
              <input type="radio" name="resetMode" value="ai" checked class="mr-2">
              <span class="text-sm text-gray-700">
                <i class="fas fa-magic mr-1 text-indigo-600"></i>
                AI로 안전한 비밀번호 자동 생성 (추천)
              </span>
            </label>
            <label class="flex items-center">
              <input type="radio" name="resetMode" value="manual" class="mr-2">
              <span class="text-sm text-gray-700">
                <i class="fas fa-keyboard mr-1 text-gray-600"></i>
                수동 입력
              </span>
            </label>
          </div>
        </div>

        <div id="manualPasswordInput" class="hidden mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-2">새 비밀번호</label>
          <input 
            type="password" 
            id="manualPassword" 
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500"
            placeholder="8자 이상, 영문+숫자+특수문자"
          >
        </div>

        <div id="generatedPasswordDisplay" class="hidden mb-4 p-4 bg-indigo-50 rounded-lg">
          <label class="block text-sm font-medium text-gray-700 mb-2">생성된 비밀번호</label>
          <div class="flex items-center">
            <code id="generatedPassword" class="flex-1 px-4 py-2 bg-white border rounded text-lg font-mono"></code>
            <button onclick="copyPassword()" class="ml-2 px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700">
              <i class="fas fa-copy"></i>
            </button>
          </div>
          <p class="text-xs text-gray-500 mt-2">
            <i class="fas fa-info-circle mr-1"></i>
            반드시 복사해서 사용자에게 전달하세요!
          </p>
        </div>
      </div>

      <div class="p-6 border-t flex justify-end space-x-3">
        <button onclick="closeResetPasswordModal()" class="px-4 py-2 border rounded-lg hover:bg-gray-100">
          취소
        </button>
        <button id="resetPasswordBtn" onclick="resetPassword()" class="btn-primary text-white px-6 py-2 rounded-lg">
          <i class="fas fa-check mr-2"></i>재설정
        </button>
      </div>
    </div>
  </div>

  <!-- 공통 스크립트 -->
  <script src="/static/js/auth.js"></script>
  <script src="/static/js/utils.js"></script>
  <script src="/static/js/admin-users.js"></script>
</body>
</html>
