<!DOCTYPE html>
<html>
<head>
    <title>Video Debug Test</title>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
</head>
<body>
    <h1>Video Debug Test - Lesson 67</h1>
    <div id="videoContainer"></div>
    <div id="debug"></div>
    
    <script>
        async function testVideo() {
            try {
                console.log('1. Fetching lesson data...')
                const response = await axios.get('https://3000-ieu1ambselnpjf2cme9se-c81df28e.sandbox.novita.ai/api/courses/7/lessons/67')
                const lesson = response.data.data.lesson
                
                console.log('2. Lesson data:', lesson)
                document.getElementById('debug').innerHTML = `
                    <pre>${JSON.stringify(lesson, null, 2)}</pre>
                `
                
                console.log('3. Video URL:', lesson.video_url)
                console.log('4. Video Provider:', lesson.video_provider)
                
                // 비디오 렌더링
                const videoUrl = lesson.video_url
                console.log('5. Using video URL:', videoUrl)
                
                const videoHtml = `
                    <video 
                        id="testVideo"
                        controls 
                        style="width: 100%; max-width: 800px;"
                        onloadstart="console.log('VIDEO: loadstart')"
                        onloadeddata="console.log('VIDEO: loadeddata')"
                        oncanplay="console.log('VIDEO: canplay')"
                        onerror="console.error('VIDEO: error', event)">
                        <source src="${videoUrl}" type="video/mp4">
                    </video>
                `
                
                document.getElementById('videoContainer').innerHTML = videoHtml
                console.log('6. Video element created')
                
                // 비디오 요소 확인
                setTimeout(() => {
                    const video = document.getElementById('testVideo')
                    console.log('7. Video element:', video)
                    console.log('8. Video src:', video.currentSrc)
                    console.log('9. Video readyState:', video.readyState)
                    console.log('10. Video error:', video.error)
                }, 1000)
                
            } catch (error) {
                console.error('Error:', error)
                document.getElementById('debug').innerHTML = `<pre>Error: ${error.message}</pre>`
            }
        }
        
        testVideo()
    </script>
</body>
</html>
